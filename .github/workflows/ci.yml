name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install black mypy pyyaml pydantic
      - name: Black format check
        run: black --check src/ tests/
      - name: mypy type check
        run: mypy src/ --strict --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Unit Tests
        run: pytest tests/core/ tests/ops/ tests/data/ tests/sim/ -v --cov=src --cov-report=term-missing
      - name: Replay Tests
        run: pytest tests/replay/ -v

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Core Image
        run: docker build -t bitgrid-core:ci -f src/core/Dockerfile .
      - name: Build UI Image
        run: docker build -t bitgrid-ui:ci -f src/ui/Dockerfile .
