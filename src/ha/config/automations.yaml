- id: bg_decision_block_tick
  alias: BG Decision Block Tick
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /1
  condition:
  - condition: state
    entity_id: input_boolean.simulation_mode
    state: 'on'
  - condition: template
    value_template: '{% set block = states(''input_number.block_minutes'') | int(10)
      %} {% set block = 1 if block < 1 else block %} {{ (now().minute % block) ==
      0 }}'
  action:
  - service: script.bg_decision_cycle
- id: bg_decision_reactive_inputs
  alias: BG Decision Reactive Inputs
  mode: restart
  trigger:
  - platform: state
    entity_id:
    - input_number.pv_power_w
    - input_number.house_load_w
    - input_number.grid_import_w
    - input_number.battery_soc_pct
    - input_number.battery_power_w
    - input_number.miner_temp_c
    - input_number.miner_heartbeat_age_sec
    - input_number.miner_power_w
    - input_number.r1_surplus_min_kw
    - input_number.r2_soc_soft_min_pct
    - input_number.r2_soc_hard_min_pct
    - input_number.r2_max_grid_import_w
    - input_number.r3_max_chip_temp_c
    - input_number.r3_comm_timeout_sec
    - input_number.r5_deadband_hold_blocks
    - input_number.r5_min_runtime_blocks
    - input_number.r5_min_pause_blocks
    - input_boolean.override_active
    - input_select.override_action
    - input_boolean.r3_emergency_stop
  condition:
  - condition: state
    entity_id: input_boolean.simulation_mode
    state: 'on'
  action:
  - service: script.bg_decision_cycle
- id: bg_safety_immediate_stop
  alias: BG Safety Immediate Stop
  mode: single
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.r3_overtemp
    - binary_sensor.r3_comm_timeout
    - binary_sensor.r3_emergency_stop
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.simulation_mode
    state: 'on'
  action:
  - service: script.bg_force_safety_stop
- id: bg_override_activate
  alias: BG Override Activate
  mode: restart
  trigger:
  - platform: state
    entity_id: input_boolean.override_active
    to: 'on'
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.override_valid_until
    data:
      datetime: "{{ (now() + timedelta(minutes=states('input_number.override_duration_min')
        | int(30)))\n   .strftime('%Y-%m-%d %H:%M:%S') }}"
  - service: input_text.set_value
    target:
      entity_id: input_text.override_status
    data:
      value: active
  - service: script.bg_decision_cycle
- id: bg_override_expiry
  alias: BG Override Expiry Watchdog
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /1
  condition:
  - condition: state
    entity_id: input_boolean.override_active
    state: 'on'
  - condition: template
    value_template: "{% set until = states('input_datetime.override_valid_until')
      %} {% if until in ['unknown', 'unavailable', ''] %}\n  false\n{% else %}\n  {{
      as_timestamp(now()) >= as_timestamp(until) }}\n{% endif %}"
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.override_active
  - service: input_text.set_value
    target:
      entity_id: input_text.override_status
    data:
      value: expired
- id: bg_override_deactivate
  alias: BG Override Deactivate
  mode: restart
  trigger:
  - platform: state
    entity_id: input_boolean.override_active
    to: 'off'
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.override_action
    data:
      option: NOOP
  - service: input_text.set_value
    target:
      entity_id: input_text.override_status
    data:
      value: inactive
  - service: script.bg_decision_cycle
# mvp_start_eco und mvp_upgrade_super wurden aus automations.yaml entfernt.
# Korrekte Versionen sind in src/ha/config/packages/mvp_auto.yaml definiert.
