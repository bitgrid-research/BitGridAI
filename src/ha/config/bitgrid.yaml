title: BitGridAI

# ═══════════════════════════════════════════════════════
# Shared Button-Card Templates
# ═══════════════════════════════════════════════════════
button_card_templates:
  miner_header:
    show_state: false
    show_icon: true
    tap_action:
      action: none
    custom_fields:
      status: >
        [[[
          const on = entity.state === 'on';
          return `<ha-icon icon="${on ? 'mdi:check-circle' : 'mdi:alert-circle'}"
            style="color:${on ? '#4CAF50' : '#F44336'}; --mdc-icon-size:22px;"></ha-icon>`;
        ]]]
    styles:
      grid:
        - grid-template-areas: '"n status i"'
        - grid-template-columns: 1fr auto auto
        - grid-template-rows: 1fr
      card:
        - padding: 12px 16px
        - height: 56px
      name:
        - font-size: 1.1rem
        - font-weight: bold
        - text-align: left
        - justify-self: start
        - padding-right: 8px
      icon:
        - color: var(--primary-text-color)
        - width: 22px
        - height: 22px
        - margin-left: 6px
      custom_fields:
        status:
          - display: flex
          - align-items: center

  miner_btn:
    show_state: true
    styles:
      card:
        - background: var(--secondary-background-color)
        - border-radius: 12px
        - padding: 20px 6px
        - height: 110px
      icon:
        - width: 44px
        - height: 44px
      name:
        - font-size: 0.9rem
        - font-weight: 600
        - color: var(--primary-text-color)
        - white-space: unset
        - text-overflow: unset
        - overflow: visible
        - margin-top: 6px
      state:
        - font-size: 0.78rem
        - color: var(--secondary-text-color)
        - margin-top: 2px

  weather_forecast_6h:
    entity: sensor.weather_forecast_6h
    show_name: false
    show_icon: false
    show_state: false
    tap_action:
      action: none
    custom_fields:
      row: >
        [[[
          const f = entity?.attributes?.forecast ?? [];
          const icons = {
            'clear-night':     'mdi:weather-night',
            'sunny':           'mdi:weather-sunny',
            'partlycloudy':    'mdi:weather-partly-cloudy',
            'cloudy':          'mdi:weather-cloudy',
            'fog':             'mdi:weather-fog',
            'rainy':           'mdi:weather-rainy',
            'pouring':         'mdi:weather-pouring',
            'lightning':       'mdi:weather-lightning',
            'lightning-rainy': 'mdi:weather-lightning-rainy',
            'snowy':           'mdi:weather-snowy',
            'snowy-rainy':     'mdi:weather-snowy-rainy',
            'windy':           'mdi:weather-windy',
            'windy-variant':   'mdi:weather-windy-variant',
            'hail':            'mdi:weather-hail',
            'exceptional':     'mdi:alert-circle-outline',
          };
          const blocks = f.map(h => {
            const dt   = new Date(h.datetime);
            const time = dt.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
            const icon = icons[h.condition] ?? 'mdi:weather-partly-cloudy';
            const temp = Math.round(h.temperature);
            return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:5px;flex:1">
                <span style="font-size:.75rem;color:var(--secondary-text-color);font-weight:500">${time}</span>
                <ha-icon icon="${icon}" style="--mdc-icon-size:28px;color:var(--primary-text-color)"></ha-icon>
                <span style="font-size:.95rem;font-weight:600">${temp}°C</span>
              </div>`;
          }).join('');
          return `<div style="display:flex;width:100%;padding:4px 0">${blocks}</div>`;
        ]]]
    styles:
      card:
        - padding: 12px 16px
        - background: var(--secondary-background-color)
        - border-radius: 12px
      grid:
        - grid-template-areas: '"row"'
        - grid-template-columns: 1fr
      custom_fields:
        row:
          - width: 100%
          - overflow: hidden

views:
  # ═══════════════════════════════════════════════════════
  # BITGRIDAI SIMULATION  —  Simulation Controls
  # ═══════════════════════════════════════════════════════
  - title: BitGridAi Simulation
    path: bitgrid-simulation
    icon: mdi:view-dashboard
    panel: true
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr
          grid-template-rows: auto
          margin: 8px
          row-gap: 16px
          column-gap: 40px
        cards:
          - type: vertical-stack
            cards:
              # ── Status-Erklärung ────────────────────────────────────────────────
              - type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                tap_action:
                  action: none
                custom_fields:
                  status: >
                    [[[
                      // Simulation Mode - uses simulation-specific entities
                      const decisionCodeSensor = 'sensor.sim_bg_decision_code';
                      const decisionPrioritySensor = 'sensor.sim_bg_decision_priority';
                      const pvSensor = 'sensor.sim_pv_power_w';
                      const socSensor = 'sensor.sim_battery_soc_pct';
                      const surplusSensor = 'sensor.sim_surplus_kw';
                      const tempSensor = 'sensor.sim_miner_chip_temp_c';
                      const gridImportSensor = 'sensor.sim_grid_import_w';
                      const batPowerSensor = 'sensor.sim_battery_power_w';

                      // Decision Code/Priority
                      const code     = states[decisionCodeSensor]?.state     || '—';
                      const priority = states[decisionPrioritySensor]?.state || '—';

                      // Energie-Werte
                      const pv       = parseFloat(states[pvSensor]?.state      || 0);
                      const soc      = parseFloat(states[socSensor]?.state || 0);
                      const surplus  = parseFloat(states[surplusSensor]?.state) || 0;
                      const temp     = parseFloat(states[tempSensor]?.state || 0);
                      const grid     = parseFloat(states[gridImportSensor]?.state || 0);
                      const batPowerW = parseFloat(states[batPowerSensor]?.state || 0);
                      const block    = states['sensor.block_id']?.state || '?';
                      const blockStart = states['sensor.block_window_start']?.state || '';
                      const h = new Date().getHours();
                      const socSoftMin    = parseFloat(states['input_number.sim_r2_soc_soft_min_pct']?.state || 65);
                      const socHardMin    = parseFloat(states['input_number.sim_r2_soc_hard_min_pct']?.state || 10);
                      const gridLimit     = parseFloat(states['input_number.sim_r2_max_grid_import_w']?.state || 500);
                      const maxTemp       = parseFloat(states['input_number.sim_r3_max_chip_temp_c']?.state  || 90);
                      const roomTempRaw   = null;  // Simulation mode doesn't have room temp
                      const roomTemp      = null;
                      const roomTempLimit = 30;
                      const ecoTempLimit  = 112;
                      // Simulation Mode Status (auto-calculated from rule engine)
                      const minerMode = (states['sensor.sim_miner1_workmode_status']?.state || states['sensor.sim_miner2_workmode_status']?.state || '');
                      const mvpSocStart   = parseFloat(states['input_number.sim_mvp_soc_eco_start_pct']?.state || 65);
                      const mvpPvStartKw  = parseFloat(states['input_number.sim_mvp_pv_start_w']?.state || 6000) / 1000;
                      const socStdOn      = parseFloat(states['input_number.sim_mvp_soc_std_pct']?.state || 80);
                      const socStdOff     = parseFloat(states['input_number.sim_mvp_soc_std_stop_pct']?.state || 75);
                      const socSuperOn    = parseFloat(states['input_number.sim_mvp_soc_super_pct']?.state || 90);
                      const socSuperOff   = parseFloat(states['input_number.sim_mvp_soc_super_stop_pct']?.state || 85);
                      const socStop       = parseFloat(states['input_number.sim_mvp_soc_stop_pct']?.state || 50);
                      const battCapKwh    = parseFloat(states['input_number.battery_capacity_kwh']?.state || 10);
                      const minerRunning = ['Eco', 'Standard', 'Super'].includes(minerMode);
                      const nightBlockActive = (h >= 22 || h < 6);

                      // ETA-Berechnungen
                      const socGap        = Math.max(0, mvpSocStart - soc);
                      const etaMin        = batPowerW > 100
                        ? Math.round(socGap / 100 * battCapKwh * 1000 / batPowerW * 60)
                        : null;
                      const etaStr        = etaMin === null ? null
                        : etaMin < 60   ? `~${etaMin} min`
                        : `~${Math.floor(etaMin / 60)}h ${etaMin % 60}min`;
                      const socSuperGap   = Math.max(0, socSuperOn - soc);
                      const etaSuperMin   = batPowerW > 100
                        ? Math.round(socSuperGap / 100 * battCapKwh * 1000 / batPowerW * 60)
                        : null;
                      const etaSuperStr   = etaSuperMin === null ? null
                        : etaSuperMin < 60 ? `~${etaSuperMin} min`
                        : `~${Math.floor(etaSuperMin / 60)}h ${etaSuperMin % 60}min`;
                      const parseIdt     = (s) => (s && s !== 'unknown' && s !== 'unavailable' && !s.startsWith('1970'))
                        ? new Date(s.replace(' ', 'T')).getTime() / 1000 : 0;
                      const nowTs        = Date.now() / 1000;
                      const cooldownSec  = 3600;
                      const m1DnTs       = parseIdt(states['input_datetime.mvp_miner1_last_downgrade']?.state);
                      const m1UpTs       = parseIdt(states['input_datetime.mvp_miner1_last_upgrade']?.state);
                      const m2DnTs       = parseIdt(states['input_datetime.mvp_miner2_last_downgrade']?.state);
                      const m2UpTs       = parseIdt(states['input_datetime.mvp_miner2_last_upgrade']?.state);
                      const ecoSinceTs   = Math.max(m1UpTs, m1DnTs, m2UpTs, m2DnTs);
                      const ecoStartDate = ecoSinceTs > 0 ? new Date(ecoSinceTs * 1000) : null;
                      const ecoStartStr  = ecoStartDate
                        ? `${String(ecoStartDate.getHours()).padStart(2,'0')}:${String(ecoStartDate.getMinutes()).padStart(2,'0')}`
                        : null;
                      const speedBlockSec = Math.max(0, m1DnTs + cooldownSec - nowTs);
                      const speedBlockMin = Math.ceil(speedBlockSec / 60);
                      const speedBlockStr = speedBlockSec > 0
                        ? (speedBlockMin < 60 ? `${speedBlockMin} min` : `${Math.floor(speedBlockMin / 60)}h ${speedBlockMin % 60}min`)
                        : null;
                      const ecoBlockSec  = Math.max(0, m1UpTs + cooldownSec - nowTs);
                      const ecoBlockMin  = Math.ceil(ecoBlockSec / 60);
                      const ecoBlockStr  = ecoBlockSec > 0
                        ? (ecoBlockMin < 60 ? `${ecoBlockMin} min` : `${Math.floor(ecoBlockMin / 60)}h ${ecoBlockMin % 60}min`)
                        : null;
                      const m1TLRaw = states['input_datetime.mvp_miner1_temp_lockout_until']?.state || '';
                      const m2TLRaw = states['input_datetime.mvp_miner2_temp_lockout_until']?.state || '';
                      const m1TempLockTs = (m1TLRaw && m1TLRaw !== 'unknown' && m1TLRaw !== 'unavailable')
                        ? new Date(m1TLRaw.replace(' ', 'T')).getTime() / 1000 : 0;
                      const m2TempLockTs = (m2TLRaw && m2TLRaw !== 'unknown' && m2TLRaw !== 'unavailable')
                        ? new Date(m2TLRaw.replace(' ', 'T')).getTime() / 1000 : 0;
                      const tempLockTs     = Math.max(m1TempLockTs, m2TempLockTs);
                      const tempLockRemSec = Math.max(0, tempLockTs - nowTs);
                      const tempLockActive = tempLockRemSec > 30;
                      const tempLockRemMin = Math.ceil(tempLockRemSec / 60);
                      const tempLockStr    = tempLockRemMin < 60
                        ? `${tempLockRemMin} min`
                        : `${Math.floor(tempLockRemMin / 60)}h ${tempLockRemMin % 60}min`;

                      // Status-Berechnungen
                      const isWaiting = !nightBlockActive && !minerRunning && (code === 'NOOP_R2_SOC_SOFT_MIN' || soc < socSoftMin);
                      const isEco      = !nightBlockActive && !isWaiting && minerMode === 'Eco';
                      const isStandard = !nightBlockActive && !isWaiting && minerMode === 'Standard';
                      const isSpeed    = !nightBlockActive && !isWaiting && minerMode === 'Super';
                      let weather, wColor;
                      if      (pv > 4000) { weather = '☀️ Volle Sonne';       wColor = '#FFC107'; }
                      else if (pv > 2000) { weather = '⛅ Teilweise bewölkt'; wColor = '#90A4AE'; }
                      else if (pv > 500)  { weather = '☁️ Bewölkt';           wColor = '#78909C'; }
                      else                { weather = '🌙 Kein PV';            wColor = '#5C6BC0'; }
                      let lines;
                      if (nightBlockActive) {
                        const dischargePowerW = -batPowerW;
                        const socGapStop = Math.max(0, soc - socStop);
                        const etaStopMin = dischargePowerW > 50 && socGapStop > 0
                          ? Math.round(socGapStop / 100 * battCapKwh * 1000 / dischargePowerW * 60)
                          : null;
                        const etaStopStr = etaStopMin === null ? null
                          : etaStopMin < 60 ? `~${etaStopMin} min`
                          : `~${Math.floor(etaStopMin / 60)}h ${etaStopMin % 60}min`;
                        const nowForNight = new Date();
                        const minsTo6 = (6 * 60) - (nowForNight.getHours() * 60 + nowForNight.getMinutes());
                        const minsTo6Adj = minsTo6 <= 0 ? minsTo6 + 24 * 60 : minsTo6;
                        const to6Str = minsTo6Adj < 60 ? `${minsTo6Adj} min`
                          : `${Math.floor(minsTo6Adj / 60)}h ${minsTo6Adj % 60}min`;
                        lines = [
                          `🌙 Nacht-Sperre aktiv · Solar-Mining ab 06:00 (in ${to6Str})`,
                          etaStopStr
                            ? `Akku ${soc.toFixed(0)}% → ${socStop.toFixed(0)}% Standby in ${etaStopStr} · ${dischargePowerW.toFixed(0)} W Entladung`
                            : batPowerW > 50
                              ? `Akku ${soc.toFixed(0)}% · lädt mit ${batPowerW.toFixed(0)} W (Netz?)`
                              : `Akku ${soc.toFixed(0)}% · Standby-Schwelle ${socStop.toFixed(0)}% — bereits erreicht oder kein Bezug`
                        ];
                      } else if (code === 'STOP_R3_OVERTEMP') {
                        lines = [
                          `Übertemperatur — ${temp.toFixed(0)}°C überschreitet Limit ${maxTemp.toFixed(0)}°C.`,
                          `Miner startet automatisch wenn Temperatur sinkt.`
                        ];
                      } else if (code === 'STOP_R3_COMM_TIMEOUT') {
                        lines = [
                          `Kommunikationsausfall — kein Heartbeat vom Miner.`,
                          `Mining gestoppt bis MQTT-Verbindung wiederhergestellt.`
                        ];
                      } else if (code === 'STOP_R2_SOC_HARD_MIN') {
                        lines = [
                          `Batterie kritisch — ${soc.toFixed(0)}% unter Sicherheitsminimum ${socHardMin.toFixed(0)}%.`,
                          `Mining startet erst wenn Akku ≥ ${mvpSocStart.toFixed(0)}%.`
                        ];
                      } else if (code === 'NOOP_R2_SOC_SOFT_MIN' && !minerRunning) {
                        lines = [
                          `⚡ Automatik an · Miner im Standby.`,
                          `Akku ${soc.toFixed(0)}% → ${mvpSocStart.toFixed(0)}% Eco`,
                          etaStr
                            ? `Los geht's in ${etaStr} — bis dann: Hodl strong! ₿`
                            : `Start bei ≥ ${mvpSocStart.toFixed(0)}% Akku — bis dann: Hodl strong! ₿`
                        ];
                      } else if (code === 'STOP_R2_GRID_IMPORT_EXCEEDED') {
                        lines = [
                          `Netzbezug ${grid.toFixed(0)} W — Limit ${gridLimit.toFixed(0)} W überschritten.`,
                          `Mining pausiert bis Netzbezug unter ${gridLimit.toFixed(0)} W sinkt.`
                        ];
                      } else if (minerMode === 'Eco') {
                        const ecoDischargeW = -batPowerW;
                        const ecoSocGapStop = Math.max(0, soc - socStop);
                        const ecoEtaStopMin = ecoDischargeW > 50 && ecoSocGapStop > 0
                          ? Math.round(ecoSocGapStop / 100 * battCapKwh * 1000 / ecoDischargeW * 60)
                          : null;
                        const ecoEtaStopStr = ecoEtaStopMin === null ? null
                          : ecoEtaStopMin < 60 ? `~${ecoEtaStopMin} min`
                          : `~${Math.floor(ecoEtaStopMin / 60)}h ${ecoEtaStopMin % 60}min`;
                        const ecoLine3 = soc <= socStop
                          ? ecoBlockStr
                            ? `Deadband: Standby-Wechsel in ${ecoBlockStr} freigegeben`
                            : `⚠️ Unter ${socStop.toFixed(0)}% — wechselt zu Standby`
                          : tempLockActive
                            ? `🌡️ Eco wegen Überhitzung — Sperre noch ${tempLockStr}`
                            : speedBlockStr || soc >= socStdOn
                              ? `⛔ Upgrade gesperrt — Eco-Only-Testmodus aktiv`
                              : ecoEtaStopStr
                                ? `Standby (${socStop.toFixed(0)}%) in ${ecoEtaStopStr} · ${ecoDischargeW.toFixed(0)} W`
                                : null;
                        lines = [
                          `🌿 Eco-Only-Testmodus · Miner in Eco seit ${ecoStartStr || '—'}`,
                          `Akku ${soc.toFixed(0)}% · Standard & Super aktuell gesperrt`,
                          ecoLine3
                        ].filter(Boolean);
                      } else if (minerMode === 'Standard') {
                        const stdDischargeW = -batPowerW;
                        const stdSocGapEco  = Math.max(0, soc - socStdOff);
                        const stdEtaEcoMin  = stdDischargeW > 50 && stdSocGapEco > 0
                          ? Math.round(stdSocGapEco / 100 * battCapKwh * 1000 / stdDischargeW * 60)
                          : null;
                        const stdEtaEcoStr  = stdEtaEcoMin === null ? null
                          : stdEtaEcoMin < 60 ? `~${stdEtaEcoMin} min`
                          : `~${Math.floor(stdEtaEcoMin / 60)}h ${stdEtaEcoMin % 60}min`;
                        const stdLine3 = soc <= socStdOff
                          ? ecoBlockStr
                            ? `Deadband: Eco-Wechsel in ${ecoBlockStr} freigegeben`
                            : `⚠️ Akku unter ${socStdOff.toFixed(0)}% — wechselt zu Eco`
                          : tempLockActive
                            ? `🌡️ Super gesperrt wegen Überhitzung — Sperre noch ${tempLockStr}`
                            : speedBlockStr
                              ? `Super-Upgrade in ${speedBlockStr} freigegeben ₿`
                              : soc >= socSuperOn
                                ? `Super-Schwelle erreicht — Upgrade kommt gleich. 🚀`
                                : stdEtaEcoStr
                                  ? `Eco (${socStdOff.toFixed(0)}%) in ${stdEtaEcoStr} · ${stdDischargeW.toFixed(0)} W`
                                  : etaSuperStr
                                    ? `Super in ${etaSuperStr} — noch ein bisschen! ₿`
                                    : null;
                        lines = [
                          `⚡ Automatik aktiv · Miner in Standard seit ${ecoStartStr || '—'}`,
                          `Akku ${soc.toFixed(0)}% · Eco < ${socStdOff.toFixed(0)}% · Super ≥ ${socSuperOn.toFixed(0)}%`,
                          stdLine3
                        ].filter(Boolean);
                      } else if (minerMode === 'Super') {
                        const speedLine3 = soc < socSuperOff
                          ? ecoBlockStr
                            ? `Deadband: Eco-Wechsel in ${ecoBlockStr} freigegeben`
                            : `⚠️ Akku unter ${socSuperOff.toFixed(0)}% — wechselt zu Eco`
                          : ecoBlockStr
                            ? `Deadband: Eco-Wechsel in ${ecoBlockStr} freigegeben`
                            : null;
                        const tempLine = `Chip ${temp.toFixed(0)}°C · Raum ${roomTemp !== null ? roomTemp.toFixed(1) + '°C' : '—'} — Eco ab ${ecoTempLimit.toFixed(0)}°C / ${roomTempLimit.toFixed(0)}°C`;
                        lines = [
                          `🚀 Automatik aktiv · Miner in Super seit ${ecoStartStr || '—'}`,
                          `Akku ${soc.toFixed(0)}% → ${socSuperOff.toFixed(0)}% Eco`,
                          tempLine,
                          speedLine3
                        ].filter(Boolean);
                      } else if (code.startsWith('START')) {
                        lines = [
                          `${surplus.toFixed(1)} kW Überschuss — alle Regeln erfüllt.`,
                          `Mining läuft. Batterie ${soc.toFixed(0)}%, PV ${(pv / 1000).toFixed(1)} kW.`
                        ];
                      } else if (soc < socSoftMin && !minerRunning) {
                        lines = [
                          `⚡ Automatik an · Miner im Standby.`,
                          `Akku ${soc.toFixed(0)}% → ${mvpSocStart.toFixed(0)}% Eco`,
                          etaStr
                            ? `Los geht's in ${etaStr} — bis dann: Hodl strong! ₿`
                            : `Start bei ≥ ${mvpSocStart.toFixed(0)}% Akku — bis dann: Hodl strong! ₿`
                        ];
                      } else {
                        const idleLine3 = priority === 'R5_STABILITY'
                          ? `Deadband aktiv — Mining startet nach Ablauf. ₿`
                          : `Eco ≥ ${mvpSocStart.toFixed(0)}% · Standard ≥ ${socStdOn.toFixed(0)}% · Super ≥ ${socSuperOn.toFixed(0)}%`;
                        lines = [
                          `⚡ Automatik an · Miner im Standby.`,
                          `PV ${(pv/1000).toFixed(1)} kW · Akku ${soc.toFixed(0)}%`,
                          idleLine3
                        ];
                      }
                      const blockTime  = blockStart
                        ? (blockStart.includes(' ') ? blockStart.split(' ')[1].slice(0,5) : blockStart)
                        : '';
                      const greeting  = h < 5  ? 'Gute Nacht'
                                      : h < 11 ? 'Guten Morgen'
                                      : h < 14 ? 'Guten Mittag'
                                      : h < 18 ? 'Guten Nachmittag'
                                      : h < 22 ? 'Guten Abend'
                                      :          'Gute Nacht';
                      const now = new Date();
                      const hh  = String(now.getHours()).padStart(2, '0');
                      const mm  = String(now.getMinutes()).padStart(2, '0');
                      const timeStr  = hh + ':' + mm;
                      const slotMin  = Math.floor(now.getMinutes() / 10) * 10;
                      const slotH    = String(now.getHours()).padStart(2, '0');
                      const slotM    = String(slotMin).padStart(2, '0');
                      const slot     = slotH + slotM + '.json';
                      const blockDisplay = states['sensor.bitcoin_block_height']?.state
                        && states['sensor.bitcoin_block_height'].state !== 'unavailable'
                        ? parseInt(states['sensor.bitcoin_block_height'].state).toLocaleString('de-DE')
                        : '—';
                      const blockKnown = blockDisplay && blockDisplay !== '—';
                      const balanceBtc = parseFloat(states['sensor.pool_balance_btc']?.state);
                      const balanceSats = (!isNaN(balanceBtc) && balanceBtc > 0)
                        ? Math.round(balanceBtc * 1e8).toLocaleString('de-DE') + ' SATs'
                        : '58.122 SATs';
                      const btcEurPrice = parseFloat(states['sensor.btc_eur_price']?.state);
                      const btcEurDisplay = (!isNaN(btcEurPrice) && btcEurPrice > 0)
                        ? btcEurPrice.toLocaleString('de-DE') + ' €'
                        : '—';
                      const imgSrc = nightBlockActive ? 'bithamster_sleep.png'
                                  : isEco            ? 'bithamster_eco.png'
                                  : isStandard       ? 'bithamster_standard.png'
                                  : isSpeed          ? 'bithamster_super.png'
                                  :                    'bithamster_wait.png';
                      return `
                        <div style="position:relative;padding-right:100px;min-height:165px">
                          <div style="position:absolute;top:0;right:0;
                                      display:flex;flex-direction:column;
                                      padding-left:12px;border-left:1px solid var(--divider-color);
                                      text-align:right;min-height:100%;">
                            <div style="margin-bottom:8px;">
                              <div style="font-size:0.62rem;color:var(--secondary-text-color);letter-spacing:0.04em;text-transform:uppercase;">Uhrzeit</div>
                              <div style="font-size:1.8rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.05;margin-top:1px;">${timeStr}</div>
                            </div>
                            <div style="margin-bottom:12px;">
                              <div style="font-size:0.62rem;color:var(--secondary-text-color);letter-spacing:0.04em;text-transform:uppercase;">Datum</div>
                              <div style="font-size:0.85rem;font-weight:600;margin-top:1px;">${new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'short'})}</div>
                            </div>
                            <div style="border-top:1px solid var(--divider-color);padding-top:8px;margin-bottom:auto;">
                              <div style="font-size:0.55rem;color:var(--secondary-text-color);letter-spacing:0.04em;text-transform:uppercase;">₿ Blockzeit</div>
                              <div style="font-size:0.72rem;font-weight:600;color:#a8a8a8;margin-top:1px;">${blockDisplay}</div>
                              <div style="font-size:0.55rem;color:var(--secondary-text-color);letter-spacing:0.04em;text-transform:uppercase;margin-top:6px;">₿ Balance</div>
