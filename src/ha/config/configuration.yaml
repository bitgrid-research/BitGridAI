# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  packages: !include_dir_merge_named packages

frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  resources:
    - url: /hacsfiles/power-flow-card-plus/power-flow-card-plus.js
      type: module
    - url: /hacsfiles/button-card/button-card.js
      type: module
    - url: /hacsfiles/lovelace-layout-card/layout-card.js
      type: module
  dashboards:
    bitgrid-ai:
      mode: yaml
      filename: ui-lovelace.yaml
      title: BitGridAI - Dashboard
      icon: mdi:view-dashboard
      show_in_sidebar: true

    bitgrid-ai-simulation-dashboard:
      mode: yaml
      filename: bitgrid.yaml
      title: BitGridAI - Simulation Dashboard
      icon: mdi:view-dashboard
      show_in_sidebar: true
    bitgrid-ai-simulation:
      mode: yaml
      filename: bitgrid-simulation.yaml
      title: BitGridAI Simulation
      icon: mdi:clipboard-text-clock-outline
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ── Recorder: kurze DB-Aufbewahrung, da Langzeit-Daten in JSON-Logs liegen ───
# Block-Logs (10 min) + Daily-KPI + Monthly-Rollup ersetzen die lange DB-History.
recorder:
  purge_keep_days: 14
  exclude:
    entity_globs:
      # Energie-Rohdaten: stündlich in Block-Logs, kein langer DB-Verlauf nötig
      - sensor.pv_power_w
      - sensor.house_load_w
      - sensor.grid_import_w
      - sensor.grid_export_w
      - sensor.battery_power_w
      - sensor.surplus_kw
      # Prognose-Sensoren: werden nicht historisch ausgewertet
      - sensor.house_load_forecast_w
      - sensor.mining_window_free_w
      - sensor.house_load_mean_7d

# ── MQTT ──────────────────────────────────────────────────────────────────────
# Broker wird über HA-UI konfiguriert: Einstellungen → Integrationen → MQTT
# Umbrel-IP aus .env: MQTT_HOST
#
# Temp/Humidity-Sensoren (via Zigbee2MQTT oder andere MQTT-Bridge):
mqtt:
  sensor:
    - name: temp_miner_room
      unique_id: temp_miner_room
      state_topic: "zigbee2mqtt/temp_miner_room"
      value_template: "{{ value_json.temperature | float | round(1) }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      expire_after: 300

    - name: humidity_miner_room
      unique_id: humidity_miner_room
      state_topic: "zigbee2mqtt/temp_miner_room"
      value_template: "{{ value_json.humidity | float | round(1) }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 300

    - name: temp_living_room
      unique_id: temp_living_room
      state_topic: "zigbee2mqtt/temp_living_room"
      value_template: "{{ value_json.temperature | float | round(1) }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      expire_after: 300

    - name: humidity_living_room
      unique_id: humidity_living_room
      state_topic: "zigbee2mqtt/temp_living_room"
      value_template: "{{ value_json.humidity | float | round(1) }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 300

# ── BitGridAI Entscheidungs-Logik ─────────────────────────────────────────────
# Alle Regelparameter als editierbare Helper
input_boolean:
  simulation_mode:
    name: simulation_mode
    icon: mdi:flask
    initial: off
  r3_emergency_stop:
    name: r3_emergency_stop
    icon: mdi:alert
  override_active:
    name: override_active
    icon: mdi:hand
  replay_mode:
    name: replay_mode
    icon: mdi:play-box-multiple

  sim_miner_running:
    name: Sim Miner Running
    icon: mdi:crane
    initial: false

input_select:
  # ── Simulation Miner Workmode Select (mirrors production select.miner*_workmode_set) ───
  # These entities control the simulated miner modes and are read by the template sensors
  sim_miner1_workmode_set:
    name: Sim Miner 1 Workmode Set
    options:
      - Standby
      - Eco
      - Standard
      - Super
    initial: Standby
  sim_miner2_workmode_set:
    name: Sim Miner 2 Workmode Set
    options:
      - Standby
      - Eco
      - Standard
      - Super
    initial: Standby

  # ── System State Select (legacy) ───────────────────────────────────────────
  system_state:
    name: system_state
    options:
      - OFF
      - ARMED
      - RUNNING
      - THROTTLED
      - COOLDOWN
      - LOCKOUT
      - SAFE_MODE
      - ERROR
    initial: OFF
  decision_action:
    name: decision_action
    options:
      - START
      - STOP
      - THROTTLE
      - NOOP
    initial: NOOP
  autonomy_level:
    name: autonomy_level
    options:
      - MANUAL
      - ASSIST
      - SEMI_AUTO
      - AUTO
    initial: MANUAL
  override_action:
    name: override_action
    options:
      - START
      - STOP
      - THROTTLE
      - NOOP
    initial: NOOP
  active_miner:
    name: active_miner
    options:
      - BOTH
      - MINER1
      - MINER2
      - NONE
    initial: BOTH

input_number:
  # ── Simulation-Inputs (Slider) ───────────────────────────────────────────
  # Default values optimized for "miner starts automatically" test scenario:
  # Surplus = (8000 - 2000 - 100) / 1000 = 5.9 kW >= 2.0 kW threshold → START
  sim_pv_power_w:
    name: Sim PV Power (W)
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 8000
  sim_house_load_w:
    name: Sim House Load (W)
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 2000
  sim_grid_import_w:
    name: Sim Grid Import (W)
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 100
  sim_grid_export_w:
    name: Sim Grid Export (W)
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 1000
  sim_battery_soc_pct:
    name: Sim Battery SoC (%)
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 90
  sim_battery_power_w:
    name: Sim Battery Power (W)
    min: -10000
    max: 10000
    step: 50
    mode: box
    initial: 500
  # ── Simulation Mode Power Configuration (user-configurable power per mode) ─
  sim_miner_eco_power_w:
    name: Sim Miner Eco Power (W)
    min: 0
    max: 10000
    step: 10
    mode: box
    initial: 300
  sim_miner_standard_power_w:
    name: Sim Miner Standard Power (W)
    min: 0
    max: 10000
    step: 10
