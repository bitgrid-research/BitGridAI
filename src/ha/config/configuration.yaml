
# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  packages: !include_dir_merge_named packages

frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  resources:
    - url: /hacsfiles/power-flow-card-plus/power-flow-card-plus.js
      type: module
    - url: /hacsfiles/button-card/button-card.js
      type: module
  dashboards:
    bitgrid-ai:
      mode: yaml
      filename: ui-lovelace.yaml
      title: BitGridAI
      icon: mdi:view-dashboard
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ── MQTT ──────────────────────────────────────────────────────────────────────
# Broker wird über HA-UI konfiguriert: Einstellungen → Integrationen → MQTT
# Umbrel-IP aus .env: MQTT_HOST
#
# Temp/Humidity-Sensoren (via Zigbee2MQTT oder andere MQTT-Bridge):
mqtt:
  sensor:
    - name: temp_miner_room
      unique_id: temp_miner_room
      state_topic: "zigbee2mqtt/temp_miner_room"
      value_template: "{{ value_json.temperature | float | round(1) }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      expire_after: 300

    - name: humidity_miner_room
      unique_id: humidity_miner_room
      state_topic: "zigbee2mqtt/temp_miner_room"
      value_template: "{{ value_json.humidity | float | round(1) }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 300

    - name: temp_living_room
      unique_id: temp_living_room
      state_topic: "zigbee2mqtt/temp_living_room"
      value_template: "{{ value_json.temperature | float | round(1) }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      expire_after: 300

    - name: humidity_living_room
      unique_id: humidity_living_room
      state_topic: "zigbee2mqtt/temp_living_room"
      value_template: "{{ value_json.humidity | float | round(1) }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 300

# ── BitGridAI Entscheidungs-Logik ─────────────────────────────────────────────
# Alle Regelparameter als editierbare Helper
input_boolean:
  simulation_mode:
    name: simulation_mode
    icon: mdi:flask
    initial: off
  r3_emergency_stop:
    name: r3_emergency_stop
    icon: mdi:alert
  override_active:
    name: override_active
    icon: mdi:hand
  replay_mode:
    name: replay_mode
    icon: mdi:play-box-multiple

input_select:
  system_state:
    name: system_state
    options:
      - OFF
      - ARMED
      - RUNNING
      - THROTTLED
      - COOLDOWN
      - LOCKOUT
      - SAFE_MODE
      - ERROR
    initial: OFF
  decision_action:
    name: decision_action
    options:
      - START
      - STOP
      - THROTTLE
      - NOOP
    initial: NOOP
  autonomy_level:
    name: autonomy_level
    options:
      - MANUAL
      - ASSIST
      - SEMI_AUTO
      - AUTO
    initial: MANUAL
  override_action:
    name: override_action
    options:
      - START
      - STOP
      - THROTTLE
      - NOOP
    initial: NOOP
  active_miner:
    name: active_miner
    options:
      - BOTH
      - MINER1
      - MINER2
      - NONE
    initial: BOTH

input_number:
  # ── Simulation-Inputs (Slider) ───────────────────────────────────────────
  pv_power_w:
    name: pv_power_w
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 0
  house_load_w:
    name: house_load_w
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 0
  grid_import_w:
    name: grid_import_w
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 0
  battery_soc_pct:
    name: battery_soc_pct
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 50

  # ── Regelparameter ───────────────────────────────────────────────────────
  r1_surplus_min_kw:
    name: r1_surplus_min_kw
    min: 0
    max: 20
    step: 0.1
    mode: box
    initial: 0.5
  r2_soc_soft_min_pct:
    name: r2_soc_soft_min_pct
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 30
  r2_soc_hard_min_pct:
    name: r2_soc_hard_min_pct
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 20
  r2_max_grid_import_w:
    name: r2_max_grid_import_w
    min: 0
    max: 20000
    step: 50
    mode: box
    initial: 300
  r3_max_chip_temp_c:
    name: r3_max_chip_temp_c
    min: 0
    max: 120
    step: 1
    mode: box
    initial: 90
  r3_comm_timeout_sec:
    name: r3_comm_timeout_sec
    min: 0
    max: 600
    step: 5
    mode: box
    initial: 120
  r3_safety_lockout_min:
    name: r3_safety_lockout_min
    min: 0
    max: 120
    step: 1
    mode: box
    initial: 15
  r5_deadband_hold_blocks:
    name: r5_deadband_hold_blocks
    min: 0
    max: 24
    step: 1
    mode: box
    initial: 2
  r5_min_runtime_blocks:
    name: r5_min_runtime_blocks
    min: 0
    max: 24
    step: 1
    mode: box
    initial: 3
  r5_min_pause_blocks:
    name: r5_min_pause_blocks
    min: 0
    max: 24
    step: 1
    mode: box
    initial: 2
  block_minutes:
    name: block_minutes
    min: 1
    max: 60
    step: 1
    mode: box
    initial: 10
  override_duration_min:
    name: override_duration_min
    min: 1
    max: 180
    step: 1
    mode: box
    initial: 30

input_datetime:
  decision_timestamp:
    name: decision_timestamp
    has_date: true
    has_time: true
  deadband_valid_until:
    name: deadband_valid_until
    has_date: true
    has_time: true
  last_start_at:
    name: last_start_at
    has_date: true
    has_time: true
  last_stop_at:
    name: last_stop_at
    has_date: true
    has_time: true
  safety_lockout_until:
    name: safety_lockout_until
    has_date: true
    has_time: true
  override_valid_until:
    name: override_valid_until
    has_date: true
    has_time: true

input_text:
  # ── SMA-Konfiguration ─────────────────────────────────────────────────────
  # Nach SMA-Integration: Entity-ID der Batterie-SoC-Entität eintragen
  sma_battery_entity:
    name: SMA Battery SoC Entity
    max: 100
    initial: "sensor.sma_battery_state_of_charge"
  # ── Entscheidungs-State ───────────────────────────────────────────────────
  decision_reason:
    name: decision_reason
    max: 255
    initial: "Initial state"
  decision_explanation:
    name: decision_explanation
    max: 255
    initial: "System not started"
  decision_code:
    name: decision_code
    max: 120
    initial: "INIT"
  override_status:
    name: override_status
    max: 64
    initial: "inactive"

template:
  # ── Energie-Signale ───────────────────────────────────────────────────────
  - sensor:
      # PV-Leistung: SMA Wechselrichter SN 3012953672
      - name: pv_power_w
        unique_id: pv_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "true"
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            {{ states('input_number.pv_power_w') | float(0) }}
          {% else %}
            {{ states('sensor.sn_3012953672_pv_power') | float(0) }}
          {% endif %}

      # Hauslast: PV + Batterie-Entladung + Netzbezug - Netzeinspeisung - Miner
      - name: house_load_w
        unique_id: house_load_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            {{ states('input_number.house_load_w') | float(0) }}
          {% else %}
            {% set pv    = states('sensor.sn_3012953672_pv_power') | float(0) %}
            {% set bat_d = states('sensor.sn_3015995559_battery_power_discharge_total') | float(0) %}
            {% set bat_c = states('sensor.sn_3015995559_battery_power_charge_total') | float(0) %}
            {% set grid_in  = states('sensor.sn_3015995559_metering_power_absorbed') | float(0) %}
            {% set grid_out = states('sensor.sn_3015995559_metering_power_supplied') | float(0) %}
            {% set miner = states('sensor.miner_total_power_w') | float(0) %}
            {{ ([pv + bat_d - bat_c + grid_in - grid_out - miner, 0] | max) | round(0) }}
          {% endif %}

      # Netzbezug: SMA Batterie-Wechselrichter SN 3015995559
      - name: grid_import_w
        unique_id: grid_import_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            {{ states('input_number.grid_import_w') | float(0) }}
          {% else %}
            {{ states('sensor.sn_3015995559_metering_power_absorbed') | float(0) }}
          {% endif %}

      # Batterie-SoC: SMA Batterie-Wechselrichter SN 3015995559
      - name: battery_soc_pct
        unique_id: battery_soc_pct
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            {{ states('input_number.battery_soc_pct') | float(0) }}
          {% else %}
            {{ states('sensor.sn_3015995559_battery_soc_total') | float(0) }}
          {% endif %}

      # Batterie-Leistung: positiv = laden, negativ = entladen
      - name: battery_power_w
        unique_id: battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            {{ states('input_number.battery_power_w') | float(0) }}
          {% else %}
            {% set charge    = states('sensor.sn_3015995559_battery_power_charge_total') | float(0) %}
            {% set discharge = states('sensor.sn_3015995559_battery_power_discharge_total') | float(0) %}
            {{ (charge - discharge) | round(0) }}
          {% endif %}

      # Überschuss für Regelengine = PV - Hauslast - Netzbezug (ohne Miner)
      - name: surplus_kw
        unique_id: surplus_kw
        unit_of_measurement: "kW"
        state_class: measurement
        state: >-
          {% set pv   = states('sensor.pv_power_w') | float(0) %}
          {% set load = states('sensor.house_load_w') | float(0) %}
          {% set grid = states('sensor.grid_import_w') | float(0) %}
          {{ ((pv - load - grid) / 1000) | round(3) }}

      # Netto-Überschuss (Display) = tatsächliche Netzeinspeisung
      - name: grid_export_w
        unique_id: grid_export_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            0
          {% else %}
            {{ states('sensor.sn_3015995559_metering_power_supplied') | float(0) }}
          {% endif %}

      # Miner-Gesamtleistung (direkt aus cgminer API)
      - name: miner_total_power_w
        unique_id: miner_total_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set m1 = states('sensor.miner1_cur_load') | float(0) %}
          {% set m2 = states('sensor.miner2_cur_load') | float(0) %}
          {{ (m1 + m2) | round(0) }}

      # Maximale Chip-Temp beider Miner
      - name: miner_max_chip_temp_c
        unique_id: miner_max_chip_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >-
          {% set t1 = states('sensor.miner1_tmax') | float(0) %}
          {% set t2 = states('sensor.miner2_tmax') | float(0) %}
          {{ [t1, t2] | max }}

      # Block-Fenster
      - name: block_id
        unique_id: block_id
        state: >-
          {% set block = states('input_number.block_minutes') | int(10) %}
          {% set block = 1 if block < 1 else block %}
          {{ (as_timestamp(now()) // (block * 60)) | int }}

      - name: block_window_start
        unique_id: block_window_start
        state: >-
          {% set block = states('input_number.block_minutes') | int(10) %}
          {% set block = 1 if block < 1 else block %}
          {% set ts = ((as_timestamp(now()) // (block * 60)) * block * 60) | int %}
          {{ ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}

      # Entscheidungs-Sensor (read-only Zusammenfassung)
      - name: bg_decision_action
        unique_id: bg_decision_action
        state: >-
          {% set safety = is_state('binary_sensor.r3_safety_override', 'on') or is_state('binary_sensor.safety_lockout_active', 'on') %}
          {% set override = is_state('input_boolean.override_active', 'on') %}
          {% set override_action = states('input_select.override_action') %}
          {% set r2_hard = is_state('binary_sensor.r2_soc_hard', 'on') %}
          {% set r2_grid = is_state('binary_sensor.r2_grid_import_ok', 'on') %}
          {% set r1 = is_state('binary_sensor.r1_surplus_ok', 'on') %}
          {% set r2_soft = is_state('binary_sensor.r2_soc_soft', 'on') %}
          {% set miners_on = is_state('binary_sensor.miners_any_running', 'on') %}
          {% set min_runtime = is_state('binary_sensor.r5_min_runtime_active', 'on') %}
          {% set min_pause = is_state('binary_sensor.r5_min_pause_active', 'on') %}
          {% set deadband = is_state('binary_sensor.r5_deadband_active', 'on') %}
          {% if safety %}
            STOP
          {% elif override and override_action in ['START', 'STOP', 'THROTTLE', 'NOOP'] %}
            {{ override_action }}
          {% elif (not r2_hard) or (not r2_grid) %}
            STOP
          {% elif miners_on %}
            {% if not r2_soft %}THROTTLE
            {% elif min_runtime or deadband %}NOOP
            {% elif not r1 %}THROTTLE
            {% else %}NOOP
            {% endif %}
          {% else %}
            {% if min_pause or deadband %}NOOP
            {% elif r1 and r2_soft and r2_grid %}START
            {% else %}NOOP
            {% endif %}
          {% endif %}

      - name: bg_decision_priority
        unique_id: bg_decision_priority
        state: >-
          {% set safety = is_state('binary_sensor.r3_safety_override', 'on') or is_state('binary_sensor.safety_lockout_active', 'on') %}
          {% set override = is_state('input_boolean.override_active', 'on') %}
          {% set r2_hard = is_state('binary_sensor.r2_soc_hard', 'on') %}
          {% set r2_grid = is_state('binary_sensor.r2_grid_import_ok', 'on') %}
          {% set r5_hold = is_state('binary_sensor.r5_min_runtime_active', 'on') or is_state('binary_sensor.r5_min_pause_active', 'on') or is_state('binary_sensor.r5_deadband_active', 'on') %}
          {% set r1 = is_state('binary_sensor.r1_surplus_ok', 'on') %}
          {% if safety %}R3_SAFETY
          {% elif override %}OVERRIDE
          {% elif (not r2_hard) or (not r2_grid) %}R2_AUTARKY
          {% elif r5_hold %}R5_STABILITY
          {% elif r1 %}R1_SURPLUS
          {% else %}IDLE
          {% endif %}

      - name: bg_decision_code
        unique_id: bg_decision_code
        state: >-
          {{ states('sensor.bg_decision_action') ~ '_' ~ states('sensor.bg_decision_priority') }}

  # ── Regel-Binärsensoren ───────────────────────────────────────────────────
  - binary_sensor:
      # R1: Überschuss vorhanden
      - name: r1_surplus_ok
        unique_id: r1_surplus_ok
        state: >-
          {{ (states('sensor.surplus_kw') | float(0)) >=
             (states('input_number.r1_surplus_min_kw') | float(0)) }}

      # R2: SoC-Schutz (weich)
      - name: r2_soc_soft
        unique_id: r2_soc_soft
        state: >-
          {{ (states('sensor.battery_soc_pct') | float(0)) >=
             (states('input_number.r2_soc_soft_min_pct') | float(0)) }}

      # R2: SoC-Schutz (hart)
      - name: r2_soc_hard
        unique_id: r2_soc_hard
        state: >-
          {{ (states('sensor.battery_soc_pct') | float(0)) >=
             (states('input_number.r2_soc_hard_min_pct') | float(0)) }}

      # R2: Netzimport-Schutz
      - name: r2_grid_import_ok
        unique_id: r2_grid_import_ok
        state: >-
          {{ (states('sensor.grid_import_w') | float(0)) <=
             (states('input_number.r2_max_grid_import_w') | float(0)) }}

      # R3: Übertemperatur (max beider Miner)
      - name: r3_overtemp
        unique_id: r3_overtemp
        state: >-
          {{ (states('sensor.miner_max_chip_temp_c') | float(0)) >=
             (states('input_number.r3_max_chip_temp_c') | float(0)) }}

      # R3: Kommunikationsausfall (mindestens ein Miner offline)
      - name: r3_comm_timeout
        unique_id: r3_comm_timeout
        state: >-
          {{ is_state('binary_sensor.miner1_available', 'off') or
             is_state('binary_sensor.miner2_available', 'off') }}

      # R3: Notfall-Stop
      - name: r3_emergency_stop
        unique_id: r3_emergency_stop
        state: "{{ is_state('input_boolean.r3_emergency_stop', 'on') }}"

      # R3: Safety-Override (kombiniert)
      - name: r3_safety_override
        unique_id: r3_safety_override
        state: >-
          {{ is_state('binary_sensor.r3_overtemp', 'on') or
             is_state('binary_sensor.r3_comm_timeout', 'on') or
             is_state('binary_sensor.r3_emergency_stop', 'on') }}

      # Safety-Lockout aktiv
      - name: safety_lockout_active
        unique_id: safety_lockout_active
        state: >-
          {% set until = states('input_datetime.safety_lockout_until') %}
          {% if until in ['unknown', 'unavailable', ''] %}false
          {% else %}{{ as_timestamp(now()) < as_timestamp(until) }}
          {% endif %}

      # Miner läuft (mindestens einer)
      - name: miners_any_running
        unique_id: miners_any_running
        state: >-
          {{ states('sensor.miner1_workmode_status') in ['Eco', 'Standard', 'Super'] or
             states('sensor.miner2_workmode_status') in ['Eco', 'Standard', 'Super'] }}

      # R5: Deadband
      - name: r5_deadband_active
        unique_id: r5_deadband_active
        state: >-
          {% set until = states('input_datetime.deadband_valid_until') %}
          {% if until in ['unknown', 'unavailable', ''] %}false
          {% else %}{{ as_timestamp(now()) < as_timestamp(until) }}
          {% endif %}

      # R5: Mindest-Laufzeit
      - name: r5_min_runtime_active
        unique_id: r5_min_runtime_active
        state: >-
          {% set started = states('input_datetime.last_start_at') %}
          {% if not is_state('binary_sensor.miners_any_running', 'on') or started in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {% set start_ts = as_timestamp(started) %}
            {% set hold_blocks = states('input_number.r5_min_runtime_blocks') | int(0) %}
            {% set block_minutes = states('input_number.block_minutes') | int(10) %}
            {{ as_timestamp(now()) < (start_ts + (hold_blocks * block_minutes * 60)) }}
          {% endif %}

      # R5: Mindest-Pause
      - name: r5_min_pause_active
        unique_id: r5_min_pause_active
        state: >-
          {% set stopped = states('input_datetime.last_stop_at') %}
          {% if is_state('binary_sensor.miners_any_running', 'on') or stopped in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {% set stop_ts = as_timestamp(stopped) %}
            {% set hold_blocks = states('input_number.r5_min_pause_blocks') | int(0) %}
            {% set block_minutes = states('input_number.block_minutes') | int(10) %}
            {{ as_timestamp(now()) < (stop_ts + (hold_blocks * block_minutes * 60)) }}
          {% endif %}
