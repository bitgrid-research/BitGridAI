input_text:
  # ── SMA-Konfiguration ─────────────────────────────────────────────────────
  # Nach SMA-Integration: Entity-ID der Batterie-SoC-Entität eintragen
  sma_battery_entity:
    name: SMA Battery SoC Entity
    max: 100
    initial: "sensor.sma_battery_state_of_charge"
  # ── Entscheidungs-State ───────────────────────────────────────────────────
  decision_reason:
    name: decision_reason
    max: 255
    initial: "Initial state"
  decision_explanation:
    name: decision_explanation
    max: 255
    initial: "System not started"
  decision_code:
    name: decision_code
    max: 120
    initial: "INIT"
  override_status:
    name: override_status
    max: 64
    initial: "inactive"

template:
  # ── Energie-Signale ───────────────────────────────────────────────────────
  - sensor:
      # PV-Leistung: SMA Wechselrichter SN 3012953672 (Production - immer echte Daten)
      - name: pv_power_w
        unique_id: pv_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "true"
        state: "{{ states('sensor.sn_3012953672_pv_power') | float(0) }}"

      # Hauslast: PV + Batterie-Entladung + Netzbezug - Netzeinspeisung - Miner (Production - immer echte Daten)
      - name: house_load_w
        unique_id: house_load_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set pv    = states('sensor.sn_3012953672_pv_power') | float(0) %}
          {% set bat_d = states('sensor.sn_3015995559_battery_power_discharge_total') | float(0) %}
          {% set bat_c = states('sensor.sn_3015995559_battery_power_charge_total') | float(0) %}
          {% set grid_in  = states('sensor.sn_3015995559_metering_power_absorbed') | float(0) %}
          {% set grid_out = states('sensor.sn_3015995559_metering_power_supplied') | float(0) %}
          {% set miner = states('sensor.miner_total_power_w') | float(0) %}
          {{ ([pv + bat_d - bat_c + grid_in - grid_out - miner, 0] | max) | round(0) }}

      # Netzbezug: SMA Batterie-Wechselrichter SN 3015995559 (Production - immer echte Daten)
      - name: grid_import_w
        unique_id: grid_import_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.sn_3015995559_metering_power_absorbed') | float(0) }}"

      # Batterie-SoC: SMA Batterie-Wechselrichter SN 3015995559 (Production - immer echte Daten)
      - name: battery_soc_pct
        unique_id: battery_soc_pct
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: "{{ states('sensor.sn_3015995559_battery_soc_total') | float(0) }}"

      # Batterie-Leistung: positiv = laden, negativ = entladen (Production - immer echte Daten)
      - name: battery_power_w
        unique_id: battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set charge    = states('sensor.sn_3015995559_battery_power_charge_total') | float(0) %}
          {% set discharge = states('sensor.sn_3015995559_battery_power_discharge_total') | float(0) %}
          {{ (charge - discharge) | round(0) }}

      # Batterie-Leistung für Flowchart: positiv = entladen (power-flow-card-plus Konvention)
      # battery_power_w nutzt positiv=laden; der Flowchart erwartet positiv=entladen → invertiert (Production - immer echte Daten)
      - name: battery_power_flowchart_w
        unique_id: battery_power_flowchart_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set charge    = states('sensor.sn_3015995559_battery_power_charge_total') | float(0) %}
          {% set discharge = states('sensor.sn_3015995559_battery_power_discharge_total') | float(0) %}
          {{ (discharge - charge) | round(0) }}

      # Überschuss für Regelengine = PV - Hauslast - Netzbezug (ohne Miner)
      - name: surplus_kw
        unique_id: surplus_kw
        unit_of_measurement: "kW"
        state_class: measurement
        state: >-
          {% set pv   = states('sensor.pv_power_w') | float(0) %}
          {% set load = states('sensor.house_load_w') | float(0) %}
          {% set grid = states('sensor.grid_import_w') | float(0) %}
          {{ ((pv - load - grid) / 1000) | round(3) }}

      # ── Simulation-Sensoren (dediziert für Simulation Dashboard) ───────────
      # PV Power Simulation
      - name: sim_pv_power_w
        unique_id: sim_pv_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_pv_power_w') | float(0) }}"

      # House Load Simulation
      - name: sim_house_load_w
        unique_id: sim_house_load_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_house_load_w') | float(0) }}"

      # Grid Import Simulation
      - name: sim_grid_import_w
        unique_id: sim_grid_import_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_grid_import_w') | float(0) }}"

      # Grid Export Simulation
      - name: sim_grid_export_w
        unique_id: sim_grid_export_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_grid_export_w') | float(0) }}"

      # Battery SoC Simulation
      - name: sim_battery_soc_pct
        unique_id: sim_battery_soc_pct
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: "{{ states('input_number.sim_battery_soc_pct') | float(0) }}"

      # Battery Power Simulation (positiv = laden, negativ = entladen)
      - name: sim_battery_power_w
        unique_id: sim_battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_battery_power_w') | float(0) }}"

      # Battery Power Flowchart Simulation (positiv = entladen für power-flow-card)
      - name: sim_battery_power_flowchart_w
        unique_id: sim_battery_power_flowchart_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ -(states('input_number.sim_battery_power_w') | float(0)) | round(0) }}"

      # Miner Power Simulation
      - name: sim_miner_power_w
        unique_id: sim_miner_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_miner_power_w') | float(0) }}"

      # Heizstab Power Simulation
      - name: sim_heizstab_power_w
        unique_id: sim_heizstab_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.sim_heizstab_power_w') | float(0) }}"

      # Miner Chip Temperature Simulation
      - name: sim_miner_chip_temp_c
        unique_id: sim_miner_chip_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: "{{ states('input_number.sim_miner_chip_temp_c') | float(0) }}"

      # Simulated Surplus (for simulation rule testing)
      - name: sim_surplus_kw
        unique_id: sim_surplus_kw
        unit_of_measurement: "kW"
        state_class: measurement
        state: >-
          {% set pv   = states('input_number.sim_pv_power_w') | float(0) %}
          {% set load = states('input_number.sim_house_load_w') | float(0) %}
          {% set grid = states('input_number.sim_grid_import_w') | float(0) %}
          {{ ((pv - load - grid) / 1000) | round(3) }}

      # Netto-Überschuss (Display) = tatsächliche Netzeinspeisung (Production - immer echte Daten)
      - name: grid_export_w
        unique_id: grid_export_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.sn_3015995559_metering_power_supplied') | float(0) }}"

      # Miner-Gesamtleistung (Shelly Plug S Gen 3 — realer Wandverbrauch AC) (Production - immer echte Daten)
      - name: miner_total_power_w
        unique_id: miner_total_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set m1 = states('sensor.shellyplugsg3_dcb4d9c5567c_leistung') | float(0) %}
          {% set m2 = states('sensor.shellyplugsg3_d0cf13d86254_leistung') | float(0) %}
          {{ (m1 + m2) | round(0) }}

      # Maximale Chip-Temp beider Miner (Production - immer echte Daten)
      - name: miner_max_chip_temp_c
        unique_id: miner_max_chip_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >-
          {% set t1 = states('sensor.miner1_tmax') | float(0) %}
          {% set t2 = states('sensor.miner2_tmax') | float(0) %}
          {{ [t1, t2] | max }}

      # Heizstab-Leistung: AC Elwa 2 (Production - immer echte Daten)
      - name: ac_elwa_2_192_168_178_58_power1_solar
        unique_id: ac_elwa_2_192_168_178_58_power1_solar
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.ac_elwa_2_192_168_178_58_power1_solar') | float(0) }}"

      # Block-Fenster
      - name: block_id
        unique_id: block_id
        state: >-
          {% set block = states('input_number.block_minutes') | int(10) %}
          {% set block = 1 if block < 1 else block %}
          {{ (as_timestamp(now()) // (block * 60)) | int }}

      - name: block_window_start
        unique_id: block_window_start
        state: >-
          {% set block = states('input_number.block_minutes') | int(10) %}
          {% set block = 1 if block < 1 else block %}
          {% set ts = ((as_timestamp(now()) // (block * 60)) * block * 60) | int %}
          {{ ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}

      # Entscheidungs-Sensor (read-only Zusammenfassung)
      - name: bg_decision_action
        unique_id: bg_decision_action
        state: >-
          {% set safety = is_state('binary_sensor.r3_safety_override', 'on') or is_state('binary_sensor.safety_lockout_active', 'on') %}
          {% set override = is_state('input_boolean.override_active', 'on') %}
          {% set override_action = states('input_select.override_action') %}
          {% set r2_hard = is_state('binary_sensor.r2_soc_hard', 'on') %}
          {% set r2_grid = is_state('binary_sensor.r2_grid_import_ok', 'on') %}
          {% set r1 = is_state('binary_sensor.r1_surplus_ok', 'on') %}
          {% set r2_soft = is_state('binary_sensor.r2_soc_soft', 'on') %}
          {% set miners_on = is_state('binary_sensor.miners_any_running', 'on') %}
          {% set min_runtime = is_state('binary_sensor.r5_min_runtime_active', 'on') %}
          {% set min_pause = is_state('binary_sensor.r5_min_pause_active', 'on') %}
          {% set deadband = is_state('binary_sensor.r5_deadband_active', 'on') %}
          {% if safety %}
            STOP
          {% elif override and override_action in ['START', 'STOP', 'THROTTLE', 'NOOP'] %}
            {{ override_action }}
          {% elif (not r2_hard) or (not r2_grid) %}
            STOP
          {% elif miners_on %}
            {% if not r2_soft %}THROTTLE
            {% elif min_runtime or deadband %}NOOP
            {% elif not r1 %}THROTTLE
            {% else %}NOOP
            {% endif %}
          {% else %}
            {% if min_pause or deadband %}NOOP
            {% elif r1 and r2_soft and r2_grid %}START
            {% else %}NOOP
            {% endif %}
          {% endif %}

      - name: bg_decision_priority
        unique_id: bg_decision_priority
        state: >-
          {% set safety = is_state('binary_sensor.r3_safety_override', 'on') or is_state('binary_sensor.safety_lockout_active', 'on') %}
          {% set override = is_state('input_boolean.override_active', 'on') %}
          {% set r2_hard = is_state('binary_sensor.r2_soc_hard', 'on') %}
          {% set r2_grid = is_state('binary_sensor.r2_grid_import_ok', 'on') %}
          {% set r5_hold = is_state('binary_sensor.r5_min_runtime_active', 'on') or is_state('binary_sensor.r5_min_pause_active', 'on') or is_state('binary_sensor.r5_deadband_active', 'on') %}
          {% set r1 = is_state('binary_sensor.r1_surplus_ok', 'on') %}
          {% if safety %}R3_SAFETY
          {% elif override %}OVERRIDE
          {% elif (not r2_hard) or (not r2_grid) %}R2_AUTARKY
          {% elif r5_hold %}R5_STABILITY
          {% elif r1 %}R1_SURPLUS
          {% else %}IDLE
          {% endif %}

      - name: bg_decision_code
        unique_id: bg_decision_code
        state: >-
          {{ states('sensor.bg_decision_action') ~ '_' ~ states('sensor.bg_decision_priority') }}

  # ── Regel-Binärsensoren ───────────────────────────────────────────────────
  - binary_sensor:
      # R1: Überschuss vorhanden
      - name: r1_surplus_ok
        unique_id: r1_surplus_ok
        state: >-
          {{ (states('sensor.surplus_kw') | float(0)) >=
             (states('input_number.r1_surplus_min_kw') | float(0)) }}

      # R2: SoC-Schutz (weich)
      - name: r2_soc_soft
        unique_id: r2_soc_soft
        state: >-
          {{ (states('sensor.battery_soc_pct') | float(0)) >=
             (states('input_number.r2_soc_soft_min_pct') | float(0)) }}

      # R2: SoC-Schutz (hart)
      - name: r2_soc_hard
        unique_id: r2_soc_hard
        state: >-
          {{ (states('sensor.battery_soc_pct') | float(0)) >=
             (states('input_number.r2_soc_hard_min_pct') | float(0)) }}

      # R2: Netzimport-Schutz
      - name: r2_grid_import_ok
        unique_id: r2_grid_import_ok
        state: >-
          {{ (states('sensor.grid_import_w') | float(0)) <=
             (states('input_number.r2_max_grid_import_w') | float(0)) }}

      # R3: Übertemperatur (max beider Miner)
      - name: r3_overtemp
        unique_id: r3_overtemp
        state: >-
          {{ (states('sensor.miner_max_chip_temp_c') | float(0)) >=
             (states('input_number.r3_max_chip_temp_c') | float(0)) }}

      # R3: Kommunikationsausfall (mindestens ein Miner offline)
      - name: r3_comm_timeout
        unique_id: r3_comm_timeout
        state: >-
          {{ is_state('binary_sensor.miner1_available', 'off') or
             is_state('binary_sensor.miner2_available', 'off') }}

      # R3: Notfall-Stop
      - name: r3_emergency_stop
        unique_id: r3_emergency_stop
        state: "{{ is_state('input_boolean.r3_emergency_stop', 'on') }}"

      # R3: Safety-Override (kombiniert)
      - name: r3_safety_override
        unique_id: r3_safety_override
        state: >-
          {{ is_state('binary_sensor.r3_overtemp', 'on') or
             is_state('binary_sensor.r3_comm_timeout', 'on') or
             is_state('binary_sensor.r3_emergency_stop', 'on') }}

      # Safety-Lockout aktiv
      - name: safety_lockout_active
        unique_id: safety_lockout_active
        state: >-
          {% set until = states('input_datetime.safety_lockout_until') %}
          {% if until in ['unknown', 'unavailable', ''] %}false
          {% else %}{{ as_timestamp(now()) < as_timestamp(until) }}
          {% endif %}

      # Miner läuft (mindestens einer)
      - name: miners_any_running
        unique_id: miners_any_running
        state: >-
          {{ states('sensor.miner1_workmode_status') in ['Eco', 'Standard', 'Super'] or
             states('sensor.miner2_workmode_status') in ['Eco', 'Standard', 'Super'] }}

      # R5: Deadband
      - name: r5_deadband_active
        unique_id: r5_deadband_active
        state: >-
          {% set until = states('input_datetime.deadband_valid_until') %}
          {% if until in ['unknown', 'unavailable', ''] %}false
          {% else %}{{ as_timestamp(now()) < as_timestamp(until) }}
          {% endif %}

      # R5: Mindest-Laufzeit
      - name: r5_min_runtime_active
        unique_id: r5_min_runtime_active
        state: >-
          {% set started = states('input_datetime.last_start_at') %}
          {% if not is_state('binary_sensor.miners_any_running', 'on') or started in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {% set start_ts = as_timestamp(started) %}
            {% set hold_blocks = states('input_number.r5_min_runtime_blocks') | int(0) %}
            {% set block_minutes = states('input_number.block_minutes') | int(10) %}
            {{ as_timestamp(now()) < (start_ts + (hold_blocks * block_minutes * 60)) }}
          {% endif %}

      # Mining aktiv (für History Stats)
      - name: miners_in_super
        unique_id: miners_in_super
        state: >-
          {{ states('sensor.miner1_workmode_status') == 'Super' or
             states('sensor.miner2_workmode_status') == 'Super' }}

      - name: miners_in_eco
        unique_id: miners_in_eco
        state: >-
          {{ states('sensor.miner1_workmode_status') == 'Eco' or
             states('sensor.miner2_workmode_status') == 'Eco' }}

      # R5: Mindest-Pause
      - name: r5_min_pause_active
        unique_id: r5_min_pause_active
        state: >-
          {% set stopped = states('input_datetime.last_stop_at') %}
          {% if is_state('binary_sensor.miners_any_running', 'on') or stopped in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {% set stop_ts = as_timestamp(stopped) %}
            {% set hold_blocks = states('input_number.r5_min_pause_blocks') | int(0) %}
            {% set block_minutes = states('input_number.block_minutes') | int(10) %}
            {{ as_timestamp(now()) < (stop_ts + (hold_blocks * block_minutes * 60)) }}
          {% endif %}

      # ── Simulation Binary Sensors ───────────────────────────────────────────
      # R1: Überschuss vorhanden (Simulation)
      - name: sim_r1_surplus_ok
        unique_id: sim_r1_surplus_ok
        state: >-
          {{ (states('sensor.sim_surplus_kw') | float(0)) >=
             (states('input_number.sim_r1_surplus_min_kw') | float(0)) }}

      # R2: SoC-Schutz (weich) (Simulation)
      - name: sim_r2_soc_soft
        unique_id: sim_r2_soc_soft
        state: >-
          {{ (states('sensor.sim_battery_soc_pct') | float(0)) >=
             (states('input_number.sim_r2_soc_soft_min_pct') | float(0)) }}

      # R2: SoC-Schutz (hart) (Simulation)
      - name: sim_r2_soc_hard
        unique_id: sim_r2_soc_hard
        state: >-
          {{ (states('sensor.sim_battery_soc_pct') | float(0)) >=
             (states('input_number.sim_r2_soc_hard_min_pct') | float(0)) }}

      # R2: Netzimport-Schutz (Simulation)
      - name: sim_r2_grid_import_ok
        unique_id: sim_r2_grid_import_ok
        state: >-
          {{ (states('sensor.sim_grid_import_w') | float(0)) <=
             (states('input_number.sim_r2_max_grid_import_w') | float(0)) }}

      # R3: Übertemperatur (Simulation)
      - name: sim_r3_overtemp
        unique_id: sim_r3_overtemp
        state: >-
          {{ (states('sensor.sim_miner_chip_temp_c') | float(0)) >=
             (states('input_number.sim_r3_max_chip_temp_c') | float(0)) }}

      # R3: Safety-Override (Simulation)
      - name: sim_r3_safety_override
        unique_id: sim_r3_safety_override
        state: >-
          {{ is_state('binary_sensor.sim_r3_overtemp', 'on') or
             is_state('input_boolean.r3_emergency_stop', 'on') }}

  # ── Simulation Mode Sensors (mirrors Production: reads from input_select entity) ───
  - sensor:
      # Sim Miner 1 Mode Status - reads directly from input_select (mirrors production reading from miner API)
      - name: sim_miner1_workmode_status
        unique_id: sim_miner1_workmode_status
        state: "{{ states('input_select.sim_miner1_workmode_set') | default('Standby') }}"
        icon: mdi:pickaxe

      # Sim Miner 2 Mode Status - reads directly from input_select (mirrors production reading from miner API)
      - name: sim_miner2_workmode_status
        unique_id: sim_miner2_workmode_status
        state: "{{ states('input_select.sim_miner2_workmode_set') | default('Standby') }}"
        icon: mdi:pickaxe

      # Sim Miner 1 Mode Power - auto-calculated based on mode
      - name: sim_miner1_mode_power_w
        unique_id: sim_miner1_mode_power_w
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set mode = states('sensor.sim_miner1_workmode_status') %}
          {% if mode == 'Eco' %}
            {{ states('input_number.sim_miner_eco_power_w') | float(300) }}
          {% elif mode == 'Standard' %}
            {{ states('input_number.sim_miner_standard_power_w') | float(600) }}
          {% elif mode == 'Super' %}
            {{ states('input_number.sim_miner_super_power_w') | float(1200) }}
          {% else %}
            0
          {% endif %}

      # Sim Miner Total Power - both miners combined
      - name: sim_miner_total_power_w
        unique_id: sim_miner_total_power_w
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set m1 = states('sensor.sim_miner1_mode_power_w') | float(0) %}
          {% set m2 = states('sensor.sim_miner2_workmode_status') %}
          {% set m2_power = 0 %}
          {% if m2 == 'Eco' %}
            {% set m2_power = states('input_number.sim_miner_eco_power_w') | float(300) %}
          {% elif m2 == 'Standard' %}
            {% set m2_power = states('input_number.sim_miner_standard_power_w') | float(600) %}
          {% elif m2 == 'Super' %}
            {% set m2_power = states('input_number.sim_miner_super_power_w') | float(1200) %}
          {% endif %}
          {{ (m1 + m2_power) | round(0) }}

      # Miner läuft (Simulation) - based on auto-calculated mode
      - name: sim_miners_any_running
        unique_id: sim_miners_any_running
        state: >-
          {{ states('sensor.sim_miner1_workmode_status') in ['Eco', 'Standard', 'Super'] or
             states('sensor.sim_miner2_workmode_status') in ['Eco', 'Standard', 'Super'] }}

  # ── Simulation Entscheidungs-Sensoren ───────────────────────────────────────
  - sensor:
      # Simulierte Entscheidungs-Action
      - name: sim_bg_decision_action
        unique_id: sim_bg_decision_action
        state: >-
          {% set safety = is_state('binary_sensor.sim_r3_safety_override', 'on') %}
          {% set r2_hard = is_state('binary_sensor.sim_r2_soc_hard', 'on') %}
          {% set r2_grid = is_state('binary_sensor.sim_r2_grid_import_ok', 'on') %}
          {% set r1 = is_state('binary_sensor.sim_r1_surplus_ok', 'on') %}
          {% set r2_soft = is_state('binary_sensor.sim_r2_soc_soft', 'on') %}
          {% set miners_on = is_state('binary_sensor.sim_miners_any_running', 'on') %}
          {% if safety %}
            STOP
          {% elif (not r2_hard) or (not r2_grid) %}
            STOP
          {% elif miners_on %}
            {% if not r2_soft %}THROTTLE
            {% elif not r1 %}THROTTLE
            {% else %}NOOP
            {% endif %}
          {% else %}
            {% if r1 and r2_soft and r2_grid %}START
            {% else %}NOOP
            {% endif %}
          {% endif %}

      # Simulierte Entscheidungs-Priority
      - name: sim_bg_decision_priority
        unique_id: sim_bg_decision_priority
        state: >-
          {% set safety = is_state('binary_sensor.sim_r3_safety_override', 'on') %}
          {% set r2_hard = is_state('binary_sensor.sim_r2_soc_hard', 'on') %}
          {% set r2_grid = is_state('binary_sensor.sim_r2_grid_import_ok', 'on') %}
          {% set r1 = is_state('binary_sensor.sim_r1_surplus_ok', 'on') %}
          {% if safety %}R3_SAFETY
          {% elif (not r2_hard) or (not r2_grid) %}R2_AUTARKY
          {% elif r1 %}R1_SURPLUS
          {% else %}IDLE
          {% endif %}

      # Simulierte Entscheidungs-Code
      - name: sim_bg_decision_code
        unique_id: sim_bg_decision_code
        state: >-
          {{ states('sensor.sim_bg_decision_action') ~ '_' ~ states('sensor.sim_bg_decision_priority') }}

# ── Energie-Integration (W → kWh, Riemann-Summe) ─────────────────────────────
# Liefert kumulative kWh-Werte als Tagesbasis (Midnight-Delta in stats.yaml)
sensor:
  - platform: integration
    source: sensor.pv_power_w
    name: pv_energy_integral
    unique_id: pv_energy_integral
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.miner_total_power_w
    name: mining_energy_integral
    unique_id: mining_energy_integral
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.grid_import_w
    name: grid_import_integral
    unique_id: grid_import_integral
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.grid_export_w
    name: grid_export_integral
    unique_id: grid_export_integral
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.house_load_w
    name: house_energy_integral
    unique_id: house_energy_integral
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: integration
    source: sensor.ac_elwa_2_192_168_178_58_power1_solar
    name: heizstab_energy_integral
    unique_id: heizstab_energy_integral
    unit_prefix: k
    round: 3
    method: trapezoidal
