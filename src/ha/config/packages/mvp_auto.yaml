mvp_auto:

  # ── Konfigurierbare SoC-Schwellwerte ──────────────────────────────────────
  input_number:
    mvp_soc_eco_start_pct:
      name: "Eco-Start SoC (%)"
      min: 0
      max: 100
      step: 5
      mode: box
      initial: 65
      icon: mdi:battery-charging-60

    mvp_pv_start_w:
      name: "Eco-Start PV (W)"
      min: 0
      max: 15000
      step: 500
      mode: box
      initial: 6000
      icon: mdi:solar-power

    mvp_soc_super_pct:
      name: "Super-Start SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 90
      icon: mdi:battery

    mvp_soc_super_stop_pct:
      name: "Super-Stop SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 85
      icon: mdi:battery-arrow-down

    mvp_soc_stop_pct:
      name: "Stop SoC (%)"
      min: 0
      max: 100
      step: 5
      mode: box
      initial: 60
      icon: mdi:battery-alert

    lueftung_cooldown_end_ts:
      name: "Lüftung Cooldown Ende (Timestamp)"
      min: 0
      max: 9999999999
      step: 1
      mode: box
      initial: 0
      icon: mdi:timer-off

    mvp_miner1_last_upgrade_ts:
      name: "Miner 1 letzter Upgrade (Timestamp)"
      min: 0
      max: 9999999999
      step: 1
      mode: box
      initial: 0
      icon: mdi:arrow-up-circle

    mvp_miner1_last_downgrade_ts:
      name: "Miner 1 letzter Downgrade (Timestamp)"
      min: 0
      max: 9999999999
      step: 1
      mode: box
      initial: 0
      icon: mdi:arrow-down-circle

    mvp_miner2_last_upgrade_ts:
      name: "Miner 2 letzter Upgrade (Timestamp)"
      min: 0
      max: 9999999999
      step: 1
      mode: box
      initial: 0
      icon: mdi:arrow-up-circle

    mvp_miner2_last_downgrade_ts:
      name: "Miner 2 letzter Downgrade (Timestamp)"
      min: 0
      max: 9999999999
      step: 1
      mode: box
      initial: 0
      icon: mdi:arrow-down-circle

    mvp_tmax_eco_threshold_c:
      name: "TMax Eco-Sicherheitsschwelle (°C)"
      min: 100
      max: 120
      step: 1
      mode: box
      initial: 113
      icon: mdi:thermometer-alert

    mvp_room_temp_eco_threshold_c:
      name: "Raumtemp Eco-Sicherheitsschwelle (°C)"
      min: 25
      max: 40
      step: 0.5
      mode: box
      initial: 31
      icon: mdi:home-thermometer-outline

  input_boolean:
    mvp_night_block_enabled:
      name: "Nacht-Sperre (Mining)"
      icon: mdi:weather-night
      initial: true

  input_datetime:
    mvp_night_block_start:
      name: "Nacht-Sperre Start"
      has_time: true
      has_date: false
      icon: mdi:weather-night
      initial: "22:00:00"
    mvp_night_block_end:
      name: "Nacht-Sperre Ende"
      has_time: true
      has_date: false
      icon: mdi:weather-sunset-up
      initial: "06:00:00"

  template:
    - sensor:
        - name: "Miner 1 Cooldown Status"
          unique_id: mvp_miner1_cooldown_status
          icon: mdi:timer-lock
          state: >
            {% set now_ts = now().timestamp() %}
            {% set up_rem = (states('input_number.mvp_miner1_last_upgrade_ts') | float(0) + 1800 - now_ts) | int %}
            {% set dn_rem = (states('input_number.mvp_miner1_last_downgrade_ts') | float(0) + 1800 - now_ts) | int %}
            {% if up_rem > 0 %}
              ↑ {{ '%d:%02d' | format(up_rem // 60, up_rem % 60) }}
            {% elif dn_rem > 0 %}
              ↓ {{ '%d:%02d' | format(dn_rem // 60, dn_rem % 60) }}
            {% else %}
              —
            {% endif %}

        - name: "Miner 2 Cooldown Status"
          unique_id: mvp_miner2_cooldown_status
          icon: mdi:timer-lock
          state: >
            {% set now_ts = now().timestamp() %}
            {% set up_rem = (states('input_number.mvp_miner2_last_upgrade_ts') | float(0) + 1800 - now_ts) | int %}
            {% set dn_rem = (states('input_number.mvp_miner2_last_downgrade_ts') | float(0) + 1800 - now_ts) | int %}
            {% if up_rem > 0 %}
              ↑ {{ '%d:%02d' | format(up_rem // 60, up_rem % 60) }}
            {% elif dn_rem > 0 %}
              ↓ {{ '%d:%02d' | format(dn_rem // 60, dn_rem % 60) }}
            {% else %}
              —
            {% endif %}

        - name: "Lüftung Status"
          unique_id: lueftung_status_display
          icon: mdi:fan
          state: >
            {% set m1 = states('sensor.miner1_workmode_status') in ['Eco', 'Standard', 'Super'] %}
            {% set m2 = states('sensor.miner2_workmode_status') in ['Eco', 'Standard', 'Super'] %}
            {% if m1 or m2 %}
              Aktiv
            {% elif states('switch.shellyplugsg3_dcb4d9c6b46c') == 'on' %}
              {% set remaining = (states('input_number.lueftung_cooldown_end_ts') | float(0) - now().timestamp()) | int %}
              {% if remaining > 0 %}
                {{ '%d:%02d' | format(remaining // 60, remaining % 60) }}
              {% else %}
                Aus
              {% endif %}
            {% else %}
              Aus
            {% endif %}

    - binary_sensor:
        - name: "MVP Nacht-Sperre aktiv"
          unique_id: mvp_night_block_active
          icon: mdi:weather-night
          state: >
            {% set now_min   = now().hour * 60 + now().minute %}
            {% set s = states('input_datetime.mvp_night_block_start') %}
            {% set e = states('input_datetime.mvp_night_block_end') %}
            {% set start_min = s.split(':')[0] | int(0) * 60 + s.split(':')[1] | int(0) %}
            {% set end_min   = e.split(':')[0] | int(0) * 60 + e.split(':')[1] | int(0) %}
            {% if start_min > end_min %}
              {% set in_block = now_min >= start_min or now_min < end_min %}
            {% else %}
              {% set in_block = now_min >= start_min and now_min < end_min %}
            {% endif %}
            {{ states('input_boolean.mvp_night_block_enabled') == 'on' and in_block }}

  automation:

    # ── Miner 1: Steuerungs-Automation ────────────────────────────────────
    - id: mvp_miner1_watchdog
      alias: "MVP: Miner 1 Watchdog"
      description: >
        Prüft SoC/PV und setzt Workmode von Miner 1.
        Priorität: Stop > Super > Super-Downgrade > Eco-Start
      mode: single
      trigger:
        - platform: time_pattern
          minutes: "/2"
        - platform: homeassistant
          event: start
        - platform: state
          entity_id: sensor.battery_soc_pct
        - platform: state
          entity_id: sensor.pv_power_w
      condition:
        - condition: state
          entity_id: input_boolean.miner1_auto_load_management
          state: "on"
      action:
        - variables:
            soc: "{{ states('sensor.battery_soc_pct') | float(0) }}"
            pv: "{{ states('sensor.pv_power_w') | float(0) }}"
            soc_start: "{{ states('input_number.mvp_soc_eco_start_pct') | float(65) }}"
            pv_start: "{{ states('input_number.mvp_pv_start_w') | float(6000) }}"
            soc_super_on: "{{ states('input_number.mvp_soc_super_pct') | float(90) }}"
            soc_super_off: "{{ states('input_number.mvp_soc_super_stop_pct') | float(85) }}"
            soc_stop: "{{ states('input_number.mvp_soc_stop_pct') | float(60) }}"
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
            m1_select: "{{ states('select.miner1_workmode_set') }}"
            m1_up_ts: "{{ states('input_number.mvp_miner1_last_upgrade_ts') | float(0) }}"
            m1_dn_ts: "{{ states('input_number.mvp_miner1_last_downgrade_ts') | float(0) }}"
            now_ts: "{{ now().timestamp() }}"
            cooldown_sec: 1800

        - action: system_log.write
          data:
            message: >
              [mvp-miner1] trigger={{ trigger.platform }}
              soc={{ soc }}% pv={{ pv }}W
              status={{ m1_status }} select={{ m1_select }}
              thresholds: stop={{ soc_stop }} start={{ soc_start }} super={{ soc_super_on }}
              up_cd={{ [0, (m1_up_ts + cooldown_sec - now_ts) | int] | max }}s
              dn_cd={{ [0, (m1_dn_ts + cooldown_sec - now_ts) | int] | max }}s
            level: warning

        - choose:
            # P1: SoC zu niedrig → Standby (kein Cooldown — Sicherheit geht vor)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_stop }}"
              sequence:
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P1 Stop: soc={{ soc }}% < {{ soc_stop }}% — status={{ m1_status }}"
                    level: warning
                - condition: template
                  value_template: "{{ m1_status not in ['Standby', 'Off'] }}"
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Standby
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner1_last_downgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('sensor.miner2_workmode_status') in ['Standby', 'Off', 'Idle'] }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_stop_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P2: Akku voll → Super (blockiert wenn Downgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc >= soc_super_on }}"
              sequence:
                - condition: template
                  value_template: "{{ m1_status != 'Super' }}"
                - condition: template
                  value_template: "{{ (now_ts - m1_dn_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P2 Super: soc={{ soc }}% >= {{ soc_super_on }}% — status={{ m1_status }}"
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Super
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner1_last_upgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"

            # P3: Super-Deadband unterschritten → Eco (blockiert wenn Upgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_super_off and m1_status == 'Super' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m1_up_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P3 Super→Eco: soc={{ soc }}% < {{ soc_super_off }}%"
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Eco
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner1_last_downgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"

            # P4: SoC ok ODER PV stark genug, Miner aus → Eco starten (blockiert wenn Downgrade-Cooldown aktiv oder Nacht-Sperre)
            # SoC-basierter Start bypasses Cooldown — SoC ist ein stabiler Zustand, kein Flapping-Risiko
            - conditions:
                - condition: state
                  entity_id: binary_sensor.mvp_nacht_sperre_aktiv
                  state: "off"
                - condition: template
                  value_template: >
                    {{ (soc >= soc_start or pv >= pv_start) and
                       m1_status in ['Standby', 'Idle', 'Off'] }}
              sequence:
                - condition: template
                  value_template: "{{ soc >= soc_start or (now_ts - m1_dn_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P4 Eco-Start: soc={{ soc }}% pv={{ pv }}W — status={{ m1_status }}"
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Eco
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner1_last_upgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('input_datetime.last_start_at')[:10] != now().strftime('%Y-%m-%d') }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_start_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── Miner 2: Steuerungs-Automation ────────────────────────────────────
    - id: mvp_miner2_watchdog
      alias: "MVP: Miner 2 Watchdog"
      description: >
        Prüft SoC/PV und setzt Workmode von Miner 2.
        Priorität: Stop > Super > Super-Downgrade > Eco-Start
      mode: single
      trigger:
        - platform: time_pattern
          minutes: "/2"
        - platform: homeassistant
          event: start
        - platform: state
          entity_id: sensor.battery_soc_pct
        - platform: state
          entity_id: sensor.pv_power_w
      condition:
        - condition: state
          entity_id: input_boolean.miner2_auto_load_management
          state: "on"
      action:
        - variables:
            soc: "{{ states('sensor.battery_soc_pct') | float(0) }}"
            pv: "{{ states('sensor.pv_power_w') | float(0) }}"
            soc_start: "{{ states('input_number.mvp_soc_eco_start_pct') | float(65) }}"
            pv_start: "{{ states('input_number.mvp_pv_start_w') | float(6000) }}"
            soc_super_on: "{{ states('input_number.mvp_soc_super_pct') | float(90) }}"
            soc_super_off: "{{ states('input_number.mvp_soc_super_stop_pct') | float(85) }}"
            soc_stop: "{{ states('input_number.mvp_soc_stop_pct') | float(60) }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
            m2_select: "{{ states('select.miner2_workmode_set') }}"
            m2_up_ts: "{{ states('input_number.mvp_miner2_last_upgrade_ts') | float(0) }}"
            m2_dn_ts: "{{ states('input_number.mvp_miner2_last_downgrade_ts') | float(0) }}"
            now_ts: "{{ now().timestamp() }}"
            cooldown_sec: 1800

        - action: system_log.write
          data:
            message: >
              [mvp-miner2] trigger={{ trigger.platform }}
              soc={{ soc }}% pv={{ pv }}W
              status={{ m2_status }} select={{ m2_select }}
              thresholds: stop={{ soc_stop }} start={{ soc_start }} super={{ soc_super_on }}
              up_cd={{ [0, (m2_up_ts + cooldown_sec - now_ts) | int] | max }}s
              dn_cd={{ [0, (m2_dn_ts + cooldown_sec - now_ts) | int] | max }}s
            level: warning

        - choose:
            # P1: SoC zu niedrig → Standby (kein Cooldown — Sicherheit geht vor)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_stop }}"
              sequence:
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P1 Stop: soc={{ soc }}% < {{ soc_stop }}% — status={{ m2_status }}"
                    level: warning
                - condition: template
                  value_template: "{{ m2_status not in ['Standby', 'Off'] }}"
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Standby
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner2_last_downgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('sensor.miner1_workmode_status') in ['Standby', 'Off', 'Idle'] }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_stop_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P2: Akku voll → Super (blockiert wenn Downgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc >= soc_super_on }}"
              sequence:
                - condition: template
                  value_template: "{{ m2_status != 'Super' }}"
                - condition: template
                  value_template: "{{ (now_ts - m2_dn_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P2 Super: soc={{ soc }}% >= {{ soc_super_on }}% — status={{ m2_status }}"
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Super
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner2_last_upgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"

            # P3: Super-Deadband unterschritten → Eco (blockiert wenn Upgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_super_off and m2_status == 'Super' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m2_up_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P3 Super→Eco: soc={{ soc }}% < {{ soc_super_off }}%"
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Eco
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner2_last_downgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"

            # P4: SoC ok ODER PV stark genug, Miner aus → Eco starten (blockiert wenn Downgrade-Cooldown aktiv oder Nacht-Sperre)
            # SoC-basierter Start bypasses Cooldown — SoC ist ein stabiler Zustand, kein Flapping-Risiko
            - conditions:
                - condition: state
                  entity_id: binary_sensor.mvp_nacht_sperre_aktiv
                  state: "off"
                - condition: template
                  value_template: >
                    {{ (soc >= soc_start or pv >= pv_start) and
                       m2_status in ['Standby', 'Idle', 'Off'] }}
              sequence:
                - condition: template
                  value_template: "{{ soc >= soc_start or (now_ts - m2_dn_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P4 Eco-Start: soc={{ soc }}% pv={{ pv }}W — status={{ m2_status }}"
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Eco
                - action: input_number.set_value
                  target:
                    entity_id: input_number.mvp_miner2_last_upgrade_ts
                  data:
                    value: "{{ now().timestamp() | int }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('input_datetime.last_start_at')[:10] != now().strftime('%Y-%m-%d') }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_start_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── Lüftung: Shelly-Plug Watchdog ─────────────────────────────────────
    - id: mvp_lueftung_watchdog
      alias: "MVP: Lüftung Watchdog"
      description: >
        Schaltet Lüftungs-Shelly (shellyplugsg3_dcb4d9c6b46c) ein sobald
        irgendein Miner läuft. Nach Miner-Stop: 30 min Nachlaufzeit, dann aus.
        mode: restart → Neustart des Miners während Cooldown bricht Abschaltung ab.
      mode: restart
      trigger:
        - platform: state
          entity_id:
            - sensor.miner1_workmode_status
            - sensor.miner2_workmode_status
        - platform: homeassistant
          event: start
      action:
        - variables:
            m1_active: "{{ states('sensor.miner1_workmode_status') in ['Eco', 'Standard', 'Super'] }}"
            m2_active: "{{ states('sensor.miner2_workmode_status') in ['Eco', 'Standard', 'Super'] }}"
            any_active: "{{ m1_active or m2_active }}"
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ any_active }}"
              sequence:
                - action: system_log.write
                  data:
                    message: "[lueftung] Miner aktiv (m1={{ m1_active }}, m2={{ m2_active }}) — Lüftung ein"
                    level: info
                - action: switch.turn_on
                  target:
                    entity_id: switch.shellyplugsg3_dcb4d9c6b46c
                - action: input_number.set_value
                  target:
                    entity_id: input_number.lueftung_cooldown_end_ts
                  data:
                    value: 0
          default:
            # Cooldown nur wenn Plug gerade wirklich an ist — verhindert Fehlstart beim HA-Boot
            - condition: state
              entity_id: switch.shellyplugsg3_dcb4d9c6b46c
              state: "on"
            - action: system_log.write
              data:
                message: "[lueftung] Alle Miner inaktiv — starte 30 min Nachlauf"
                level: info
            - action: input_number.set_value
              target:
                entity_id: input_number.lueftung_cooldown_end_ts
              data:
                value: "{{ (now().timestamp() + 1800) | int }}"
            - delay:
                minutes: 30
            - action: system_log.write
              data:
                message: "[lueftung] Nachlauf abgelaufen — Lüftung aus"
                level: info
            - action: switch.turn_off
              target:
                entity_id: switch.shellyplugsg3_dcb4d9c6b46c
            - action: input_number.set_value
              target:
                entity_id: input_number.lueftung_cooldown_end_ts
              data:
                value: 0

    # ── TMax-Sicherheit: Eco-Drosselung bei Überhitzung ───────────────────
    # Greift wenn TMax die konfigurierte Schwelle überschreitet.
    # Kein Cooldown — Sicherheit hat immer Vorrang vor dem MVP-Watchdog.
    - id: mvp_room_temp_safety
      alias: "MVP: Raumtemperatur → Eco"
      description: >
        Drosselt alle aktiven Miner auf Eco wenn die Raumtemperatur die
        Sicherheitsschwelle überschreitet. Kein Cooldown.
      mode: single
      trigger:
        - platform: numeric_state
          entity_id: sensor.temp_miner_room
          above: input_number.mvp_room_temp_eco_threshold_c
      condition:
        - condition: template
          value_template: >
            {{ states('sensor.miner1_workmode_status') in ['Standard', 'Super']
               or states('sensor.miner2_workmode_status') in ['Standard', 'Super'] }}
      action:
        - variables:
            room_temp: "{{ states('sensor.temp_miner_room') | float(0) }}"
            threshold: "{{ states('input_number.mvp_room_temp_eco_threshold_c') | float(31) }}"
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
        - action: system_log.write
          data:
            message: >
              [mvp-room-temp] Raumtemp {{ room_temp }}°C >= {{ threshold }}°C
              — m1={{ m1_status }} m2={{ m2_status }} → Eco (kein Cooldown)
            level: warning
        - if:
            - condition: template
              value_template: "{{ m1_status in ['Standard', 'Super'] }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner1_workmode_set
              data:
                option: Eco
            - action: input_number.set_value
              target:
                entity_id: input_number.mvp_miner1_last_downgrade_ts
              data:
                value: "{{ now().timestamp() | int }}"
        - if:
            - condition: template
              value_template: "{{ m2_status in ['Standard', 'Super'] }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner2_workmode_set
              data:
                option: Eco
            - action: input_number.set_value
              target:
                entity_id: input_number.mvp_miner2_last_downgrade_ts
              data:
                value: "{{ now().timestamp() | int }}"

    - id: mvp_miner1_tmax_safety
      alias: "MVP: Miner 1 TMax → Eco"
      description: >
        Drosselt Miner 1 auf Eco sobald TMax die Sicherheitsschwelle überschreitet.
        Kein Cooldown — überschreibt Standard/Super sofort.
      mode: single
      trigger:
        - platform: numeric_state
          entity_id: sensor.miner1_tmax
          above: input_number.mvp_tmax_eco_threshold_c
      condition:
        - condition: template
          value_template: "{{ states('sensor.miner1_workmode_status') in ['Standard', 'Super'] }}"
      action:
        - variables:
            tmax: "{{ states('sensor.miner1_tmax') | float(0) }}"
            threshold: "{{ states('input_number.mvp_tmax_eco_threshold_c') | float(113) }}"
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
        - action: system_log.write
          data:
            message: >
              [mvp-miner1] TMax-Safety: tmax={{ tmax }}°C >= {{ threshold }}°C
              — status={{ m1_status }} → Eco (kein Cooldown)
            level: warning
        - action: select.select_option
          target:
            entity_id: select.miner1_workmode_set
          data:
            option: Eco
        - action: input_number.set_value
          target:
            entity_id: input_number.mvp_miner1_last_downgrade_ts
          data:
            value: "{{ now().timestamp() | int }}"

    - id: mvp_miner2_tmax_safety
      alias: "MVP: Miner 2 TMax → Eco"
      description: >
        Drosselt Miner 2 auf Eco sobald TMax die Sicherheitsschwelle überschreitet.
        Kein Cooldown — überschreibt Standard/Super sofort.
