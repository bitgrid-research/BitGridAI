            threshold: "{{ states('input_number.mvp_tmax_eco_threshold_c') | float(113) }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
        - action: system_log.write
          data:
            message: >
              [mvp-miner2] TMax-Safety: tmax={{ tmax }}°C >= {{ threshold }}°C
