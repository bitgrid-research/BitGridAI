mvp_auto:

  # ── Konfigurierbare SoC-Schwellwerte ──────────────────────────────────────
  input_number:
    mvp_soc_eco_start_pct:
      name: "Eco-Start SoC (%)"
      min: 0
      max: 100
      step: 5
      mode: box
      initial: 65
      icon: mdi:battery-charging-60

    mvp_pv_start_w:
      name: "Eco-Start PV (W)"
      min: 0
      max: 15000
      step: 500
      mode: box
      initial: 6000
      icon: mdi:solar-power

    mvp_soc_super_pct:
      name: "Super-Start SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 90
      icon: mdi:battery

    mvp_soc_super_stop_pct:
      name: "Super-Stop SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 85
      icon: mdi:battery-arrow-down

    mvp_soc_stop_pct:
      name: "Stop SoC (%)"
      min: 0
      max: 100
      step: 5
      mode: box
      initial: 60
      icon: mdi:battery-alert

  automation:

    # ── Einzige Steuerungs-Automation: läuft alle 2 Min + bei SoC-Änderung ──
    - id: mvp_watchdog
      alias: "MVP: SoC Watchdog"
      description: >
        Prüft SoC und setzt Workmode beider Miner.
        Priorität: Stop > Super > Super-Downgrade > Eco-Start
      trigger:
        - platform: time_pattern
          minutes: "/2"
        - platform: homeassistant
          event: start
        - platform: state
          entity_id: sensor.battery_soc_pct
        - platform: state
          entity_id: sensor.pv_power_w
      action:
        - variables:
            soc: "{{ states('sensor.battery_soc_pct') | float(0) }}"
            pv: "{{ states('sensor.pv_power_w') | float(0) }}"
            soc_start: "{{ states('input_number.mvp_soc_eco_start_pct') | float(65) }}"
            pv_start: "{{ states('input_number.mvp_pv_start_w') | float(6000) }}"
            soc_super_on: "{{ states('input_number.mvp_soc_super_pct') | float(90) }}"
            soc_super_off: "{{ states('input_number.mvp_soc_super_stop_pct') | float(85) }}"
            soc_stop: "{{ states('input_number.mvp_soc_stop_pct') | float(60) }}"

        # ── Miner 1 ────────────────────────────────────────────────────────
        - if:
            - condition: state
              entity_id: input_boolean.miner1_auto_load_management
              state: "on"
          then:
            - choose:
                # P1: SoC zu niedrig → Standby
                - conditions:
                    - condition: template
                      value_template: "{{ soc < soc_stop }}"
                  sequence:
                    - condition: template
                      value_template: "{{ states('sensor.miner1_workmode_status') not in ['Standby', 'Off'] }}"
                    - action: select.select_option
                      target:
                        entity_id: select.miner1_workmode_set
                      data:
                        option: Standby

                # P2: Akku voll → Super
                - conditions:
                    - condition: template
                      value_template: "{{ soc >= soc_super_on }}"
                  sequence:
                    - condition: template
                      value_template: "{{ states('sensor.miner1_workmode_status') != 'Super' }}"
                    - action: select.select_option
                      target:
                        entity_id: select.miner1_workmode_set
                      data:
                        option: Super

                # P3: Super-Deadband unterschritten → Eco
                - conditions:
                    - condition: template
                      value_template: >
                        {{ soc < soc_super_off and
                           states('sensor.miner1_workmode_status') == 'Super' }}
                  sequence:
                    - action: select.select_option
                      target:
                        entity_id: select.miner1_workmode_set
                      data:
                        option: Eco

                # P4: SoC ok ODER PV stark genug, Miner aus → Eco starten
                - conditions:
                    - condition: template
                      value_template: >
                        {{ (soc >= soc_start or pv >= pv_start) and
                           states('sensor.miner1_workmode_status') in ['Standby', 'Idle', 'Off'] }}
                  sequence:
                    - action: select.select_option
                      target:
                        entity_id: select.miner1_workmode_set
                      data:
                        option: Eco

        # ── Miner 2 ────────────────────────────────────────────────────────
        - if:
            - condition: state
              entity_id: input_boolean.miner2_auto_load_management
              state: "on"
          then:
            - choose:
                # P1: SoC zu niedrig → Standby
                - conditions:
                    - condition: template
                      value_template: "{{ soc < soc_stop }}"
                  sequence:
                    - condition: template
                      value_template: "{{ states('sensor.miner2_workmode_status') not in ['Standby', 'Off'] }}"
                    - action: select.select_option
                      target:
                        entity_id: select.miner2_workmode_set
                      data:
                        option: Standby

                # P2: Akku voll → Super
                - conditions:
                    - condition: template
                      value_template: "{{ soc >= soc_super_on }}"
                  sequence:
                    - condition: template
                      value_template: "{{ states('sensor.miner2_workmode_status') != 'Super' }}"
                    - action: select.select_option
                      target:
                        entity_id: select.miner2_workmode_set
                      data:
                        option: Super

                # P3: Super-Deadband unterschritten → Eco
                - conditions:
                    - condition: template
                      value_template: >
                        {{ soc < soc_super_off and
                           states('sensor.miner2_workmode_status') == 'Super' }}
                  sequence:
                    - action: select.select_option
                      target:
                        entity_id: select.miner2_workmode_set
                      data:
                        option: Eco

                # P4: SoC ok ODER PV stark genug, Miner aus → Eco starten
                - conditions:
                    - condition: template
                      value_template: >
                        {{ (soc >= soc_start or pv >= pv_start) and
                           states('sensor.miner2_workmode_status') in ['Standby', 'Idle', 'Off'] }}
                  sequence:
                    - action: select.select_option
                      target:
                        entity_id: select.miner2_workmode_set
                      data:
                        option: Eco
