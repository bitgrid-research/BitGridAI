mvp_auto:

  # ── Konfigurierbare SoC-Schwellwerte ──────────────────────────────────────
  input_number:
    mvp_soc_eco_start_pct:
      name: "Eco-Start SoC (%)"
      min: 0
      max: 100
      step: 1
      mode: box
      initial: 58
      icon: mdi:battery-charging-60

    mvp_pv_start_w:
      name: "Eco-Start PV (W)"
      min: 0
      max: 15000
      step: 500
      mode: box
      initial: 6000
      icon: mdi:solar-power

    mvp_soc_std_pct:
      name: "Standard-Start SoC (%)"
      min: 50
      max: 100
      step: 1
      mode: box
      initial: 80
      icon: mdi:battery-70

    mvp_soc_std_stop_pct:
      name: "Standard-Stop SoC (%)"
      min: 50
      max: 100
      step: 1
      mode: box
      initial: 75
      icon: mdi:battery-arrow-down-outline

    mvp_soc_super_pct:
      name: "Super-Start SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 90
      icon: mdi:battery

    mvp_soc_super_stop_pct:
      name: "Super-Stop SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 85
      icon: mdi:battery-arrow-down

    mvp_soc_stop_pct:
      name: "Stop SoC (%)"
      min: 0
      max: 100
      step: 1
      mode: box
      initial: 50
      icon: mdi:battery-alert


    mvp_tmax_std_threshold_c:
      name: "TMax Standard-Sicherheitsschwelle (°C)"
      min: 100
      max: 120
      step: 1
      mode: box
      initial: 112
      icon: mdi:thermometer-high

    mvp_room_temp_eco_threshold_c:
      name: "Raumtemp Eco-Sicherheitsschwelle (°C)"
      min: 25
      max: 40
      step: 0.5
      mode: box
      initial: 31
      icon: mdi:home-thermometer-outline

    battery_capacity_kwh:
      name: "Batterie-Kapazität (kWh)"
      min: 1
      max: 30
      step: 0.5
      mode: box
      initial: 10
      icon: mdi:battery-high

  input_boolean:
    mvp_night_block_enabled:
      name: "Nacht-Sperre (Mining)"
      icon: mdi:weather-night
      initial: true

  input_datetime:
    mvp_night_block_start:
      name: "Nacht-Sperre Start"
      has_time: true
      has_date: false
      icon: mdi:weather-night
      initial: "22:00:00"
    mvp_night_block_end:
      name: "Nacht-Sperre Ende"
      has_time: true
      has_date: false
      icon: mdi:weather-sunset-up
      initial: "06:00:00"
    lueftung_cooldown_end:
      name: "Lüftung Cooldown Ende"
      has_date: true
      has_time: true
      icon: mdi:timer-off
      initial: "1970-01-01 00:00:00"
    mvp_miner1_last_upgrade:
      name: "Miner 1 letzter Upgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-up-circle
      initial: "1970-01-01 00:00:00"
    mvp_miner1_last_downgrade:
      name: "Miner 1 letzter Downgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-down-circle
      initial: "1970-01-01 00:00:00"
    mvp_miner2_last_upgrade:
      name: "Miner 2 letzter Upgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-up-circle
      initial: "1970-01-01 00:00:00"
    mvp_miner2_last_downgrade:
      name: "Miner 2 letzter Downgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-down-circle
      initial: "1970-01-01 00:00:00"
    mvp_miner1_temp_lockout_until:
      name: "Miner 1 Temp-Sperre bis"
      has_date: true
      has_time: true
      icon: mdi:thermometer-lock
      initial: "1970-01-01 00:00:00"
    mvp_miner2_temp_lockout_until:
      name: "Miner 2 Temp-Sperre bis"
      has_date: true
      has_time: true
      icon: mdi:thermometer-lock
      initial: "1970-01-01 00:00:00"

  template:
    - trigger:
        - platform: time_pattern
          seconds: /10
        - platform: state
          entity_id:
            - input_datetime.mvp_miner1_last_upgrade
            - input_datetime.mvp_miner1_last_downgrade
            - input_datetime.mvp_miner2_last_upgrade
            - input_datetime.mvp_miner2_last_downgrade
      sensor:
        - name: "Miner 1 Cooldown Status"
          unique_id: mvp_miner1_cooldown_status
          icon: mdi:timer-lock
          state: >
            {% set now_ts = now().timestamp() %}
            {% set up_rem = (state_attr('input_datetime.mvp_miner1_last_upgrade', 'timestamp') | float(0) + 3600 - now_ts) | int %}
            {% set dn_rem = (state_attr('input_datetime.mvp_miner1_last_downgrade', 'timestamp') | float(0) + 3600 - now_ts) | int %}
            {% if up_rem > 0 %}
              ↑ {{ (up_rem // 60) }} min
            {% elif dn_rem > 0 %}
              ↓ {{ (dn_rem // 60) }} min
            {% else %}
              —
            {% endif %}
        - name: "Miner 2 Cooldown Status"
          unique_id: mvp_miner2_cooldown_status
          icon: mdi:timer-lock
          state: >
            {% set now_ts = now().timestamp() %}
            {% set up_rem = (state_attr('input_datetime.mvp_miner2_last_upgrade', 'timestamp') | float(0) + 3600 - now_ts) | int %}
            {% set dn_rem = (state_attr('input_datetime.mvp_miner2_last_downgrade', 'timestamp') | float(0) + 3600 - now_ts) | int %}
            {% if up_rem > 0 %}
              ↑ {{ (up_rem // 60) }} min
            {% elif dn_rem > 0 %}
              ↓ {{ (dn_rem // 60) }} min
            {% else %}
              —
            {% endif %}

    - sensor:
        - name: "Lüftung Status"
          unique_id: lueftung_status_display
          icon: mdi:fan
          state: >
            {% set m1 = states('sensor.miner1_workmode_status') in ['Eco', 'Standard', 'Super'] %}
            {% set m2 = states('sensor.miner2_workmode_status') in ['Eco', 'Standard', 'Super'] %}
            {% if m1 or m2 %}
              Aktiv
            {% elif states('switch.shellyplugsg3_dcb4d9c6b46c') == 'on' %}
              {% set remaining = (as_timestamp(states('input_datetime.lueftung_cooldown_end'), 0) - now().timestamp()) | int %}
              {% if remaining > 0 %}
                {{ '%d:%02d' | format(remaining // 60, remaining % 60) }}
              {% else %}
                Aus
              {% endif %}
            {% else %}
              Aus
            {% endif %}

    - binary_sensor:
        - name: "Raumtemperatur zu heiß"
          unique_id: mvp_room_too_hot
          device_class: heat
          icon: mdi:thermometer-high
          state: >
            {% set temp = states('sensor.ewelink_snzb_02p_temperatur_2') %}
            {% if temp in ['unknown', 'unavailable'] %}
              false
            {% else %}
              {% set t = temp | float %}
              {% set threshold = states('input_number.mvp_room_temp_eco_threshold_c') | float(30) %}
              {% if this.state == 'on' %}
                {{ t >= (threshold - 2.0) }}
              {% else %}
                {{ t >= threshold }}
              {% endif %}
            {% endif %}

        - name: "MVP Nacht-Sperre aktiv"
          unique_id: mvp_night_block_active
          icon: mdi:weather-night
          state: >
            {% set now_min   = now().hour * 60 + now().minute %}
            {% set s = states('input_datetime.mvp_night_block_start') %}
            {% set e = states('input_datetime.mvp_night_block_end') %}
            {% set start_min = s.split(':')[0] | int(0) * 60 + s.split(':')[1] | int(0) %}
            {% set end_min   = e.split(':')[0] | int(0) * 60 + e.split(':')[1] | int(0) %}
            {% if start_min > end_min %}
              {% set in_block = now_min >= start_min or now_min < end_min %}
            {% else %}
              {% set in_block = now_min >= start_min and now_min < end_min %}
            {% endif %}
            {{ states('input_boolean.mvp_night_block_enabled') == 'on' and in_block }}

  automation:

    # ── Miner 1: Steuerungs-Automation ────────────────────────────────────
    - id: mvp_miner1_watchdog
      alias: "MVP: Miner 1 Watchdog"
      description: >
        Prüft SoC/PV und setzt Workmode von Miner 1.
        Priorität: Stop > Super > Super-Downgrade > Eco-Start
      mode: single
      trigger:
        - platform: time_pattern
          minutes: "/2"
        - platform: homeassistant
          event: start
        - platform: state
          entity_id: sensor.battery_soc_pct
        - platform: state
          entity_id: sensor.pv_power_w
      condition:
        - condition: state
          entity_id: input_boolean.miner1_auto_load_management
          state: "on"
      action:
        - if:
            - condition: template
              value_template: "{{ trigger.platform == 'homeassistant' }}"
          then:
            - delay: "00:01:00"
        - condition: template
          value_template: >
            {{ states('sensor.battery_soc_pct') not in ['unknown', 'unavailable']
               and states('sensor.miner1_workmode_status') not in ['unknown', 'unavailable'] }}
        - variables:
            soc: "{{ states('sensor.battery_soc_pct') | float(0) }}"
            pv: "{{ states('sensor.pv_power_w') | float(0) }}"
            bat_w: "{{ states('sensor.battery_power_w') | float(0) }}"
            soc_start: "{{ states('input_number.mvp_soc_eco_start_pct') | float(58) }}"
            pv_start: "{{ states('input_number.mvp_pv_start_w') | float(6000) }}"
            soc_std_on: "{{ states('input_number.mvp_soc_std_pct') | float(80) }}"
            soc_std_off: "{{ states('input_number.mvp_soc_std_stop_pct') | float(75) }}"
            soc_super_on: "{{ states('input_number.mvp_soc_super_pct') | float(90) }}"
            soc_super_off: "{{ states('input_number.mvp_soc_super_stop_pct') | float(85) }}"
            soc_stop: "{{ states('input_number.mvp_soc_stop_pct') | float(50) }}"
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
            m1_select: "{{ states('select.miner1_workmode_set') }}"
            m1_up_ts: "{{ state_attr('input_datetime.mvp_miner1_last_upgrade', 'timestamp') | float(0) }}"
            m1_dn_ts: "{{ state_attr('input_datetime.mvp_miner1_last_downgrade', 'timestamp') | float(0) }}"
            now_ts: "{{ now().timestamp() }}"
            cooldown_sec: 3600

        - action: system_log.write
          data:
            message: >
              [mvp-miner1] trigger={{ trigger.platform }}
              soc={{ soc }}% pv={{ pv }}W bat={{ bat_w | round(0) }}W
              status={{ m1_status }} select={{ m1_select }}
              thresholds: stop={{ soc_stop }} start={{ soc_start }} std={{ soc_std_on }} super={{ soc_super_on }}
              up_cd={{ [0, (m1_up_ts + cooldown_sec - now_ts) | int] | max }}s
              dn_cd={{ [0, (m1_dn_ts + cooldown_sec - now_ts) | int] | max }}s
              pv_bypass_in={{ [0, (m1_dn_ts + 900 - now_ts) | int] | max }}s
            level: warning

        - choose:
            # P1: SoC zu niedrig → Standby (kein Cooldown — Sicherheit geht vor)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_stop }}"
              sequence:
                - action: system_log.write
                  data:
                    message: >
                      [mvp-miner1] P1 Stop: soc={{ soc }}% < {{ soc_stop }}% bat={{ bat_w | round(0) }}W
                      — status={{ m1_status }} → Standby (PV-Bypass gesperrt für 15min)
                    level: warning
                - condition: template
                  value_template: "{{ m1_status not in ['Standby', 'Off'] }}"
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Standby
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner1_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('sensor.miner2_workmode_status') in ['Standby', 'Off'] }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_stop_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P1b: Temp-Sperre aktiv → Eco erzwingen (level-triggered, kein Cooldown)
            - conditions:
                - condition: template
                  value_template: >
                    {{ now_ts < state_attr('input_datetime.mvp_miner1_temp_lockout_until', 'timestamp') | float(0)
                       and m1_status in ['Super', 'Standard'] }}
              sequence:
                - action: system_log.write
                  data:
                    message: >
                      [mvp-miner1] P1b Temp-Sperre: lockout bis
                      {{ states('input_datetime.mvp_miner1_temp_lockout_until') }}
                      — status={{ m1_status }} → Eco
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Eco

            # P2: Akku voll → Standard-Cap (Super deaktiviert — Testmodus)
            - conditions:
                - condition: template
                  value_template: "{{ soc >= soc_super_on }}"
              sequence:
                - condition: template
                  value_template: "{{ m1_status != 'Standard' }}"
                - condition: template
                  value_template: "{{ (now_ts - m1_dn_ts) >= cooldown_sec }}"
                - condition: state
                  entity_id: binary_sensor.raumtemperatur_zu_heiss
                  state: "off"
                - condition: template
                  value_template: "{{ now_ts >= state_attr('input_datetime.mvp_miner1_temp_lockout_until', 'timestamp') | float(0) }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P2 Standard-Cap: soc={{ soc }}% >= {{ soc_super_on }}% — status={{ m1_status }} (Super gesperrt)"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Standard
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner1_last_upgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P3: Super-Deadband unterschritten → Standard (blockiert wenn Upgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_super_off and m1_status == 'Super' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m1_up_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P3 Super→Standard: soc={{ soc }}% < {{ soc_super_off }}% — Deadband unterschritten"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Standard
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner1_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P2.5: SoC im Standard-Bereich → Standard (Eco→Standard, blockiert wenn Downgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc >= soc_std_on and m1_status == 'Eco' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m1_dn_ts) >= cooldown_sec }}"
                - condition: state
                  entity_id: binary_sensor.raumtemperatur_zu_heiss
                  state: "off"
                - condition: template
                  value_template: "{{ now_ts >= state_attr('input_datetime.mvp_miner1_temp_lockout_until', 'timestamp') | float(0) }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P2.5 Standard: soc={{ soc }}% >= {{ soc_std_on }}% — Eco→Standard"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Standard
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner1_last_upgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P3.5: Standard-Deadband unterschritten → Eco (blockiert wenn Upgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_std_off and m1_status == 'Standard' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m1_up_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner1] P3.5 Standard→Eco: soc={{ soc }}% < {{ soc_std_off }}% — Deadband unterschritten"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Eco
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner1_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P4: SoC >= Schwelle, Miner aus → Eco starten
            # SoC ist immer Pflicht. PV >= pv_start erlaubt Cooldown-Bypass nach min. 15 min seit letztem Stop.
            # Mindest-15min verhindert P1→P4-Flapping bei kurzen Solareinbrüchen.
            # Temp-Lockout blockiert immer — auch wenn Miner intern durch Hardware-Schutz abgeschaltet hat.
            - conditions:
                - condition: state
                  entity_id: binary_sensor.mvp_nacht_sperre_aktiv
                  state: "off"
                - condition: template
                  value_template: >
                    {{ soc >= soc_start and
                       m1_status in ['Standby', 'Idle', 'Off'] }}
                - condition: template
                  value_template: "{{ now_ts >= state_attr('input_datetime.mvp_miner1_temp_lockout_until', 'timestamp') | float(0) }}"
              sequence:
                - condition: template
                  value_template: >
                    {{ (pv >= pv_start and (now_ts - m1_dn_ts) >= 900)
                       or (now_ts - m1_dn_ts) >= cooldown_sec }}
                - action: system_log.write
                  data:
                    message: >
                      [mvp-miner1] P4 Eco-Start: soc={{ soc }}% pv={{ pv }}W bat={{ bat_w | round(0) }}W
                      — via={{ 'PV-Bypass(>15min)' if (pv >= pv_start and (now_ts - m1_dn_ts) >= 900) else '1h-Cooldown' }}
                      — status={{ m1_status }}
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner1_workmode_set
                  data:
                    option: Eco
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner1_last_upgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('input_datetime.last_start_at')[:10] != now().strftime('%Y-%m-%d') }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_start_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── Miner 2: Steuerungs-Automation ────────────────────────────────────
    - id: mvp_miner2_watchdog
      alias: "MVP: Miner 2 Watchdog"
      description: >
        Prüft SoC/PV und setzt Workmode von Miner 2.
        Priorität: Stop > Super > Super-Downgrade > Eco-Start
      mode: single
      trigger:
        - platform: time_pattern
          minutes: "/2"
        - platform: homeassistant
          event: start
        - platform: state
          entity_id: sensor.battery_soc_pct
        - platform: state
          entity_id: sensor.pv_power_w
      condition:
        - condition: state
          entity_id: input_boolean.miner2_auto_load_management
          state: "on"
      action:
        - if:
            - condition: template
              value_template: "{{ trigger.platform == 'homeassistant' }}"
          then:
            - delay: "00:01:00"
        - condition: template
          value_template: >
            {{ states('sensor.battery_soc_pct') not in ['unknown', 'unavailable']
               and states('sensor.miner2_workmode_status') not in ['unknown', 'unavailable'] }}
        - variables:
            soc: "{{ states('sensor.battery_soc_pct') | float(0) }}"
            pv: "{{ states('sensor.pv_power_w') | float(0) }}"
            bat_w: "{{ states('sensor.battery_power_w') | float(0) }}"
            soc_start: "{{ states('input_number.mvp_soc_eco_start_pct') | float(58) }}"
            pv_start: "{{ states('input_number.mvp_pv_start_w') | float(6000) }}"
            soc_std_on: "{{ states('input_number.mvp_soc_std_pct') | float(80) }}"
            soc_std_off: "{{ states('input_number.mvp_soc_std_stop_pct') | float(75) }}"
            soc_super_on: "{{ states('input_number.mvp_soc_super_pct') | float(90) }}"
            soc_super_off: "{{ states('input_number.mvp_soc_super_stop_pct') | float(85) }}"
            soc_stop: "{{ states('input_number.mvp_soc_stop_pct') | float(50) }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
            m2_select: "{{ states('select.miner2_workmode_set') }}"
            m2_up_ts: "{{ state_attr('input_datetime.mvp_miner2_last_upgrade', 'timestamp') | float(0) }}"
            m2_dn_ts: "{{ state_attr('input_datetime.mvp_miner2_last_downgrade', 'timestamp') | float(0) }}"
            now_ts: "{{ now().timestamp() }}"
            cooldown_sec: 3600

        - action: system_log.write
          data:
            message: >
              [mvp-miner2] trigger={{ trigger.platform }}
              soc={{ soc }}% pv={{ pv }}W bat={{ bat_w | round(0) }}W
              status={{ m2_status }} select={{ m2_select }}
              thresholds: stop={{ soc_stop }} start={{ soc_start }} std={{ soc_std_on }} super={{ soc_super_on }}
              up_cd={{ [0, (m2_up_ts + cooldown_sec - now_ts) | int] | max }}s
              dn_cd={{ [0, (m2_dn_ts + cooldown_sec - now_ts) | int] | max }}s
              pv_bypass_in={{ [0, (m2_dn_ts + 900 - now_ts) | int] | max }}s
            level: warning

        - choose:
            # P1: SoC zu niedrig → Standby (kein Cooldown — Sicherheit geht vor)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_stop }}"
              sequence:
                - action: system_log.write
                  data:
                    message: >
                      [mvp-miner2] P1 Stop: soc={{ soc }}% < {{ soc_stop }}% bat={{ bat_w | round(0) }}W
                      — status={{ m2_status }} → Standby (PV-Bypass gesperrt für 15min)
                    level: warning
                - condition: template
                  value_template: "{{ m2_status not in ['Standby', 'Off'] }}"
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Standby
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner2_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('sensor.miner1_workmode_status') in ['Standby', 'Off'] }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_stop_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P1b: Temp-Sperre aktiv → Eco erzwingen (level-triggered, kein Cooldown)
            - conditions:
                - condition: template
                  value_template: >
                    {{ now_ts < state_attr('input_datetime.mvp_miner2_temp_lockout_until', 'timestamp') | float(0)
                       and m2_status in ['Super', 'Standard'] }}
              sequence:
                - action: system_log.write
                  data:
                    message: >
                      [mvp-miner2] P1b Temp-Sperre: lockout bis
                      {{ states('input_datetime.mvp_miner2_temp_lockout_until') }}
                      — status={{ m2_status }} → Eco
                    level: warning
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Eco

            # P2: Akku voll → Standard-Cap (Super deaktiviert — Testmodus)
            - conditions:
                - condition: template
                  value_template: "{{ soc >= soc_super_on }}"
              sequence:
                - condition: template
                  value_template: "{{ m2_status != 'Standard' }}"
                - condition: template
                  value_template: "{{ (now_ts - m2_dn_ts) >= cooldown_sec }}"
                - condition: state
                  entity_id: binary_sensor.raumtemperatur_zu_heiss
                  state: "off"
                - condition: template
                  value_template: "{{ now_ts >= state_attr('input_datetime.mvp_miner2_temp_lockout_until', 'timestamp') | float(0) }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P2 Standard-Cap: soc={{ soc }}% >= {{ soc_super_on }}% — status={{ m2_status }} (Super gesperrt)"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Standard
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner2_last_upgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P3: Super-Deadband unterschritten → Standard (blockiert wenn Upgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_super_off and m2_status == 'Super' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m2_up_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P3 Super→Standard: soc={{ soc }}% < {{ soc_super_off }}% — Deadband unterschritten"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Standard
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner2_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P2.5: SoC im Standard-Bereich → Standard (Eco→Standard, blockiert wenn Downgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc >= soc_std_on and m2_status == 'Eco' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m2_dn_ts) >= cooldown_sec }}"
                - condition: state
                  entity_id: binary_sensor.raumtemperatur_zu_heiss
                  state: "off"
                - condition: template
                  value_template: "{{ now_ts >= state_attr('input_datetime.mvp_miner2_temp_lockout_until', 'timestamp') | float(0) }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P2.5 Standard: soc={{ soc }}% >= {{ soc_std_on }}% — Eco→Standard"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Standard
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner2_last_upgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P3.5: Standard-Deadband unterschritten → Eco (blockiert wenn Upgrade-Cooldown aktiv)
            - conditions:
                - condition: template
                  value_template: "{{ soc < soc_std_off and m2_status == 'Standard' }}"
              sequence:
                - condition: template
                  value_template: "{{ (now_ts - m2_up_ts) >= cooldown_sec }}"
                - action: system_log.write
                  data:
                    message: "[mvp-miner2] P3.5 Standard→Eco: soc={{ soc }}% < {{ soc_std_off }}% — Deadband unterschritten"
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Eco
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner2_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # P4: SoC >= Schwelle, Miner aus → Eco starten
            # SoC ist immer Pflicht. PV >= pv_start erlaubt Cooldown-Bypass nach min. 15 min seit letztem Stop.
            # Mindest-15min verhindert P1→P4-Flapping bei kurzen Solareinbrüchen.
            # Temp-Lockout blockiert immer — auch wenn Miner intern durch Hardware-Schutz abgeschaltet hat.
            - conditions:
                - condition: state
                  entity_id: binary_sensor.mvp_nacht_sperre_aktiv
                  state: "off"
                - condition: template
                  value_template: >
                    {{ soc >= soc_start and
                       m2_status in ['Standby', 'Idle', 'Off'] }}
                - condition: template
                  value_template: "{{ now_ts >= state_attr('input_datetime.mvp_miner2_temp_lockout_until', 'timestamp') | float(0) }}"
              sequence:
                - condition: template
                  value_template: >
                    {{ (pv >= pv_start and (now_ts - m2_dn_ts) >= 900)
                       or (now_ts - m2_dn_ts) >= cooldown_sec }}
                - action: system_log.write
                  data:
                    message: >
                      [mvp-miner2] P4 Eco-Start: soc={{ soc }}% pv={{ pv }}W bat={{ bat_w | round(0) }}W
                      — via={{ 'PV-Bypass(>15min)' if (pv >= pv_start and (now_ts - m2_dn_ts) >= 900) else '1h-Cooldown' }}
                      — status={{ m2_status }}
                    level: info
                - action: select.select_option
                  target:
                    entity_id: select.miner2_workmode_set
                  data:
                    option: Eco
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.mvp_miner2_last_upgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - if:
                    - condition: template
                      value_template: >-
                        {{ states('input_datetime.last_start_at')[:10] != now().strftime('%Y-%m-%d') }}
                  then:
                    - action: input_datetime.set_datetime
                      target:
                        entity_id: input_datetime.last_start_at
                      data:
                        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── P3b: PV-reaktiver Super→Eco Downgrade ────────────────────────────
    - id: mvp_p3b_pv_reactive_downgrade
      alias: "MVP: P3b PV-reaktiver Super→Eco Downgrade"
      description: >
        Downgrades Miner von Super→Eco wenn der Akku >800W sustained für 5 min abgibt.
        Bypasses den normalen Upgrade-Cooldown (P3 wäre blockiert).
        Setzt last_downgrade → verhindert sofortigen P2-Re-Upgrade für 1h.
        Typischer Auslöser: Solareinbruch am Abend, PV kann Super-Modus nicht mehr tragen.
      mode: single
      trigger:
        - platform: numeric_state
          entity_id: sensor.battery_power_w
          below: -800
          for: "00:05:00"
      action:
        - variables:
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
            bat_w: "{{ states('sensor.battery_power_w') | float(0) }}"
            m1_auto: "{{ is_state('input_boolean.miner1_auto_load_management', 'on') }}"
            m2_auto: "{{ is_state('input_boolean.miner2_auto_load_management', 'on') }}"
        - condition: template
          value_template: "{{ m1_status == 'Super' or m2_status == 'Super' }}"
        - action: system_log.write
          data:
            message: >
              [mvp-p3b] PV-reaktiver Super→Eco: bat={{ bat_w | round(0) }}W < -800W (5min sustained)
              — m1={{ m1_status }} m2={{ m2_status }} → Eco
              (Upgrade-Cooldown überbrückt, last_downgrade gesetzt — P2 gesperrt für 1h)
            level: warning
        - if:
            - condition: template
              value_template: "{{ m1_status == 'Super' and m1_auto }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner1_workmode_set
              data:
                option: Eco
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.mvp_miner1_last_downgrade
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - if:
            - condition: template
              value_template: "{{ m2_status == 'Super' and m2_auto }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner2_workmode_set
              data:
                option: Eco
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.mvp_miner2_last_downgrade
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── Lüftung: Shelly-Plug Watchdog ─────────────────────────────────────
    - id: mvp_lueftung_watchdog
      alias: "MVP: Lüftung Watchdog"
      description: >
        Schaltet Lüftungs-Shelly (shellyplugsg3_dcb4d9c6b46c) ein sobald
        irgendein Miner läuft. Nach Miner-Stop: 30 min Nachlaufzeit, dann aus.
        mode: restart → Neustart des Miners während Cooldown bricht Abschaltung ab.
      mode: restart
      trigger:
        - platform: state
          entity_id:
            - sensor.miner1_workmode_status
            - sensor.miner2_workmode_status
        - platform: homeassistant
          event: start
      action:
        - variables:
            m1_active: "{{ states('sensor.miner1_workmode_status') in ['Eco', 'Standard', 'Super'] }}"
            m2_active: "{{ states('sensor.miner2_workmode_status') in ['Eco', 'Standard', 'Super'] }}"
            any_active: "{{ m1_active or m2_active }}"
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ any_active }}"
              sequence:
                - action: system_log.write
                  data:
                    message: "[lueftung] Miner aktiv (m1={{ m1_active }}, m2={{ m2_active }}) — Lüftung ein"
                    level: info
                - action: switch.turn_on
                  target:
                    entity_id: switch.shellyplugsg3_dcb4d9c6b46c
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.lueftung_cooldown_end
                  data:
                    datetime: "1970-01-01 00:00:00"
          default:
            # Cooldown nur wenn Plug gerade wirklich an ist — verhindert Fehlstart beim HA-Boot
            - condition: state
              entity_id: switch.shellyplugsg3_dcb4d9c6b46c
              state: "on"
            - action: system_log.write
              data:
                message: "[lueftung] Alle Miner inaktiv — starte 30 min Nachlauf"
                level: info
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.lueftung_cooldown_end
              data:
                datetime: "{{ (now() + timedelta(minutes=30)).strftime('%Y-%m-%d %H:%M:%S') }}"
            - delay:
                minutes: 30
            - action: system_log.write
              data:
                message: "[lueftung] Nachlauf abgelaufen — Lüftung aus"
                level: info
            - action: switch.turn_off
              target:
                entity_id: switch.shellyplugsg3_dcb4d9c6b46c
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.lueftung_cooldown_end
              data:
                datetime: "1970-01-01 00:00:00"

    # ── TMax-Sicherheit: Eco-Drosselung bei Überhitzung ───────────────────
    # Greift wenn TMax die konfigurierte Schwelle überschreitet.
    # Kein Cooldown — Sicherheit hat immer Vorrang vor dem MVP-Watchdog.
    - id: mvp_room_temp_safety
      alias: "MVP: Raumtemperatur → Eco"
      description: >
        Drosselt alle aktiven Miner auf Eco sobald binary_sensor.raumtemperatur_zu_heiss
        ON wird (Raumtemp >= Schwelle). Kein Cooldown.
        Der binary_sensor hat 2°C Hysterese gegen Flapping.
        Sensor unavailable → fail-open (false), da TMax-Safety die Hardware schützt.
      mode: single
      trigger:
        - platform: state
          entity_id: binary_sensor.raumtemperatur_zu_heiss
          to: "on"
      condition:
        - condition: template
          value_template: >
            {{ states('sensor.miner1_workmode_status') in ['Standard', 'Super']
               or states('sensor.miner2_workmode_status') in ['Standard', 'Super'] }}
      action:
        - variables:
            room_temp: "{{ states('sensor.ewelink_snzb_02p_temperatur_2') | float(99) }}"
            threshold: "{{ states('input_number.mvp_room_temp_eco_threshold_c') | float(30) }}"
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
        - action: system_log.write
          data:
            message: >
              [mvp-room-temp] Raumtemp {{ room_temp }}°C >= {{ threshold }}°C
              (room_too_hot=on) — m1={{ m1_status }} m2={{ m2_status }} → Eco (kein Cooldown)
            level: warning
        - if:
            - condition: template
              value_template: "{{ m1_status in ['Standard', 'Super'] }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner1_workmode_set
              data:
                option: Eco
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.mvp_miner1_last_downgrade
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - if:
            - condition: template
              value_template: "{{ m2_status in ['Standard', 'Super'] }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner2_workmode_set
              data:
                option: Eco
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.mvp_miner2_last_downgrade
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner1_temp_lockout_until
          data:
            datetime: "{{ (now() + timedelta(hours=3)).strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner2_temp_lockout_until
          data:
            datetime: "{{ (now() + timedelta(hours=3)).strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── TMax-Stufe 1: Super → Standard bei 112°C ─────────────────────────
    # Erster Schritt des Temperatur-Kaskade: Super → Standard sobald TMax
    # mvp_tmax_std_threshold_c (112°C) überschreitet. Gibt dem Miner die
    # Chance sich auf Standard zu kühlen bevor Stufe 2 (Standard → Eco) greift.
    - id: mvp_miner1_tmax_std_safety
      alias: "MVP: Miner 1 TMax → Standard"
      description: >
        Drosselt Miner 1 von Super auf Standard sobald TMax >= mvp_tmax_std_threshold_c (112°C).
        Stufe 1 der Kaskade: 112°C → Standard, 113°C → Eco.
        Kein Cooldown — Sicherheit hat Vorrang.
        Trigger static 99°C (< min. Schwelle 100°C) — Condition prüft konfigurierten Wert.
      mode: single
      trigger:
        - platform: numeric_state
          entity_id: sensor.miner1_tmax
          above: 99
      condition:
        - condition: template
          value_template: >
            {{ states('sensor.miner1_workmode_status') == 'Super'
               and states('sensor.miner1_tmax') | float(0) >= states('input_number.mvp_tmax_std_threshold_c') | float(112) }}
      action:
        - variables:
            tmax: "{{ states('sensor.miner1_tmax') | float(0) }}"
            threshold: "{{ states('input_number.mvp_tmax_std_threshold_c') | float(112) }}"
            m1_status: "{{ states('sensor.miner1_workmode_status') }}"
        - action: system_log.write
          data:
            message: >
              [mvp-miner1] TMax-Stufe1: tmax={{ tmax }}°C >= {{ threshold }}°C
              — status={{ m1_status }} → Standard (kein Cooldown)
            level: warning
        - action: select.select_option
          target:
            entity_id: select.miner1_workmode_set
          data:
            option: Standard
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner1_last_downgrade
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner1_temp_lockout_until
          data:
            datetime: "{{ (now() + timedelta(hours=3)).strftime('%Y-%m-%d %H:%M:%S') }}"

    - id: mvp_miner2_tmax_std_safety
      alias: "MVP: Miner 2 TMax → Standard"
      description: >
        Drosselt Miner 2 von Super auf Standard sobald TMax >= mvp_tmax_std_threshold_c (112°C).
        Stufe 1 der Kaskade: 112°C → Standard, 113°C → Eco.
        Kein Cooldown — Sicherheit hat Vorrang.
        Trigger static 99°C (< min. Schwelle 100°C) — Condition prüft konfigurierten Wert.
      mode: single
      trigger:
        - platform: numeric_state
          entity_id: sensor.miner2_tmax
          above: 99
      condition:
        - condition: template
          value_template: >
            {{ states('sensor.miner2_workmode_status') == 'Super'
               and states('sensor.miner2_tmax') | float(0) >= states('input_number.mvp_tmax_std_threshold_c') | float(112) }}
      action:
        - variables:
            tmax: "{{ states('sensor.miner2_tmax') | float(0) }}"
            threshold: "{{ states('input_number.mvp_tmax_std_threshold_c') | float(112) }}"
            m2_status: "{{ states('sensor.miner2_workmode_status') }}"
        - action: system_log.write
          data:
            message: >
              [mvp-miner2] TMax-Stufe1: tmax={{ tmax }}°C >= {{ threshold }}°C
              — status={{ m2_status }} → Standard (kein Cooldown)
            level: warning
        - action: select.select_option
          target:
            entity_id: select.miner2_workmode_set
          data:
            option: Standard
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner2_last_downgrade
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner2_temp_lockout_until
          data:
            datetime: "{{ (now() + timedelta(hours=3)).strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── TMax-Lockout bei internem Hardware-Schutzabschalten ──────────────
    # Wenn der Miner selbst wegen Überhitzung stoppt (Status aktiv→Standby/Off)
    # und TMax noch >= Schwelle, muss der Lockout gesetzt werden.
    # Sonst würde P4 den Miner sofort neu starten da tmax_safety nur auf
    # Standard/Super feuert und keinen Lockout für diesen Fall setzt.
    - id: mvp_miner1_tmax_lockout_on_selfstop
      alias: "MVP: Miner 1 TMax-Lockout bei Selbstabschaltung"
      description: >
        Setzt 3h Temp-Lockout wenn Miner 1 von aktiver Workmode nach Standby/Off
        wechselt und TMax erhöht ist oder die API nicht mehr antwortet.
        95°C statt Schwelle (113°C): interner Hardware-Schutz greift früher;
        unavailable fängt den Fall ab wo die API beim Übertemperatur-Stop schon
        abgestürzt ist und float(0) die Bedingung sonst fälschlicherweise killen würde.
      mode: single
      trigger:
        - platform: state
          entity_id: sensor.miner1_workmode_status
          from:
            - Eco
            - Standard
            - Super
          to:
            - Standby
            - "Off"
      condition:
        - condition: template
          value_template: >
            {% set tmax = states('sensor.miner1_tmax') %}
            {{ tmax in ['unavailable', 'unknown'] or tmax | float(0) >= 95 }}
      action:
        - variables:
            tmax: "{{ states('sensor.miner1_tmax') | float(0) }}"
        - action: system_log.write
          data:
            message: >
              [mvp-miner1] TMax-Lockout bei Selbstabschaltung: tmax={{ tmax }}°C
              — Miner hat intern gestoppt → Lockout 3h gesetzt (verhindert P4-Neustart)
            level: warning
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner1_last_downgrade
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner1_temp_lockout_until
          data:
            datetime: "{{ (now() + timedelta(hours=3)).strftime('%Y-%m-%d %H:%M:%S') }}"

    - id: mvp_miner2_tmax_lockout_on_selfstop
      alias: "MVP: Miner 2 TMax-Lockout bei Selbstabschaltung"
      description: >
        Setzt 3h Temp-Lockout wenn Miner 2 von aktiver Workmode nach Standby/Off
        wechselt und TMax erhöht ist oder die API nicht mehr antwortet.
        95°C statt Schwelle (113°C): interner Hardware-Schutz greift früher;
        unavailable fängt den Fall ab wo die API beim Übertemperatur-Stop schon
        abgestürzt ist und float(0) die Bedingung sonst fälschlicherweise killen würde.
      mode: single
      trigger:
        - platform: state
          entity_id: sensor.miner2_workmode_status
          from:
            - Eco
            - Standard
            - Super
          to:
            - Standby
            - "Off"
      condition:
        - condition: template
          value_template: >
            {% set tmax = states('sensor.miner2_tmax') %}
            {{ tmax in ['unavailable', 'unknown'] or tmax | float(0) >= 95 }}
      action:
        - variables:
            tmax: "{{ states('sensor.miner2_tmax') | float(0) }}"
        - action: system_log.write
          data:
            message: >
              [mvp-miner2] TMax-Lockout bei Selbstabschaltung: tmax={{ tmax }}°C
              — Miner hat intern gestoppt → Lockout 3h gesetzt (verhindert P4-Neustart)
            level: warning
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner2_last_downgrade
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.mvp_miner2_temp_lockout_until
          data:
            datetime: "{{ (now() + timedelta(hours=3)).strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── State-Transition-Logger ────────────────────────────────────────────
    - id: miner_state_transition_logger
      alias: "Miner: State-Transitions loggen"
      trigger:
        - platform: state
          entity_id:
            - sensor.miner1_workmode_status
            - sensor.miner2_workmode_status
      action:
        - action: system_log.write
          data:
            message: >
              [miner-state] {{ trigger.entity_id }}:
              {{ trigger.from_state.state }} → {{ trigger.to_state.state }}
              | sys={{ states('sensor.' ~ trigger.entity_id.split('.')[1].replace('workmode_status', 'systemstatus')) }}
              | state={{ states('sensor.' ~ trigger.entity_id.split('.')[1].replace('workmode_status', 'state')) }}
              | w={{ states('sensor.shellyplugsg3_' ~ ('dcb4d9c5567c_leistung' if 'miner1' in trigger.entity_id else 'd0cf13d86254_leistung')) }}W
            level: info

    # ── Nacht-Sperre: Miner stoppen wenn Hamster schläft ─────────────────
    - id: mvp_night_block_start
      alias: "MVP: Nacht-Sperre — Mining stoppen"
      description: >
        Stoppt alle Miner um 22:00 Uhr. Mining wird automatisch wieder gestartet
        durch den Watchdog sobald die Nacht-Sperre endet und SoC/PV-Bedingungen
        erfüllt sind. Auch bei HA-Start geprüft (Nacht-Neustart).
      mode: single
      trigger:
        - platform: time
          at: input_datetime.mvp_night_block_start
        - platform: homeassistant
          event: start
      condition:
        - condition: state
          entity_id: binary_sensor.mvp_nacht_sperre_aktiv
          state: "on"
      action:
        - action: system_log.write
          data:
            message: "[mvp-night] Nacht-Sperre aktiv — Miner 1 + 2 → Standby"
            level: warning
        - if:
            - condition: template
              value_template: >-
                {{ states('input_datetime.last_start_at')[:10] == now().strftime('%Y-%m-%d')
                   and (states('sensor.miner1_workmode_status') not in ['Standby', 'Off']
                        or states('sensor.miner2_workmode_status') not in ['Standby', 'Off']) }}
          then:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.last_stop_at
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - if:
            - condition: template
              value_template: "{{ states('sensor.miner1_workmode_status') not in ['Standby', 'Off'] }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner1_workmode_set
              data:
                option: Standby
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.mvp_miner1_last_downgrade
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - if:
            - condition: template
              value_template: "{{ states('sensor.miner2_workmode_status') not in ['Standby', 'Off'] }}"
          then:
            - action: select.select_option
              target:
                entity_id: select.miner2_workmode_set
              data:
                option: Standby
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.mvp_miner2_last_downgrade
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # ── Beide-Miner-Standby: last_stop_at Race-Condition absichern ────────────
    - id: mvp_all_miners_standby
      alias: "MVP: last_stop_at — beide Miner in Standby"
      description: >
        Setzt last_stop_at wenn beide Miner in Standby/Off wechseln.
        Sicherheitsnetz gegen Race Condition im P1-Stop: gehen beide Miner
        gleichzeitig in Standby (gleicher SoC-Trigger), sieht jeder den anderen
        noch aktiv — last_stop_at bleibt sonst leer.
      mode: single
      trigger:
        - platform: state
          entity_id:
            - sensor.miner1_workmode_status
            - sensor.miner2_workmode_status
          to:
            - Standby
            - "Off"
      condition:
        - condition: template
          value_template: >-
            {{ states('sensor.miner1_workmode_status') in ['Standby', 'Off']
               and states('sensor.miner2_workmode_status') in ['Standby', 'Off']
               and trigger.from_state.state not in ['Standby', 'Off', 'unavailable', 'unknown']
               and states('input_datetime.last_start_at')[:10] == now().strftime('%Y-%m-%d') }}
      action:
        - action: system_log.write
          data:
            message: >
              [mvp-all-standby] Beide Miner Standby — last_stop_at gesetzt
              (via={{ trigger.entity_id }}, von={{ trigger.from_state.state }})
            level: warning
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.last_stop_at
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
