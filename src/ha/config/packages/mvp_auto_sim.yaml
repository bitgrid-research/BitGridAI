# ═══════════════════════════════════════════════════════
# MVP Auto Simulation — Package for Simulated Miner Control
# ═══════════════════════════════════════════════════════
# This package mirrors the production MVP logic but uses
# simulation-specific sensors and helpers (sim_* prefix).
# Triggers on homeassistant start, input changes, and miner mode changes.
# ═══════════════════════════════════════════════════════

sim_mvp_auto:
  input_number:
    sim_mvp_soc_eco_start_pct:
      name: "Sim MVP Eco-Start SoC (%)"
      min: 0
      max: 100
      step: 1
      mode: box
      initial: 65
      icon: mdi:battery-charging-60

    sim_mvp_pv_start_w:
      name: "Sim MVP Eco-Start PV (W)"
      min: 0
      max: 15000
      step: 500
      mode: box
      initial: 6000
      icon: mdi:solar-power

    sim_mvp_soc_std_pct:
      name: "Sim MVP Standard-Start SoC (%)"
      min: 50
      max: 100
      step: 1
      mode: box
      initial: 80
      icon: mdi:battery-70

    sim_mvp_soc_std_stop_pct:
      name: "Sim MVP Standard-Stop SoC (%)"
      min: 50
      max: 100
      step: 1
      mode: box
      initial: 75
      icon: mdi:battery-arrow-down-outline

    sim_mvp_soc_super_pct:
      name: "Sim MVP Super-Start SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 90
      icon: mdi:battery

    sim_mvp_soc_super_stop_pct:
      name: "Sim MVP Super-Stop SoC (%)"
      min: 50
      max: 100
      step: 5
      mode: box
      initial: 85
      icon: mdi:battery-arrow-down

    sim_mvp_soc_stop_pct:
      name: "Sim MVP Stop SoC (%)"
      min: 0
      max: 100
      step: 1
      mode: box
      initial: 50
      icon: mdi:battery-alert

    battery_capacity_kwh:
      name: "Sim Battery Capacity (kWh)"
      min: 1
      max: 30
      step: 0.5
      mode: box
      initial: 10
      icon: mdi:battery-high

  input_boolean:
    sim_miner1_auto_load_management:
      name: "Sim Miner 1 Auto Load Management"
      icon: mdi:refresh-auto
      initial: true

    sim_miner2_auto_load_management:
      name: "Sim Miner 2 Auto Load Management"
      icon: mdi:refresh-auto
      initial: true

  input_select:
    sim_miner1_workmode_set:
      name: "Sim Miner 1 Workmode Set"
      icon: mdi:pickaxe
      options:
        - Standby
        - Eco
        - Standard
        - Super
      initial: Standby

    sim_miner2_workmode_set:
      name: "Sim Miner 2 Workmode Set"
      icon: mdi:pickaxe
      options:
        - Standby
        - Eco
        - Standard
        - Super
      initial: Standby

  input_datetime:
    sim_mvp_miner1_last_upgrade:
      name: "Sim Miner 1 Last Upgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-up-circle
      initial: "1970-01-01 00:00:00"

    sim_mvp_miner1_last_downgrade:
      name: "Sim Miner 1 Last Downgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-down-circle
      initial: "1970-01-01 00:00:00"

    sim_mvp_miner2_last_upgrade:
      name: "Sim Miner 2 Last Upgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-up-circle
      initial: "1970-01-01 00:00:00"

    sim_mvp_miner2_last_downgrade:
      name: "Sim Miner 2 Last Downgrade"
      has_date: true
      has_time: true
      icon: mdi:arrow-down-circle
      initial: "1970-01-01 00:00:00"

  automation:
    # ── Simulation Rule Engine — Mirrors Production MVP Logic ─────────────────
    - id: sim_mvp_rule_engine
      alias: "SIM: MVP Rule Engine"
      description: >
        Simulation Rule Engine that mirrors production MVP logic.
        Evaluates R1 (Surplus), R2 (SoC/Grid), R3 (Temp) and sets miner modes.
        Triggers on homeassistant start, sensor changes, and miner mode changes.
      mode: queued
      trigger:
        # Trigger on HA start to evaluate initial state
        - platform: homeassistant
          event: start

        # Trigger on simulation input sensors
        - platform: state
          entity_id:
            - sensor.sim_pv_power_w
            - sensor.sim_house_load_w
            - sensor.sim_grid_import_w
            - sensor.sim_battery_soc_pct
            - sensor.sim_battery_power_w
            - sensor.sim_miner_chip_temp_c
            - sensor.sim_grid_export_w

        # Trigger on simulation rule thresholds
        - platform: state
          entity_id:
            - input_number.sim_r1_surplus_min_kw
            - input_number.sim_r2_soc_soft_min_pct
            - input_number.sim_r2_soc_hard_min_pct
            - input_number.sim_r2_max_grid_import_w
            - input_number.sim_r3_max_chip_temp_c

        # Trigger on MVP simulation thresholds
        - platform: state
          entity_id:
            - input_number.sim_mvp_soc_eco_start_pct
            - input_number.sim_mvp_soc_std_pct
            - input_number.sim_mvp_soc_std_stop_pct
            - input_number.sim_mvp_soc_super_pct
            - input_number.sim_mvp_soc_super_stop_pct
            - input_number.sim_mvp_soc_stop_pct
            - input_number.sim_mvp_pv_start_w

        # Trigger on miner mode selection changes (for feedback loop)
        - platform: state
          entity_id:
            - input_select.sim_miner1_workmode_set
            - input_select.sim_miner2_workmode_set

      condition: []

      action:
        - variables:
            # Simulation sensor values
            pv_w: "{{ states('sensor.sim_pv_power_w') | float(0) }}"
            house_w: "{{ states('sensor.sim_house_load_w') | float(0) }}"
            grid_import_w: "{{ states('sensor.sim_grid_import_w') | float(0) }}"
            soc_pct: "{{ states('sensor.sim_battery_soc_pct') | float(0) }}"
            battery_power_w: "{{ states('sensor.sim_battery_power_w') | float(0) }}"
            chip_temp_c: "{{ states('sensor.sim_miner_chip_temp_c') | float(0) }}"

            # Simulation thresholds
            r1_surplus_min_kw: "{{ states('input_number.sim_r1_surplus_min_kw') | float(0) }}"
            r2_soc_soft_min_pct: "{{ states('input_number.sim_r2_soc_soft_min_pct') | float(0) }}"
            r2_soc_hard_min_pct: "{{ states('input_number.sim_r2_soc_hard_min_pct') | float(0) }}"
            r2_max_grid_import_w: "{{ states('input_number.sim_r2_max_grid_import_w') | float(0) }}"
            r3_max_chip_temp_c: "{{ states('input_number.sim_r3_max_chip_temp_c') | float(0) }}"

            # MVP simulation thresholds
            mvp_soc_eco_start_pct: "{{ states('input_number.sim_mvp_soc_eco_start_pct') | float(65) }}"
            mvp_soc_std_pct: "{{ states('input_number.sim_mvp_soc_std_pct') | float(80) }}"
            mvp_soc_std_stop_pct: "{{ states('input_number.sim_mvp_soc_std_stop_pct') | float(75) }}"
            mvp_soc_super_pct: "{{ states('input_number.sim_mvp_soc_super_pct') | float(90) }}"
            mvp_soc_super_stop_pct: "{{ states('input_number.sim_mvp_soc_super_stop_pct') | float(85) }}"
            mvp_soc_stop_pct: "{{ states('input_number.sim_mvp_soc_stop_pct') | float(50) }}"
            mvp_pv_start_w: "{{ states('input_number.sim_mvp_pv_start_w') | float(6000) }}"

            # Current miner modes
            sim_miner1_mode: "{{ states('input_select.sim_miner1_workmode_set') }}"
            sim_miner2_mode: "{{ states('input_select.sim_miner2_workmode_set') }}"
            sim_miner1_mode_status: "{{ states('sensor.sim_miner1_workmode_status') }}"
            sim_miner2_mode_status: "{{ states('sensor.sim_miner2_workmode_status') }}"

            # Cooldown tracking
            m1_up_ts: "{{ state_attr('input_datetime.sim_mvp_miner1_last_upgrade', 'timestamp') | float(0) }}"
            m1_dn_ts: "{{ state_attr('input_datetime.sim_mvp_miner1_last_downgrade', 'timestamp') | float(0) }}"
            m2_up_ts: "{{ state_attr('input_datetime.sim_mvp_miner2_last_upgrade', 'timestamp') | float(0) }}"
            m2_dn_ts: "{{ state_attr('input_datetime.sim_mvp_miner2_last_downgrade', 'timestamp') | float(0) }}"
            now_ts: "{{ now().timestamp() }}"
            cooldown_sec: 3600

            # Calculate surplus (PV - House - Grid Import = Surplus)
            surplus_kw: "{{ ((pv_w - house_w - grid_import_w) / 1000) | round(3) }}"

            # Rule evaluations
            r1_surplus_ok: "{{ surplus_kw >= r1_surplus_min_kw }}"
            r2_soc_soft_ok: "{{ soc_pct >= r2_soc_soft_min_pct }}"
            r2_soc_hard_ok: "{{ soc_pct >= r2_soc_hard_min_pct }}"
            r2_grid_ok: "{{ grid_import_w <= r2_max_grid_import_w }}"
            r3_temp_ok: "{{ chip_temp_c < r3_max_chip_temp_c }}"

            # Decision logic (priority: R3 > R2 > R1)
            decision_action: >-
              {% if not r3_temp_ok %}
                STOP
              {% elif not r2_soc_hard_ok or not r2_grid_ok %}
                STOP
              {% elif r1_surplus_ok and r2_soc_soft_ok and r2_grid_ok %}
                START
              {% else %}
                NOOP
              {% endif %}

            decision_priority: >-
              {% if not r3_temp_ok %}
                R3_SAFETY
              {% elif not r2_soc_hard_ok or not r2_grid_ok %}
                R2_AUTARKY
              {% elif r1_surplus_ok and r2_soc_soft_ok and r2_grid_ok %}
                R1_SURPLUS
              {% else %}
                IDLE
              {% endif %}

            # Determine target mode based on SoC and rules
            target_mode: >-
              {% if not r3_temp_ok %}
                Standby
              {% elif not r2_soc_hard_ok or not r2_grid_ok %}
                Standby
              {% elif soc_pct >= mvp_soc_super_pct and r1_surplus_ok %}
                Super
              {% elif soc_pct >= mvp_soc_std_pct and r1_surplus_ok %}
                Standard
              {% elif soc_pct >= mvp_soc_eco_start_pct and r1_surplus_ok %}
                Eco
              {% else %}
                Standby
              {% endif %}

            # Log trigger for debugging
            trigger_info: >-
              trigger={{ trigger.platform }} entity={{ trigger.entity_id }}

        - action: system_log.write
          data:
            message: >
              [sim-mvp] {{ trigger_info }}
              soc={{ soc_pct }}% pv={{ pv_w }}W grid={{ grid_import_w }}W bat={{ battery_power_w | round(0) }}W temp={{ chip_temp_c }}°C
              r1={{ 'OK' if r1_surplus_ok else 'FAIL' }} r2_soft={{ 'OK' if r2_soc_soft_ok else 'FAIL' }} r2_hard={{ 'OK' if r2_soc_hard_ok else 'FAIL' }} r2_grid={{ 'OK' if r2_grid_ok else 'FAIL' }} r3={{ 'OK' if r3_temp_ok else 'FAIL' }}
              decision={{ decision_action }}/{{ decision_priority }} target={{ target_mode }}
              m1={{ sim_miner1_mode }} m2={{ sim_miner2_mode }}
            level: warning

        - choose:
            # Safety stop - force both miners to Standby
            - conditions:
                - condition: template
                  value_template: "{{ decision_action == 'STOP' and not r3_temp_ok }}"
              sequence:
                - action: system_log.write
                  data:
                    message: "[sim-mvp] R3_OVERTEMP: chip_temp={{ chip_temp_c }}°C >= {{ r3_max_chip_temp_c }}°C → Standby"
                    level: warning
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sim_miner1_workmode_set
                  data:
                    option: Standby
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sim_miner2_workmode_set
                  data:
                    option: Standby
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.sim_mvp_miner1_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.sim_mvp_miner2_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # Safety stop - R2 Autarky violation
            - conditions:
                - condition: template
                  value_template: "{{ decision_action == 'STOP' and (not r2_soc_hard_ok or not r2_grid_ok) }}"
              sequence:
                - action: system_log.write
                  data:
                    message: >
                      [sim-mvp] R2_AUTARKY: soc={{ soc_pct }}% >= {{ r2_soc_hard_min_pct }}%: {{ 'OK' if r2_soc_hard_ok else 'FAIL' }}
                      grid={{ grid_import_w }}W <= {{ r2_max_grid_import_w }}W: {{ 'OK' if r2_grid_ok else 'FAIL' }} → Standby
                    level: warning
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sim_miner1_workmode_set
                  data:
                    option: Standby
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sim_miner2_workmode_set
                  data:
                    option: Standby
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.sim_mvp_miner1_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.sim_mvp_miner2_last_downgrade
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            # START/NOOP - Apply target mode based on SoC thresholds
            - conditions:
                - condition: template
                  value_template: "{{ decision_action in ['START', 'NOOP'] }}"
              sequence:
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sim_miner1_workmode_set
                  data:
                    option: "{{ target_mode }}"
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sim_miner2_workmode_set
                  data:
                    option: "{{ target_mode }}"
                - action: system_log.write
                  data:
                    message: >
                      [sim-mvp] {{ decision_action }}: surplus={{ surplus_kw }}kW soc={{ soc_pct }}%
                      target={{ target_mode }} m1={{ sim_miner1_mode }} m2={{ sim_miner2_mode }}
                    level: info

  # ── Simulation Power Update — REMOVED ───────────────────────────────────────
  # The sim_miner_power_w sensor is now a template sensor in configuration.yaml
  # that auto-calculates based on the input_select.sim_miner1_workmode_set and
  # input_select.sim_miner2_workmode_set values. This automation is no longer needed.
