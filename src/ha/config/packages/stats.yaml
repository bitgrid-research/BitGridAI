stats:

  # ── Tageslog: Mining-Sessions persistieren ────────────────────────────────────
  # Format pro Eintrag: YYYY-MM-DD,HH:MM,HH:MM,tot_h,eco_h,std_h,sup_h,kwh
  # Pipe-separiert, 5+5 Einträge über zwei input_text — Rolling Window für UI.
  # Langzeit-Archiv: /config/mining_log.csv (täglich 23:59:59, nie überschrieben).
  input_text:
    mining_daily_log:
      name: "Mining Tageslog (Einträge 1-5)"
      max: 255
      icon: mdi:database-clock
    mining_daily_log_b:
      name: "Mining Tageslog (Einträge 6-10)"
      max: 255
      icon: mdi:database-clock

  # ── Recovery-Snapshot: heutige Werte kurz vor Mitternacht sichern ───────────────
  # Wird um 23:59:30 geschrieben. Wenn die Hauptautomation (23:59:59) ausfällt,
  # kann stats_recover_missed_daily_log beim nächsten HA-Start darauf zugreifen.
  # input_datetime.miner_start/stop_yesterday liefert die Start/Stop-Zeiten.

  # ── Midnight-Baselines (ersetzt utility_meter, das in HA 2026.x entfernt wurde)
  # Speichern den Integral-Wert zum Tagesbeginn; Template-Sensor berechnet Delta.
  input_number:
    yesterday_mining_h:
      name: "Mining Gestern (h) — Recovery-Snapshot"
      min: 0
      max: 24
      step: 0.01
      mode: box
    yesterday_eco_h:
      name: "Eco Gestern (h) — Recovery-Snapshot"
      min: 0
      max: 24
      step: 0.01
      mode: box
    yesterday_std_h:
      name: "Standard Gestern (h) — Recovery-Snapshot"
      min: 0
      max: 24
      step: 0.01
      mode: box
    yesterday_sup_h:
      name: "Speed Gestern (h) — Recovery-Snapshot"
      min: 0
      max: 24
      step: 0.01
      mode: box
    yesterday_kwh:
      name: "Mining kWh Gestern — Recovery-Snapshot"
      min: 0
      max: 9999
      step: 0.01
      mode: box

    pv_energy_midnight:
      name: "PV kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    mining_energy_midnight:
      name: "Mining kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    grid_import_midnight:
      name: "Netzbezug kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    grid_export_midnight:
      name: "Einspeisung kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    house_energy_midnight:
      name: "Hausverbrauch kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    heizstab_energy_midnight:
      name: "Heizstab kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box

    # YTD-Akkumulatoren: täglich um 00:00:03 aufgefüllt, am 1.1. zurückgesetzt.
    pv_kwh_ytd:
      name: "PV kWh YTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    mining_kwh_ytd:
      name: "Mining kWh YTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    grid_import_ytd:
      name: "Netzbezug kWh YTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    grid_export_ytd:
      name: "Einspeisung kWh YTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    house_kwh_ytd:
      name: "Hausverbrauch kWh YTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    heizstab_kwh_ytd:
      name: "Heizstab kWh YTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    mining_uptime_ytd_h:
      name: "Mining Uptime YTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    miner_eco_ytd_h:
      name: "Miner Eco YTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    miner_standard_ytd_h:
      name: "Miner Standard YTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    miner_super_ytd_h:
      name: "Miner Speed YTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    pv_kwh_mtd:
      name: "PV kWh MTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    mining_kwh_mtd:
      name: "Mining kWh MTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    grid_import_mtd:
      name: "Grid Import MTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    grid_export_mtd:
      name: "Grid Export MTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    house_kwh_mtd:
      name: "Hausverbrauch kWh MTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    heizstab_kwh_mtd:
      name: "Heizstab kWh MTD"
      min: 0
      max: 999999
      step: 0.001
      mode: box
    mining_uptime_mtd_h:
      name: "Mining Uptime MTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    miner_eco_mtd_h:
      name: "Miner Eco MTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    miner_standard_mtd_h:
      name: "Miner Standard MTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box
    miner_super_mtd_h:
      name: "Miner Speed MTD (h)"
      min: 0
      max: 99999
      step: 0.01
      mode: box

  # ── Laufzeit-Tracking via history_stats + Lastprofil-Baseline ───────────────
  sensor:
    - platform: history_stats
      name: "miner_uptime_today_h"
      entity_id: binary_sensor.miners_any_running
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_super_hours_today"
      entity_id: binary_sensor.miners_in_super
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_eco_hours_today"
      entity_id: binary_sensor.miners_in_eco
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_deadband_hours_today"
      entity_id: binary_sensor.r5_deadband_active
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "mining_window_hours_today"
      entity_id: binary_sensor.mining_window_open
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_standard_hours_today"
      entity_id: binary_sensor.miners_in_standard
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    # Lastprofil-Baseline: rollierender 7-Tage-Mittelwert (statistics-Plattform)
    - platform: statistics
      name: "house_load_mean_7d"
      entity_id: sensor.house_load_w
      state_characteristic: mean
      max_age:
        hours: 168
      sampling_size: 1008

  # ── Abgeleitete Template-Sensoren ───────────────────────────────────────────
  template:
    - sensor:
        # Tägliche kWh: Integral minus Midnight-Baseline
        - name: "pv_energy_daily"
          unique_id: pv_energy_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.pv_energy_integral') | float(0) %}
            {% set base = states('input_number.pv_energy_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "mining_energy_daily"
          unique_id: mining_energy_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.mining_energy_integral') | float(0) %}
            {% set base = states('input_number.mining_energy_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "grid_import_daily"
          unique_id: grid_import_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.grid_import_integral') | float(0) %}
            {% set base = states('input_number.grid_import_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "grid_export_daily"
          unique_id: grid_export_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.grid_export_integral') | float(0) %}
            {% set base = states('input_number.grid_export_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "house_energy_daily"
          unique_id: house_energy_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.house_energy_integral') | float(0) %}
            {% set base = states('input_number.house_energy_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "heizstab_energy_daily"
          unique_id: heizstab_energy_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.heizstab_energy_integral') | float(0) %}
            {% set base = states('input_number.heizstab_energy_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        # Solar-Autarkiegrad: PV / (PV + Netzbezug) * 100
        - name: "solar_coverage_pct"
          unique_id: solar_coverage_pct
          unit_of_measurement: "%"
          state_class: measurement
          state: >-
            {% set pv   = states('sensor.pv_energy_daily') | float(0) %}
            {% set grid = states('sensor.grid_import_daily') | float(0) %}
            {% set total = pv + grid %}
            {% if total > 0 %}
              {{ (pv / total * 100) | round(1) }}
            {% else %}
              0
            {% endif %}

        # Deadband Hit Rate: Anteil des Tages wo R5 aktiv war
        - name: "deadband_hit_rate_pct"
          unique_id: deadband_hit_rate_pct
          unit_of_measurement: "%"
          state_class: measurement
          state: >-
            {% set h = states('sensor.miner_deadband_hours_today') | float(0) %}
            {{ (h / 24 * 100) | round(1) }}

        # Live Mining-Effizienz: kWh pro Betriebsstunde
        - name: "efficiency_kwh_per_h_live"
          unique_id: efficiency_kwh_per_h_live
          unit_of_measurement: "kWh/h"
          state_class: measurement
          state: >-
            {% set kwh = states('sensor.mining_energy_daily') | float(0) %}
            {% set h   = states('sensor.miner_uptime_today_h') | float(0) %}
            {% if h > 0 %}
              {{ (kwh / h) | round(3) }}
            {% else %}
              0
            {% endif %}

        # ── Mining-Fenster-Ausnutzung: Uptime / Fenster-Stunden heute ──────────
        # 100% = Miner lief die gesamte Zeit in der Fenster offen war.
        # < 70% = Optimierungspotenzial vorhanden.
        - name: "mining_window_used_pct"
          unique_id: mining_window_used_pct
          unit_of_measurement: "%"
          state_class: measurement
          state: >-
            {% set uptime = states('sensor.miner_uptime_today_h') | float(0) %}
            {% set window = states('sensor.mining_window_hours_today') | float(0) %}
            {% if window > 0 %}
              {{ [uptime / window * 100, 100] | min | round(1) }}
            {% else %}
              0
            {% endif %}

        # ── Hauslast-Prognose: Mittelwert × Tageszeit-Faktor ────────────────────
        # Faktoren für 4-Personen-Familie (2 Kinder im Schulalter).
        # Werktag: Schulzeiten → niedrig, Abend → hoch.
        # Wochenende: tagsüber durchgehend erhöht.
        - name: "house_load_forecast_w"
          unique_id: house_load_forecast_w
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: >-
            {% set base = states('sensor.house_load_mean_7d') | float(0) %}
            {% if base == 0 %}
              {{ states('sensor.house_load_w') | float(0) }}
            {% else %}
              {% set h = now().hour %}
              {% set wd = now().weekday() %}   {# 0=Mo … 4=Fr, 5=Sa, 6=So #}
              {% if wd <= 4 %}
                {# Werktag #}
                {% if   h >= 6  and h < 8  %} {% set f = 1.3  %}{# Morgen #}
                {% elif h >= 8  and h < 15 %} {% set f = 0.65 %}{# Schule/Arbeit → niedrig #}
                {% elif h >= 15 and h < 17 %} {% set f = 1.2  %}{# Kinder nachhause #}
                {% elif h >= 17 and h < 21 %} {% set f = 1.4  %}{# Abend #}
                {% elif h >= 21 and h < 23 %} {% set f = 0.9  %}{# Abendruhe #}
                {% else %}                    {% set f = 0.4  %}{# Nacht #}
                {% endif %}
              {% else %}
                {# Wochenende: Familie ganztags zuhause #}
                {% if   h >= 6  and h < 8  %} {% set f = 0.8  %}{# Langsamer Start #}
                {% elif h >= 8  and h < 22 %} {% set f = 1.3  %}{# Familientag #}
                {% else %}                    {% set f = 0.4  %}{# Nacht #}
                {% endif %}
              {% endif %}
              {{ (base * f) | round(0) }}
            {% endif %}

        # ── Mining-Fenster: freie Leistung nach Hauslast-Prognose ───────────────
        # Strategie: Solar-Only-Mining.
        #   SoC < 65%: Batterie hat Vorrang — hohe Reserve einplanen (1000W).
        #   SoC ≥ 65%: Überschuss fließt in Mining, Batterie lädt nebenbei.
        # Nachts kein PV → pv_power_w ≈ 0 → Wert automatisch negativ → kein Mining.
        - name: "mining_window_free_w"
          unique_id: mining_window_free_w
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: >-
            {% set pv       = states('sensor.pv_power_w') | float(0) %}
            {% set forecast = states('sensor.house_load_forecast_w') | float(0) %}
            {% set bat_soc  = states('sensor.battery_soc_pct') | float(0) %}
            {% set bat_reserve = 1000 if bat_soc < 65 else 0 %}
            {{ (pv - forecast - bat_reserve) | round(0) }}

    - binary_sensor:
        - name: "miners_in_standard"
          unique_id: miners_in_standard
          state: >-
            {{ states('sensor.miner1_workmode_status') == 'Standard' or
               states('sensor.miner2_workmode_status') == 'Standard' }}

        # True wenn genug freie Leistung für zumindest Eco-Betrieb (≥ 600 W frei)
        - name: "mining_window_open"
          unique_id: mining_window_open
          device_class: running
          state: >-
            {{ states('sensor.mining_window_free_w') | float(0) >= 600 }}

    - sensor:
        # Uptime als formatierter String "Xh Ym"
        - name: "miner_uptime_today_fmt"
          unique_id: miner_uptime_today_fmt
          state: >-
            {% set h = states('sensor.miner_uptime_today_h') | float(0) %}
            {% set hours = h | int %}
            {% set mins  = ((h - hours) * 60) | int %}
            {{ hours }}h {{ mins }}m

  # ── Automationen ─────────────────────────────────────────────────────────────
  automation:
    # Midnight-Reset: Baselines auf aktuelle Integral-Werte setzen
    - id: stats_midnight_baseline_reset
      alias: "Stats: Midnight Baseline Reset"
      trigger:
        - platform: time
          at: "00:00:05"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.pv_energy_midnight
          data:
            value: "{{ states('sensor.pv_energy_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.mining_energy_midnight
          data:
            value: "{{ states('sensor.mining_energy_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.grid_import_midnight
          data:
            value: "{{ states('sensor.grid_import_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.grid_export_midnight
          data:
            value: "{{ states('sensor.grid_export_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.house_energy_midnight
          data:
            value: "{{ states('sensor.house_energy_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.heizstab_energy_midnight
          data:
            value: "{{ states('sensor.heizstab_energy_integral') | float(0) }}"

    # YTD-Akkumulatoren: Tageswerte addieren (vor Baseline-Reset bei 00:00:05!)
    - id: stats_accumulate_ytd
      alias: "Stats: YTD Akkumulatoren tageweise erhöhen"
      trigger:
        - platform: time
          at: "00:00:03"
      action:
        - variables:
            pv_d:     "{{ states('sensor.pv_energy_daily')      | float(0) }}"
            mine_d:   "{{ states('sensor.mining_energy_daily')  | float(0) }}"
            imp_d:    "{{ states('sensor.grid_import_daily')    | float(0) }}"
            exp_d:    "{{ states('sensor.grid_export_daily')    | float(0) }}"
            house_d:  "{{ states('sensor.house_energy_daily')   | float(0) }}"
            hz_d:     "{{ states('sensor.heizstab_energy_daily')| float(0) }}"
            up_d:     "{{ states('sensor.miner_uptime_today_h') | float(0) }}"
            eco_d:    "{{ states('sensor.miner_eco_hours_today')      | float(0) }}"
            std_d:    "{{ states('sensor.miner_standard_hours_today') | float(0) }}"
            sup_d:    "{{ states('sensor.miner_super_hours_today')    | float(0) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.pv_kwh_ytd }
          data:
            value: "{{ (states('input_number.pv_kwh_ytd') | float(0) + pv_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.mining_kwh_ytd }
          data:
            value: "{{ (states('input_number.mining_kwh_ytd') | float(0) + mine_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.grid_import_ytd }
          data:
            value: "{{ (states('input_number.grid_import_ytd') | float(0) + imp_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.grid_export_ytd }
          data:
            value: "{{ (states('input_number.grid_export_ytd') | float(0) + exp_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.house_kwh_ytd }
          data:
            value: "{{ (states('input_number.house_kwh_ytd') | float(0) + house_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.heizstab_kwh_ytd }
          data:
            value: "{{ (states('input_number.heizstab_kwh_ytd') | float(0) + hz_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.mining_uptime_ytd_h }
          data:
            value: "{{ (states('input_number.mining_uptime_ytd_h') | float(0) + up_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.miner_eco_ytd_h }
          data:
            value: "{{ (states('input_number.miner_eco_ytd_h') | float(0) + eco_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.miner_standard_ytd_h }
          data:
            value: "{{ (states('input_number.miner_standard_ytd_h') | float(0) + std_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.miner_super_ytd_h }
          data:
            value: "{{ (states('input_number.miner_super_ytd_h') | float(0) + sup_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.pv_kwh_mtd }
          data:
            value: "{{ (states('input_number.pv_kwh_mtd') | float(0) + pv_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.mining_kwh_mtd }
          data:
            value: "{{ (states('input_number.mining_kwh_mtd') | float(0) + mine_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.grid_import_mtd }
          data:
            value: "{{ (states('input_number.grid_import_mtd') | float(0) + imp_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.grid_export_mtd }
          data:
            value: "{{ (states('input_number.grid_export_mtd') | float(0) + exp_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.house_kwh_mtd }
          data:
            value: "{{ (states('input_number.house_kwh_mtd') | float(0) + house_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.heizstab_kwh_mtd }
          data:
            value: "{{ (states('input_number.heizstab_kwh_mtd') | float(0) + hz_d) | round(3) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.mining_uptime_mtd_h }
          data:
            value: "{{ (states('input_number.mining_uptime_mtd_h') | float(0) + up_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.miner_eco_mtd_h }
          data:
            value: "{{ (states('input_number.miner_eco_mtd_h') | float(0) + eco_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.miner_standard_mtd_h }
          data:
            value: "{{ (states('input_number.miner_standard_mtd_h') | float(0) + std_d) | round(2) }}"
        - action: input_number.set_value
          target: { entity_id: input_number.miner_super_mtd_h }
          data:
            value: "{{ (states('input_number.miner_super_mtd_h') | float(0) + sup_d) | round(2) }}"

    # YTD-Reset am 1. Januar (läuft täglich mit, zündet nur am 1.1.)
    - id: stats_ytd_new_year_reset
      alias: "Stats: YTD Reset am 1. Januar"
      trigger:
        - platform: time
          at: "00:00:20"
      condition:
        - condition: template
          value_template: "{{ now().month == 1 and now().day == 1 }}"
      action:
        - variables:
            y:    "{{ now().year - 1 }}"
            pv:   "{{ states('input_number.pv_kwh_ytd')         | float(0) | round(3) }}"
            exp:  "{{ states('input_number.grid_export_ytd')    | float(0) | round(3) }}"
            imp:  "{{ states('input_number.grid_import_ytd')    | float(0) | round(3) }}"
            hs:   "{{ states('input_number.house_kwh_ytd')      | float(0) | round(3) }}"
            hz:   "{{ states('input_number.heizstab_kwh_ytd')   | float(0) | round(3) }}"
            mn:   "{{ states('input_number.mining_kwh_ytd')     | float(0) | round(3) }}"
            up:   "{{ states('input_number.mining_uptime_ytd_h')| float(0) | round(2) }}"
            eco:  "{{ states('input_number.miner_eco_ytd_h')    | float(0) | round(2) }}"
            std:  "{{ states('input_number.miner_standard_ytd_h')| float(0) | round(2) }}"
            spd:  "{{ states('input_number.miner_super_ytd_h')  | float(0) | round(2) }}"
            self: "{{ [0, (states('input_number.pv_kwh_ytd') | float(0)) - (states('input_number.grid_export_ytd') | float(0))] | max | round(3) }}"
        - action: shell_command.stats_yearly_log_append
          data:
            ENTRY: "{{ y }},{{ pv }},{{ self }},{{ exp }},{{ imp }},{{ hs }},{{ hz }},{{ mn }},{{ up }},{{ eco }},{{ std }},{{ spd }}"
        - action: input_number.set_value
          target: { entity_id: input_number.pv_kwh_ytd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.mining_kwh_ytd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.grid_import_ytd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.grid_export_ytd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.house_kwh_ytd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.heizstab_kwh_ytd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.mining_uptime_ytd_h }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.miner_eco_ytd_h }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.miner_standard_ytd_h }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.miner_super_ytd_h }
          data: { value: 0 }

    # MTD-Reset am 1. jedes Monats
    - id: stats_mtd_monthly_reset
      alias: "Stats: MTD Reset am Monatsersten"
      trigger:
        - platform: time
          at: "00:00:25"
      condition:
        - condition: template
          value_template: "{{ now().day == 1 }}"
      action:
        - variables:
            prev: "{{ (now().replace(day=1) - timedelta(days=1)) }}"
            y:    "{{ prev.year }}"
            m:    "{{ '%02d' % prev.month }}"
            pv:   "{{ states('input_number.pv_kwh_mtd')         | float(0) | round(3) }}"
            exp:  "{{ states('input_number.grid_export_mtd')    | float(0) | round(3) }}"
            imp:  "{{ states('input_number.grid_import_mtd')    | float(0) | round(3) }}"
            hs:   "{{ states('input_number.house_kwh_mtd')      | float(0) | round(3) }}"
            hz:   "{{ states('input_number.heizstab_kwh_mtd')   | float(0) | round(3) }}"
            mn:   "{{ states('input_number.mining_kwh_mtd')     | float(0) | round(3) }}"
            up:   "{{ states('input_number.mining_uptime_mtd_h')| float(0) | round(2) }}"
            eco:  "{{ states('input_number.miner_eco_mtd_h')    | float(0) | round(2) }}"
            std:  "{{ states('input_number.miner_standard_mtd_h')| float(0) | round(2) }}"
            spd:  "{{ states('input_number.miner_super_mtd_h')  | float(0) | round(2) }}"
            self: "{{ [0, (states('input_number.pv_kwh_mtd') | float(0)) - (states('input_number.grid_export_mtd') | float(0))] | max | round(3) }}"
        - action: shell_command.stats_monthly_log_append
          data:
            ENTRY: "{{ y }},{{ m }},{{ pv }},{{ self }},{{ exp }},{{ imp }},{{ hs }},{{ hz }},{{ mn }},{{ up }},{{ eco }},{{ std }},{{ spd }}"
        - action: input_number.set_value
          target: { entity_id: input_number.pv_kwh_mtd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.mining_kwh_mtd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.grid_import_mtd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.grid_export_mtd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.house_kwh_mtd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.heizstab_kwh_mtd }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.mining_uptime_mtd_h }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.miner_eco_mtd_h }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.miner_standard_mtd_h }
          data: { value: 0 }
        - action: input_number.set_value
          target: { entity_id: input_number.miner_super_mtd_h }
          data: { value: 0 }

    # Recovery-Snapshot: Tageswerte kurz vor Mitternacht sichern
    # Feuert bei 23:59:30 — bevor history_stats-Sensoren um Mitternacht resetten.
    # Wenn die Hauptautomation (23:59:59) ausfällt, hat stats_recover beim Start Daten.
    - id: stats_snapshot_today_for_recovery
      alias: "Stats: Recovery-Snapshot um 23:59:30"
      trigger:
        - platform: time
          at: "23:59:30"
      action:
        - action: input_number.set_value
          target: { entity_id: input_number.yesterday_mining_h }
          data: { value: "{{ states('sensor.miner_uptime_today_h') | float(0) | round(2) }}" }
        - action: input_number.set_value
          target: { entity_id: input_number.yesterday_eco_h }
          data: { value: "{{ states('sensor.miner_eco_hours_today') | float(0) | round(1) }}" }
        - action: input_number.set_value
          target: { entity_id: input_number.yesterday_std_h }
          data: { value: "{{ states('sensor.miner_standard_hours_today') | float(0) | round(1) }}" }
        - action: input_number.set_value
          target: { entity_id: input_number.yesterday_sup_h }
          data: { value: "{{ states('sensor.miner_super_hours_today') | float(0) | round(1) }}" }
        - action: input_number.set_value
          target: { entity_id: input_number.yesterday_kwh }
          data: { value: "{{ states('sensor.mining_energy_daily') | float(0) | round(2) }}" }

    # Tageslog: Mining-Session tageweise persistieren
    - id: stats_save_daily_mining_log
      alias: "Stats: Mining Tageslog sichern"
      trigger:
        - platform: time
          at: "23:59:59"
      action:
        - variables:
            log_date: "{{ now().strftime('%Y-%m-%d') }}"
            start_t: >-
              {% set s = states('input_datetime.last_start_at') %}
              {{ s.split(' ')[1][:5] if ' ' in s and s not in ['unknown','unavailable'] else '--:--' }}
            stop_t: >-
              {% set s = states('input_datetime.last_stop_at') %}
              {{ s.split(' ')[1][:5] if ' ' in s and s not in ['unknown','unavailable'] else '--:--' }}
            tot_h: "{{ states('sensor.miner_uptime_today_h') | float(0) | round(2) }}"
            eco_h: "{{ states('sensor.miner_eco_hours_today') | float(0) | round(1) }}"
            std_h: "{{ states('sensor.miner_standard_hours_today') | float(0) | round(1) }}"
            sup_h: "{{ states('sensor.miner_super_hours_today') | float(0) | round(1) }}"
            kwh: "{{ states('sensor.mining_energy_daily') | float(0) | round(2) }}"
            existing_a: "{{ states('input_text.mining_daily_log') }}"
            existing_b: "{{ states('input_text.mining_daily_log_b') }}"
        - condition: template
          value_template: "{{ not existing_a.startswith(log_date) }}"
        - variables:
            _new: "{{ log_date ~ ',' ~ start_t ~ ',' ~ stop_t ~ ',' ~ tot_h ~ ',' ~ eco_h ~ ',' ~ std_h ~ ',' ~ sup_h ~ ',' ~ kwh }}"
            _old_a: "{{ existing_a.split('|') if existing_a not in ['','unknown','unavailable'] else [] }}"
            _old_b: "{{ existing_b.split('|') if existing_b not in ['','unknown','unavailable'] else [] }}"
        - variables:
            _combined: "{{ ([_new] + _old_a + _old_b) | join('|') }}"
        - action: input_text.set_value
          target:
            entity_id: input_text.mining_daily_log
          data:
            value: "{{ _combined.split('|')[:5] | join('|') }}"
        - action: input_text.set_value
          target:
            entity_id: input_text.mining_daily_log_b
          data:
            value: "{{ _combined.split('|')[5:10] | join('|') }}"
        - action: shell_command.mining_log_append
          data:
            entry: "{{ log_date }},{{ start_t }},{{ stop_t }},{{ tot_h }},{{ eco_h }},{{ std_h }},{{ sup_h }},{{ kwh }}"

    # Recovery: fehlenden Gestern-Eintrag beim HA-Start nachholen
    # Greift nur wenn gestern nicht im Log ist UND der Snapshot existiert.
    - id: stats_recover_missed_daily_log
      alias: "Stats: Fehlenden Tageslog-Eintrag nachholen"
      trigger:
        - platform: homeassistant
          event: start
      action:
        - delay: "00:00:45"
        - variables:
            yesterday: "{{ (now() - timedelta(days=1)).strftime('%Y-%m-%d') }}"
            existing_a: "{{ states('input_text.mining_daily_log') }}"
            existing_b: "{{ states('input_text.mining_daily_log_b') }}"
        - condition: template
          value_template: >-
            {{ yesterday not in existing_a and yesterday not in existing_b }}
        - variables:
            start_t: >-
              {% set s = states('input_datetime.miner_start_yesterday') %}
              {{ s.split(' ')[1][:5] if ' ' in s and s.startswith(yesterday) and s not in ['unknown','unavailable'] else '--:--' }}
            stop_t: >-
              {% set s = states('input_datetime.miner_stop_yesterday') %}
              {{ s.split(' ')[1][:5] if ' ' in s and s.startswith(yesterday) and s not in ['unknown','unavailable'] else '--:--' }}
            tot_h: "{{ states('input_number.yesterday_mining_h') | float(0) | round(2) }}"
            eco_h: "{{ states('input_number.yesterday_eco_h') | float(0) | round(1) }}"
            std_h: "{{ states('input_number.yesterday_std_h') | float(0) | round(1) }}"
            sup_h: "{{ states('input_number.yesterday_sup_h') | float(0) | round(1) }}"
            kwh: "{{ states('input_number.yesterday_kwh') | float(0) | round(2) }}"
        - action: system_log.write
          data:
            message: "[stats-recover] Gestern ({{ yesterday }}) fehlt im Log — trage nach: {{ tot_h }}h {{ kwh }}kWh"
            level: warning
        - variables:
            _new: "{{ yesterday ~ ',' ~ start_t ~ ',' ~ stop_t ~ ',' ~ tot_h ~ ',' ~ eco_h ~ ',' ~ std_h ~ ',' ~ sup_h ~ ',' ~ kwh }}"
            _old_a: "{{ existing_a.split('|') if existing_a not in ['','unknown','unavailable'] else [] }}"
            _old_b: "{{ existing_b.split('|') if existing_b not in ['','unknown','unavailable'] else [] }}"
        - variables:
            _combined: "{{ ([_new] + _old_a + _old_b) | join('|') }}"
        - action: input_text.set_value
          target: { entity_id: input_text.mining_daily_log }
          data:
            value: "{{ _combined.split('|')[:5] | join('|') }}"
        - action: input_text.set_value
          target: { entity_id: input_text.mining_daily_log_b }
          data:
            value: "{{ _combined.split('|')[5:10] | join('|') }}"
        - action: shell_command.mining_log_append
          data:
            entry: "{{ yesterday }},{{ start_t }},{{ stop_t }},{{ tot_h }},{{ eco_h }},{{ std_h }},{{ sup_h }},{{ kwh }}"

    # Gestern-Zeiten sichern: letzten Start/Stop des Vortages speichern
    - id: stats_save_yesterday_miner_times
      alias: "Stats: Miner Start/Stop Gestern sichern"
      trigger:
        - platform: time
          at: "00:00:02"
      action:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.miner_start_yesterday
          data:
            datetime: "{{ states('input_datetime.last_start_at') }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.miner_stop_yesterday
          data:
            datetime: "{{ states('input_datetime.last_stop_at') }}"

  # ── Langzeit-Archiv: täglich in CSV schreiben ─────────────────────────────────
  # Datei: /config/mining_log.csv (auf dem HA-Host, nie von Deploy überschrieben)
  # Format: date,start,stop,total_h,eco_h,std_h,speed_h,kwh
  # Variablen aus dem Service-Call werden als Umgebungsvariablen übergeben ($ENTRY).
  shell_command:
    mining_log_append: >-
      bash -c 'f=/config/mining_log.csv;
      [ ! -f "$f" ] && echo "date,start,stop,total_h,eco_h,std_h,speed_h,kwh" > "$f";
      printf "%s\n" "$ENTRY" >> "$f"'
    stats_monthly_log_append: >-
      bash -c 'f=/config/stats_monthly.csv;
      [ ! -f "$f" ] && echo "year,month,pv_kwh,pv_selfuse_kwh,export_kwh,import_kwh,house_kwh,heizstab_kwh,miner_kwh,uptime_h,eco_h,standard_h,speed_h" > "$f";
      printf "%s\n" "$ENTRY" >> "$f"'
    stats_yearly_log_append: >-
      bash -c 'f=/config/stats_yearly.csv;
      [ ! -f "$f" ] && echo "year,pv_kwh,pv_selfuse_kwh,export_kwh,import_kwh,house_kwh,heizstab_kwh,miner_kwh,uptime_h,eco_h,standard_h,speed_h" > "$f";
      printf "%s\n" "$ENTRY" >> "$f"'

