stats:

  # ── Midnight-Baselines (ersetzt utility_meter, das in HA 2026.x entfernt wurde)
  # Speichern den Integral-Wert zum Tagesbeginn; Template-Sensor berechnet Delta.
  input_number:
    pv_energy_midnight:
      name: "PV kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    mining_energy_midnight:
      name: "Mining kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box
    grid_import_midnight:
      name: "Netzbezug kWh Baseline Mitternacht"
      min: 0
      max: 1000000
      step: 0.001
      mode: box

  # ── Laufzeit-Tracking via history_stats + Lastprofil-Baseline ───────────────
  sensor:
    - platform: history_stats
      name: "miner_uptime_today_h"
      entity_id: binary_sensor.miners_any_running
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_super_hours_today"
      entity_id: binary_sensor.miners_in_super
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_eco_hours_today"
      entity_id: binary_sensor.miners_in_eco
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "miner_deadband_hours_today"
      entity_id: binary_sensor.r5_deadband_active
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: "mining_window_hours_today"
      entity_id: binary_sensor.mining_window_open
      state: "on"
      type: time
      start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
      end: "{{ now() }}"

    # Lastprofil-Baseline: rollierender 7-Tage-Mittelwert (statistics-Plattform)
    - platform: statistics
      name: "house_load_mean_7d"
      entity_id: sensor.house_load_w
      state_characteristic: mean
      max_age:
        hours: 168
      sampling_size: 1008

  # ── Abgeleitete Template-Sensoren ───────────────────────────────────────────
  template:
    - sensor:
        # Tägliche kWh: Integral minus Midnight-Baseline
        - name: "pv_energy_daily"
          unique_id: pv_energy_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.pv_energy_integral') | float(0) %}
            {% set base = states('input_number.pv_energy_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "mining_energy_daily"
          unique_id: mining_energy_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.mining_energy_integral') | float(0) %}
            {% set base = states('input_number.mining_energy_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        - name: "grid_import_daily"
          unique_id: grid_import_daily
          unit_of_measurement: "kWh"
          state_class: measurement
          state: >-
            {% set cur  = states('sensor.grid_import_integral') | float(0) %}
            {% set base = states('input_number.grid_import_midnight') | float(0) %}
            {{ [cur - base, 0] | max | round(3) }}

        # Solar-Autarkiegrad: PV / (PV + Netzbezug) * 100
        - name: "solar_coverage_pct"
          unique_id: solar_coverage_pct
          unit_of_measurement: "%"
          state_class: measurement
          state: >-
            {% set pv   = states('sensor.pv_energy_daily') | float(0) %}
            {% set grid = states('sensor.grid_import_daily') | float(0) %}
            {% set total = pv + grid %}
            {% if total > 0 %}
              {{ (pv / total * 100) | round(1) }}
            {% else %}
              0
            {% endif %}

        # Deadband Hit Rate: Anteil des Tages wo R5 aktiv war
        - name: "deadband_hit_rate_pct"
          unique_id: deadband_hit_rate_pct
          unit_of_measurement: "%"
          state_class: measurement
          state: >-
            {% set h = states('sensor.miner_deadband_hours_today') | float(0) %}
            {{ (h / 24 * 100) | round(1) }}

        # Live Mining-Effizienz: kWh pro Betriebsstunde
        - name: "efficiency_kwh_per_h_live"
          unique_id: efficiency_kwh_per_h_live
          unit_of_measurement: "kWh/h"
          state_class: measurement
          state: >-
            {% set kwh = states('sensor.mining_energy_daily') | float(0) %}
            {% set h   = states('sensor.miner_uptime_today_h') | float(0) %}
            {% if h > 0 %}
              {{ (kwh / h) | round(3) }}
            {% else %}
              0
            {% endif %}

        # ── Mining-Fenster-Ausnutzung: Uptime / Fenster-Stunden heute ──────────
        # 100% = Miner lief die gesamte Zeit in der Fenster offen war.
        # < 70% = Optimierungspotenzial vorhanden.
        - name: "mining_window_used_pct"
          unique_id: mining_window_used_pct
          unit_of_measurement: "%"
          state_class: measurement
          state: >-
            {% set uptime = states('sensor.miner_uptime_today_h') | float(0) %}
            {% set window = states('sensor.mining_window_hours_today') | float(0) %}
            {% if window > 0 %}
              {{ [uptime / window * 100, 100] | min | round(1) }}
            {% else %}
              0
            {% endif %}

        # ── Hauslast-Prognose: Mittelwert × Tageszeit-Faktor ────────────────────
        # Faktoren für 4-Personen-Familie (2 Kinder im Schulalter).
        # Werktag: Schulzeiten → niedrig, Abend → hoch.
        # Wochenende: tagsüber durchgehend erhöht.
        - name: "house_load_forecast_w"
          unique_id: house_load_forecast_w
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: >-
            {% set base = states('sensor.house_load_mean_7d') | float(0) %}
            {% if base == 0 %}
              {{ states('sensor.house_load_w') | float(0) }}
            {% else %}
              {% set h = now().hour %}
              {% set wd = now().weekday() %}   {# 0=Mo … 4=Fr, 5=Sa, 6=So #}
              {% if wd <= 4 %}
                {# Werktag #}
                {% if   h >= 6  and h < 8  %} {% set f = 1.3  %}{# Morgen #}
                {% elif h >= 8  and h < 15 %} {% set f = 0.65 %}{# Schule/Arbeit → niedrig #}
                {% elif h >= 15 and h < 17 %} {% set f = 1.2  %}{# Kinder nachhause #}
                {% elif h >= 17 and h < 21 %} {% set f = 1.4  %}{# Abend #}
                {% elif h >= 21 and h < 23 %} {% set f = 0.9  %}{# Abendruhe #}
                {% else %}                    {% set f = 0.4  %}{# Nacht #}
                {% endif %}
              {% else %}
                {# Wochenende: Familie ganztags zuhause #}
                {% if   h >= 6  and h < 8  %} {% set f = 0.8  %}{# Langsamer Start #}
                {% elif h >= 8  and h < 22 %} {% set f = 1.3  %}{# Familientag #}
                {% else %}                    {% set f = 0.4  %}{# Nacht #}
                {% endif %}
              {% endif %}
              {{ (base * f) | round(0) }}
            {% endif %}

        # ── Mining-Fenster: freie Leistung nach Hauslast-Prognose ───────────────
        # Strategie: Solar-Only-Mining.
        #   SoC < 65%: Batterie hat Vorrang — hohe Reserve einplanen (1000W).
        #   SoC ≥ 65%: Überschuss fließt in Mining, Batterie lädt nebenbei.
        # Nachts kein PV → pv_power_w ≈ 0 → Wert automatisch negativ → kein Mining.
        - name: "mining_window_free_w"
          unique_id: mining_window_free_w
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: >-
            {% set pv       = states('sensor.pv_power_w') | float(0) %}
            {% set forecast = states('sensor.house_load_forecast_w') | float(0) %}
            {% set bat_soc  = states('sensor.battery_soc_pct') | float(0) %}
            {% set bat_reserve = 1000 if bat_soc < 65 else 0 %}
            {{ (pv - forecast - bat_reserve) | round(0) }}

    - binary_sensor:
        # True wenn genug freie Leistung für zumindest Eco-Betrieb (≥ 600 W frei)
        - name: "mining_window_open"
          unique_id: mining_window_open
          device_class: running
          state: >-
            {{ states('sensor.mining_window_free_w') | float(0) >= 600 }}

    - sensor:
        # Uptime als formatierter String "Xh Ym"
        - name: "miner_uptime_today_fmt"
          unique_id: miner_uptime_today_fmt
          state: >-
            {% set h = states('sensor.miner_uptime_today_h') | float(0) %}
            {% set hours = h | int %}
            {% set mins  = ((h - hours) * 60) | int %}
            {{ hours }}h {{ mins }}m

  # ── Log-Dateien ──────────────────────────────────────────────────────────────
  #
  # Block-Log  (alle 10 Min, EnergyState + DecisionEvent + Rule-States):
  #   /config/data/logs/blocks/YYYY-MM-DD/HHMM.json
  #   ~600 Byte × 144 Blöcke × 365 Tage ≈ 31 MB/Jahr
  #
  # Daily-KPI  (23:59:30, Metric Catalog):
  #   /config/data/logs/daily/YYYY-MM/YYYY-MM-DD.json
  #   ~600 Byte × 365 Tage ≈ 215 KB/Jahr
  #
  shell_command:

    # ── Block-Log: EnergyState + DecisionEvent + Rule-States ────────────────
    write_block_log: |
      python3 -c "
      import datetime, os, json
      now = datetime.datetime.now()
      bid  = int(now.timestamp()) // 600
      wstart = datetime.datetime.fromtimestamp(bid * 600)
      date_s = wstart.strftime('%Y-%m-%d')
      time_s = wstart.strftime('%H%M')
      d = '/config/data/logs/blocks/' + date_s
      os.makedirs(d, exist_ok=True)
      def f(v, n=0):
          try: return round(float(v), n)
          except: return None
      record = {
        'block_id': bid,
        'window_start': wstart.strftime('%Y-%m-%dT%H:%M'),
        'energy': {
          'pv_w':            f('{{ states('sensor.pv_power_w') }}'),
          'mining_w':        f('{{ states('sensor.miner_total_power_w') }}'),
          'grid_import_w':   f('{{ states('sensor.grid_import_w') }}'),
          'grid_export_w':   f('{{ states('sensor.grid_export_w') }}'),
          'house_load_w':    f('{{ states('sensor.house_load_w') }}'),
          'battery_soc_pct': f('{{ states('sensor.battery_soc_pct') }}', 1),
          'surplus_kw':      f('{{ states('sensor.surplus_kw') }}', 3),
        },
        'decision': {
          'action':   '{{ states('sensor.bg_decision_action') }}',
          'priority': '{{ states('sensor.bg_decision_priority') }}',
          'code':     '{{ states('sensor.bg_decision_code') }}',
        },
        'miners': {
          'm1_mode': '{{ states('select.miner1_workmode_set') }}',
          'm2_mode': '{{ states('select.miner2_workmode_set') }}',
        },
        'rules': {
          'r1_surplus_ok': {{ 1 if is_state('binary_sensor.r1_surplus_ok','on') else 0 }},
          'r2_soc_soft':   {{ 1 if is_state('binary_sensor.r2_soc_soft','on') else 0 }},
          'r2_soc_hard':   {{ 1 if is_state('binary_sensor.r2_soc_hard','on') else 0 }},
          'r2_grid_ok':    {{ 1 if is_state('binary_sensor.r2_grid_import_ok','on') else 0 }},
          'r3_safety':     {{ 1 if is_state('binary_sensor.r3_safety_override','on') else 0 }},
          'r5_deadband':   {{ 1 if is_state('binary_sensor.r5_deadband_active','on') else 0 }},
        },
        'forecast': {
          'house_load_forecast_w': f('{{ states('sensor.house_load_forecast_w') }}'),
          'mining_window_free_w':  f('{{ states('sensor.mining_window_free_w') }}'),
          'mining_window_open':    {{ 1 if is_state('binary_sensor.mining_window_open','on') else 0 }},
        },
      }
      with open(d + '/' + time_s + '.json', 'w') as fp:
          json.dump(record, fp)
      "

    # ── Daily-KPI: Metric Catalog (arc42 05.2.4.3) ──────────────────────────
    write_daily_stats_log: |
      python3 -c "
      import datetime, os, json
      today     = datetime.date.today()
      month_dir = '/config/data/logs/daily/' + today.strftime('%Y-%m')
      log_path  = month_dir + '/' + today.strftime('%Y-%m-%d') + '.json'
      os.makedirs(month_dir, exist_ok=True)
      def flt(v, d=2):
          try:    return round(float(v), d)
          except: return None
      uptime_h    = flt('{{ states('sensor.miner_uptime_today_h') }}', 2)
      super_h     = flt('{{ states('sensor.miner_super_hours_today') }}', 2)
      eco_h       = flt('{{ states('sensor.miner_eco_hours_today') }}', 2)
      deadband_h  = flt('{{ states('sensor.miner_deadband_hours_today') }}', 2)
      window_h    = flt('{{ states('sensor.mining_window_hours_today') }}', 2)
      mining_kwh  = flt('{{ states('sensor.mining_energy_daily') }}', 3)
      record = {
        'date':        str(today),
        'recorded_at': datetime.datetime.now().strftime('%Y-%m-%dT%H:%M:%S'),
        'energy': {
          'pv_kwh':             flt('{{ states('sensor.pv_energy_daily') }}', 3),
          'mining_kwh':         mining_kwh,
          'grid_import_kwh':    flt('{{ states('sensor.grid_import_daily') }}', 3),
          'solar_coverage_pct': flt('{{ states('sensor.solar_coverage_pct') }}', 1),
        },
        'mining': {
          'uptime_h':              uptime_h,
          'uptime_pct':            round(uptime_h / 24 * 100, 1) if uptime_h is not None else None,
          'super_h':               super_h,
          'eco_h':                 eco_h,
          'standby_h':             round(24.0 - (uptime_h or 0), 2),
          'deadband_h':            deadband_h,
          'deadband_hit_rate_pct': round(deadband_h / 24 * 100, 1) if deadband_h is not None else None,
          'efficiency_kwh_per_h':  round(mining_kwh / uptime_h, 3) if (uptime_h and uptime_h > 0 and mining_kwh) else None,
        },
        'forecast': {
          'window_open_h':     window_h,
          'window_open_pct':   round(window_h / 24 * 100, 1) if window_h is not None else None,
          'window_used_pct':   round(uptime_h / window_h * 100, 1) if (window_h and window_h > 0 and uptime_h is not None) else None,
        },
      }
      with open(log_path, 'w') as fp:
          json.dump(record, fp, indent=2)
      "

    # ── Monatlicher Rollup: Block-Logs → kompakte Monatszusammenfassung ────────
    # Läuft am 1. jeden Monats. Aggregiert den Vormonat (stündliches Lastprofil
    # nach Wochentag/Wochenende), schreibt monatliche JSON, löscht Block-Logs.
    # Ergebnis: dauerhaft < 20 MB Gesamtspeicher auch nach 10+ Jahren.
    write_monthly_rollup: |
      python3 -c "
      import os, json, glob, datetime
      from collections import defaultdict

      today   = datetime.date.today()
      first   = today.replace(day=1)
      prev    = first - datetime.timedelta(days=1)
      month_s = prev.strftime('%Y-%m')

      block_dir   = '/config/data/logs/blocks'
      daily_dir   = '/config/data/logs/daily/' + month_s
      out_dir     = '/config/data/logs/monthly'
      os.makedirs(out_dir, exist_ok=True)

      # ── Stündliche Akkumulatoren (Wochentag / Wochenende getrennt) ────────────
      # Struktur: buckets[is_weekend][hour] = {pv, house, mining, window_open, n}
      buckets = {False: defaultdict(lambda: dict(pv=0,house=0,mining=0,window=0,n=0)),
                 True:  defaultdict(lambda: dict(pv=0,house=0,mining=0,window=0,n=0))}

      block_files = sorted(glob.glob(block_dir + '/' + month_s + '-*/*.json'))
      for path in block_files:
          try:
              with open(path) as fh:
                  b = json.load(fh)
              dt  = datetime.datetime.fromisoformat(b['window_start'])
              we  = dt.weekday() >= 5
              h   = dt.hour
              e   = b.get('energy', {})
              fc  = b.get('forecast', {})
              bkt = buckets[we][h]
              bkt['pv']     += e.get('pv_w') or 0
              bkt['house']  += e.get('house_load_w') or 0
              bkt['mining'] += e.get('mining_w') or 0
              bkt['window'] += fc.get('mining_window_open') or 0
              bkt['n']      += 1
          except Exception:
              pass

      def avg(bkt, key):
          return round(bkt[key] / bkt['n'], 1) if bkt['n'] else None

      def profile(is_we):
          return {str(h): {
              'avg_pv_w':        avg(buckets[is_we][h], 'pv'),
              'avg_house_load_w':avg(buckets[is_we][h], 'house'),
              'avg_mining_w':    avg(buckets[is_we][h], 'mining'),
              'window_open_pct': round(buckets[is_we][h]['window'] / buckets[is_we][h]['n'] * 100, 1) if buckets[is_we][h]['n'] else None,
              'samples':         buckets[is_we][h]['n'],
          } for h in range(24)}

      # ── Daily-KPI aggregieren ─────────────────────────────────────────────────
      pv_total = mining_total = grid_total = coverage_sum = days = 0
      window_h_sum = uptime_h_sum = used_pct_sum = used_days = 0
      for dp in glob.glob(daily_dir + '/*.json'):
          try:
              with open(dp) as fh:
                  d = json.load(fh)
              e = d.get('energy', {})
              m = d.get('mining', {})
              fc = d.get('forecast', {})
              pv_total      += e.get('pv_kwh') or 0
              mining_total  += e.get('mining_kwh') or 0
              grid_total    += e.get('grid_import_kwh') or 0
              coverage_sum  += e.get('solar_coverage_pct') or 0
              window_h_sum  += fc.get('window_open_h') or 0
              uptime_h_sum  += m.get('uptime_h') or 0
              wp = fc.get('window_used_pct')
              if wp is not None:
                  used_pct_sum += wp; used_days += 1
              days += 1
          except Exception:
              pass

      record = {
          'month':   month_s,
          'days':    days,
          'blocks':  len(block_files),
          'energy':  {
              'pv_kwh_total':          round(pv_total, 2),
              'mining_kwh_total':      round(mining_total, 2),
              'grid_import_kwh_total': round(grid_total, 2),
              'avg_solar_coverage_pct': round(coverage_sum / days, 1) if days else None,
          },
          'mining': {
              'avg_window_open_h_per_day': round(window_h_sum / days, 2) if days else None,
              'avg_uptime_h_per_day':      round(uptime_h_sum / days, 2) if days else None,
              'avg_window_used_pct':       round(used_pct_sum / used_days, 1) if used_days else None,
          },
          'hourly_profile': {
              'weekday': profile(False),
              'weekend': profile(True),
          },
      }

      with open(out_dir + '/' + month_s + '.json', 'w') as fh:
          json.dump(record, fh, indent=2)

      # ── Block-Logs des Vormonats löschen ──────────────────────────────────────
      import shutil
      for day_dir in glob.glob(block_dir + '/' + month_s + '-*'):
          shutil.rmtree(day_dir, ignore_errors=True)
      print('Rollup OK:', month_s, '|', len(block_files), 'blocks → monthly JSON')
      "

  # ── Automationen ─────────────────────────────────────────────────────────────
  automation:
    # Midnight-Reset: Baselines auf aktuelle Integral-Werte setzen
    - id: stats_midnight_baseline_reset
      alias: "Stats: Midnight Baseline Reset"
      trigger:
        - platform: time
          at: "00:00:05"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.pv_energy_midnight
          data:
            value: "{{ states('sensor.pv_energy_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.mining_energy_midnight
          data:
            value: "{{ states('sensor.mining_energy_integral') | float(0) }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.grid_import_midnight
          data:
            value: "{{ states('sensor.grid_import_integral') | float(0) }}"

    # Monatlicher Rollup: am 1. jeden Monats um 00:10 (nach Midnight-Reset)
    - id: stats_monthly_rollup
      alias: "Stats: Monatlicher Block-Log Rollup"
      trigger:
        - platform: time
          at: "00:10:00"
      condition:
        - condition: template
          value_template: "{{ now().day == 1 }}"
      action:
        - action: shell_command.write_monthly_rollup

    # Block-Log alle 10 Minuten + sofort beim HA-Start
    - id: stats_block_log_10min
      alias: "Stats: Block-Log alle 10 Min schreiben"
      trigger:
        - platform: time_pattern
          minutes: "/10"
        - platform: homeassistant
          event: start
      action:
        - action: shell_command.write_block_log

    # Daily-KPI kurz vor Mitternacht
    - id: stats_daily_log_midnight
      alias: "Stats: Daily-KPI um 23:59 schreiben"
      trigger:
        - platform: time
          at: "23:59:30"
      action:
        - action: shell_command.write_daily_stats_log
