sim_reset:
  alias: "SIM Reset"
  mode: single
  sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.pv_power_w
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.house_load_w
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.grid_import_w
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.battery_soc_pct
      data:
        value: 50
    - service: input_number.set_value
      target:
        entity_id: input_number.miner_temp_c
      data:
        value: 55
    - service: input_number.set_value
      target:
        entity_id: input_number.miner_heartbeat_age_sec
      data:
        value: 5
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.miner_relay_sim

