  # ═══════════════════════════════════════════════════════
  # RULE LAB — isoliertes Sandbox für Regelexperimente
  # Keine Verbindung zu Prod-Entities. Kein Miner-Command.
  # Schieberegler → R3/R2/R1 Auswertung → Entscheidung live.
  # ═══════════════════════════════════════════════════════
  - title: Rule Lab
    path: rule-lab
    icon: mdi:test-tube
    panel: true
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr
          grid-template-rows: auto
          margin: 8px
          row-gap: 12px
          column-gap: 40px
        cards:

          # ── Linke Spalte: Eingaben ─────────────────────────────────────────
          - type: vertical-stack
            cards:

              - type: entities
                title: "Szenario — Messwerte"
                show_header_toggle: false
                entities:
                  - entity: input_number.lab_pv_power_w
                    name: PV-Leistung
                  - entity: input_number.lab_house_load_w
                    name: Hauslast
                  - entity: input_number.lab_battery_soc_pct
                    name: Batterie SoC
                  - entity: input_number.lab_miner_temp_c
                    name: Miner Temperatur
                  - entity: input_number.lab_grid_import_w
                    name: Netzbezug
                  - entity: input_number.lab_heartbeat_age_sec
                    name: Heartbeat-Alter

              - type: entities
                title: "Config — Schwellenwerte"
                show_header_toggle: false
                entities:
                  - entity: input_number.lab_surplus_min_kw
                    name: Mindest-Überschuss (R1)
                  - entity: input_number.lab_soc_soft_min_pct
                    name: SoC Soft-Min (R2)
                  - entity: input_number.lab_soc_hard_min_pct
                    name: SoC Hard-Min (R2)
                  - entity: input_number.lab_max_grid_import_w
                    name: Max Netzbezug (R2)
                  - entity: input_number.lab_max_chip_temp_c
                    name: Max Chip-Temp (R3)
                  - entity: input_number.lab_comm_timeout_sec
                    name: Comm-Timeout (R3)

          # ── Rechte Spalte: Auswertung ──────────────────────────────────────
          - type: vertical-stack
            cards:

              # Regel-Trace: R3 → R2 → R1 mit Farb-Feedback
              - type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                tap_action:
                  action: none
                custom_fields:
                  trace: >
                    [[[
                      const r3      = states['sensor.lab_r3_result']?.state      || '?';
                      const r2      = states['sensor.lab_r2_result']?.state      || '?';
                      const r1      = states['sensor.lab_r1_result']?.state      || '?';
                      const surplus = parseFloat(states['sensor.lab_surplus_kw']?.state || 0).toFixed(2);

                      function badge(result) {
                        if (result === 'PASS')          return { icon: '✅', color: '#4CAF50', bg: 'rgba(76,175,80,0.12)'  };
                        if (result.startsWith('STOP'))  return { icon: '🛑', color: '#F44336', bg: 'rgba(244,67,54,0.12)'  };
                        if (result.startsWith('NOOP'))  return { icon: '⏸',  color: '#FF9800', bg: 'rgba(255,152,0,0.12)'  };
                        return                                 { icon: '⏭',  color: '#9E9E9E', bg: 'transparent'           };
                      }

                      function row(rule, label, result) {
                        const b   = badge(result);
                        const tag = result === 'PASS' ? 'OK' : result.replace(/^(?:STOP|NOOP)_R\d+_/, '');
                        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;
                                            margin:3px 0;border-radius:8px;background:${b.bg}">
                          <span style="font-weight:700;color:var(--secondary-text-color);
                                       font-size:0.8rem;width:22px">${rule}</span>
                          <span style="flex:1;color:var(--primary-text-color);font-size:0.9rem">${label}</span>
                          <span style="color:${b.color};font-size:0.75rem;font-family:monospace">
                            ${b.icon} ${tag}
                          </span>
                        </div>`;
                      }

                      return `<div style="padding:4px 0">
                        <div style="font-size:0.8rem;color:var(--secondary-text-color);
                                    margin-bottom:8px;padding:0 4px">
                          Überschuss: <strong style="color:var(--primary-text-color)">${surplus} kW</strong>
                        </div>
                        ${row('R3', 'Safety',        r3)}
                        ${row('R2', 'Autarkie',       r2)}
                        <div style="font-size:0.72rem;color:var(--disabled-text-color);
                                    padding:4px 10px">
                          R4 Forecast · R5 Deadband — brauchen Zeitreihen-Kontext
                        </div>
                        ${row('R1', 'Profitabilität', r1)}
                      </div>`;
                    ]]]
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 16px
                  custom_fields:
                    trace:
                      - width: 100%

              # Finale Entscheidung + Erklärungstext
              - type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                tap_action:
                  action: none
                custom_fields:
                  decision: >
                    [[[
                      const code    = states['sensor.lab_final_decision']?.state || '—';
                      const explain = states['sensor.lab_explain_short']?.state   || '—';

                      let bg, icon;
                      if      (code.startsWith('START')) { bg = '#1B5E20'; icon = '▶'; }
                      else if (code.startsWith('STOP'))  { bg = '#B71C1C'; icon = '⏹'; }
                      else if (code.startsWith('NOOP'))  { bg = '#E65100'; icon = '⏸'; }
                      else                               { bg = 'var(--secondary-background-color)'; icon = '?'; }

                      return `<div style="background:${bg};border-radius:8px;
                                          padding:14px 16px;width:100%;box-sizing:border-box">
                        <div style="font-size:0.72rem;color:rgba(255,255,255,0.55);margin-bottom:4px">
                          Entscheidung
                        </div>
                        <div style="font-size:1.05rem;font-weight:700;color:white;font-family:monospace">
                          ${icon} ${code}
                        </div>
                        <div style="font-size:0.85rem;color:rgba(255,255,255,0.75);margin-top:6px">
                          ${explain}
                        </div>
                      </div>`;
                    ]]]
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 16px
                  custom_fields:
                    decision:
                      - width: 100%

              # Sync-Button + Recording-Toggle
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: script.lab_sync_from_prod
                    name: "Sync von Prod (Parameter + Live-Werte)"
                    icon: mdi:sync
                  - entity: input_boolean.recording_active
                    name: "Aufnahme (10-Min Snapshots auf MQTT)"
                    icon: mdi:record-circle
