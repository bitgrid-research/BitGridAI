                          <span style="color:var(--secondary-text-color);font-size:0.85rem;">${label}:</span>
                          <span style="font-size:1rem;font-weight:600;margin-left:8px;">${val === '—' ? '—' : val + (unit ? ' ' + unit : '')}</span>
                        </div>`;
                      return `<div style="width:100%;padding:4px 0;text-align:left;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                          <ha-icon icon="mdi:water-boiler" style="--mdc-icon-size:18px;color:var(--primary-text-color);"></ha-icon>
                          <span style="font-size:0.9rem;font-weight:700;">Heizstab AC ELWA 2</span>
                          <span style="margin-left:auto;font-size:0.85rem;font-weight:600;color:${modeColor};">${mode}</span>
                        </div>
                        ${row('mdi:thermometer-water','Temperatur',t1,'°C')}
                        ${row('mdi:solar-power','Leistung',psolar,'W')}
                      </div>`;
                    ]]]
      
              # ── Temperatur & Luftfeuchtigkeit ───────────────────────────────────────
              - type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                styles:
                  card:
                    - padding: 12px 16px
                  custom_fields:
                    env:
                      - width: 100%
                      - justify-self: stretch
                      - box-sizing: border-box
                custom_fields:
                  env: >
                    [[[
                      const t_keller = states['sensor.temperatursensor_2_raum_temperatur']?.state ?? '—';
                      const h_keller = states['sensor.temperatursensor_2_raum_luftfeuchtigkeit']?.state ?? '—';
                      const t_m1     = states['sensor.zigbee_6_temperatur']?.state ?? '—';
                      const row = (icon, label, val, unit) =>
                        `<div style="display:flex;align-items:center;padding:3px 0;gap:8px;">
                          <ha-icon icon="${icon}" style="--mdc-icon-size:16px;color:var(--secondary-text-color);"></ha-icon>
                          <span style="color:var(--secondary-text-color);font-size:0.85rem;">${label}:</span>
                          <span style="font-size:1rem;font-weight:600;margin-left:8px;">${val === '—' ? '—' : val + ' ' + unit}</span>
                        </div>`;
                      return `<div style="width:100%;padding:4px 0;text-align:left;">
                        ${row('mdi:thermometer','Keller Temp',t_keller,'°C')}
                        ${row('mdi:water-percent','Keller Feuchte',h_keller,'%')}
                        ${row('mdi:thermometer-alert','Miner 1 Temp',t_m1,'°C')}
                      </div>`;
                    ]]]
      
    # ═══════════════════════════════════════════════════════
  # TUNING
  # ═══════════════════════════════════════════════════════
  - title: Tuning
    path: tuning
    icon: mdi:tune-vertical
    cards:
      - type: entities
        title: MVP Auto-Regeln
        entities:
          - entity: input_number.mvp_soc_eco_start_pct
            name: Eco-Start SoC (%)
          - entity: input_number.mvp_soc_super_pct
            name: Super-Start SoC (%)
          - entity: input_number.mvp_soc_super_stop_pct
            name: Super-Stop SoC (%) — Deadband
          - entity: input_number.mvp_soc_stop_pct
            name: Stop SoC (%)

      - type: entities
        title: R1 Surplus
        entities:
          - entity: input_number.r1_surplus_min_kw
            name: Min Surplus (kW)

      - type: entities
        title: R2 Battery + Grid
        entities:
          - entity: input_number.r2_soc_soft_min_pct
            name: Soft Min SoC (%)
          - entity: input_number.r2_soc_hard_min_pct
            name: Hard Min SoC (%)
          - entity: input_number.r2_max_grid_import_w
            name: Max Grid Import (W)

      - type: entities
        title: R3 Safety
        entities:
          - entity: input_number.r3_max_chip_temp_c
            name: Max Chip Temp (C)
          - entity: input_number.r3_comm_timeout_sec
            name: Comm Timeout (s)
          - entity: input_number.r3_safety_lockout_min
            name: Safety Lockout (min)
          - entity: input_boolean.r3_emergency_stop
            name: E-Stop

      - type: entities
        title: R5 Deadband / Runtime
        entities:
          - entity: input_number.r5_deadband_hold_blocks
            name: Deadband Hold (blocks)
          - entity: input_number.r5_min_runtime_blocks
            name: Min Runtime (blocks)
          - entity: input_number.r5_min_pause_blocks
            name: Min Pause (blocks)
          - entity: input_number.block_minutes
            name: Block Minutes

      - type: entities
        title: Deadband Timing
        entities:
          - entity: input_datetime.deadband_valid_until
            name: Deadband Valid Until

  # ═══════════════════════════════════════════════════════
  # SIMULATION
  # ═══════════════════════════════════════════════════════
  - title: Simulation
    path: simulation
    icon: mdi:flask
    cards:
      - type: entities
        title: Simulation Mode
        show_header_toggle: false
        entities:
          - entity: input_boolean.simulation_mode
            name: Simulation Mode
          - entity: input_boolean.replay_mode
            name: Replay Mode
          - entity: input_boolean.miner_relay_sim
            name: Miner Relay Sim

      - type: entities
        title: Simulation Actions
        show_header_toggle: false
        entities:
          - entity: script.sim_run_sh_suite
            name: Run SH Suite (SH-1..SH-4)
          - entity: script.sim_tests_reset
            name: Reset Test Counters
          - entity: script.bg_decision_cycle
            name: Decision Cycle Now
          - entity: script.bg_force_safety_stop
            name: Force Safety Stop
          - entity: script.sim_reset
            name: SIM Reset
          - entity: script.sim_sh1_stable_surplus
            name: SH-1 Stable Surplus
          - entity: script.sim_sh2_variable_pv
            name: SH-2 Variable PV
          - entity: script.sim_sh3_soc_critical
            name: SH-3 SoC Critical
          - entity: script.sim_sh4_safety_overtemp
            name: SH-4 Safety Overtemp

      - type: entities
        title: Test Protocol
        show_header_toggle: false
        entities:
          - entity: sensor.bg_test_status
            name: Suite Status
          - entity: sensor.bg_test_totals
            name: Totals
          - entity: input_number.test_pass_count
            name: Pass Count
          - entity: input_number.test_fail_count
            name: Fail Count
          - entity: input_text.last_test_case
            name: Last Test Case
          - entity: input_text.last_test_result
            name: Last Test Result
          - entity: input_text.test_summary
            name: Summary

      - type: entities
        title: Simulated PV Generation
        entities:
          - entity: input_number.pv_power_w
            name: PV Output (W)
          - entity: sensor.pv_generation_w
            name: PV Generation (Sensor)

      - type: entities
        title: Simulated Inputs
        entities:
          - entity: input_number.house_load_w
            name: House Load (W)
          - entity: input_number.grid_import_w
            name: Grid Import (W)
          - entity: input_number.battery_soc_pct
            name: Battery SoC (%)
          - entity: input_number.battery_power_w
            name: Battery Power (W)
          - entity: input_number.miner_power_w
            name: Miner Power (W)
          - entity: input_number.miner_temp_c
            name: Miner Temp (C)
          - entity: input_number.miner_heartbeat_age_sec
            name: Heartbeat Age (s)

      - type: history-graph
        title: Simulation History (8h)
        hours_to_show: 8
        refresh_interval: 60
        entities:
          - entity: sensor.pv_generation_w
          - entity: sensor.house_load_w
          - entity: sensor.grid_import_w
          - entity: sensor.battery_soc_pct
          - entity: sensor.battery_power_w
          - entity: sensor.miner_power_w
          - entity: sensor.miner_temp_c
          - entity: sensor.miner_heartbeat_age_sec
