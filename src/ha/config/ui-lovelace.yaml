title: BitGridAI
views:

  # ═══════════════════════════════════════════════════════
  # MINER 2  —  IP aus .env: MINER2_IP
  # ═══════════════════════════════════════════════════════
  - title: Miner 2
    path: miner2
    icon: mdi:pickaxe
    cards:

      # Status + Steuerung
      - type: horizontal-stack
        cards:
          - type: entities
            title: Status
            show_header_toggle: false
            entities:
              - entity: binary_sensor.miner2_available
                name: Verbindung
              - entity: sensor.miner2_workmode_status
                name: Workmode
              - entity: sensor.miner2_worklevel
                name: Worklevel
              - entity: sensor.miner2_systemstatus
                name: Systemstatus
              - entity: sensor.miner2_uptime
                name: Uptime
              - entity: input_boolean.miner2_auto_load_management
                name: Auto-Steuerung
              - entity: switch.miner2_lcdonoff_switch
                name: Display

          - type: vertical-stack
            cards:
              - type: entities
                title: Steuerung
                show_header_toggle: false
                entities:
                  - entity: select.miner2_workmode_set
                    name: Workmode setzen
              - type: horizontal-stack
                cards:
                  - type: button
                    name: Standby
                    icon: mdi:power-sleep
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.miner2_workmode_set
                        option: Standby
                  - type: button
                    name: Eco
                    icon: mdi:leaf
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.miner2_workmode_set
                        option: Eco
                  - type: button
                    name: Standard
                    icon: mdi:speedometer-medium
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.miner2_workmode_set
                        option: Standard
                  - type: button
                    name: Super
                    icon: mdi:speedometer
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.miner2_workmode_set
                        option: Super
              - type: button
                name: Reboot Miner 2
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: shell_command.miner2_reboot

      # Performance
      - type: glance
        title: Performance
        show_name: true
        columns: 4
        entities:
          - entity: sensor.miner2_thsspd
            name: TH/s
          - entity: sensor.miner2_energy_per_th
            name: J/TH
          - entity: sensor.miner2_cur_load
            name: Ist-W
          - entity: sensor.miner2_mode_power_output
            name: Soll-W
          - entity: sensor.miner2_fanr
            name: Fan %
          - entity: sensor.miner2_avg_shares_per_min
            name: Sh/min
          - entity: sensor.miner2_accepted_shares
            name: Accepted
          - entity: sensor.miner2_rejected_shares
            name: Rejected

      # Temperaturen + Pool
      - type: horizontal-stack
        cards:
          - type: glance
            title: Temperaturen
            show_name: true
            columns: 3
            entities:
              - entity: sensor.miner2_itemp
                name: Intern
              - entity: sensor.miner2_hbitemp
                name: HB-In
              - entity: sensor.miner2_hbotemp
                name: HB-Out
              - entity: sensor.miner2_tmax
                name: T-Max
              - entity: sensor.miner2_tavg
                name: T-Avg
              - entity: sensor.miner2_tart
                name: T-Ziel

          - type: entities
            title: Pool
            show_header_toggle: false
            entities:
              - entity: binary_sensor.miner2_pool_status
                name: Pool OK
              - entity: sensor.miner2_pool
                name: URL
              - entity: sensor.miner2_ping
                name: Ping (ms)
              - entity: sensor.miner2_latest_share
                name: Letzter Share (s)
              - entity: sensor.miner2_rejection_rate
                name: Rejection Rate (%)
              - entity: sensor.miner2_stratum_difficulty
                name: Stratum Diff
              - entity: sensor.miner2_network_difficulty
                name: Netz Difficulty (T)

      # Fehler + Hardware
      - type: horizontal-stack
        cards:
          - type: glance
            title: Fehler & Diagnose
            show_name: true
            columns: 4
            entities:
              - entity: sensor.miner2_hardware_errors
                name: HW-Err
              - entity: sensor.miner2_hardware_errorsr
                name: HW-Err %
              - entity: sensor.miner2_network_errors
                name: Net-Err
              - entity: sensor.miner2_fanerr
                name: Fan-Err
              - entity: sensor.miner2_total_asics
                name: ASICs
              - entity: sensor.miner2_filter
                name: Filter (min)
              - entity: sensor.miner2_found_blocks
                name: Blocks
              - entity: sensor.miner2_cpu_freq
                name: CPU MHz

          - type: entities
            title: Hardware-Info
            show_header_toggle: false
            entities:
              - entity: sensor.miner2_asic_model
                name: ASIC
              - entity: sensor.miner2_cpu_model
                name: CPU
              - entity: sensor.miner2_firmware
                name: Firmware
              - entity: sensor.miner2_cgminer_version
                name: CGMiner
              - entity: sensor.miner2_mac_address
                name: MAC
              - entity: sensor.miner2_id
                name: Device-ID

