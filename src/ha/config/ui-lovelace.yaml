title: BitGridAI

# ═══════════════════════════════════════════════════════
# Shared Button-Card Templates
# ═══════════════════════════════════════════════════════
button_card_templates:

  miner_header:
    show_state: false
    show_icon: true
    tap_action:
      action: none
    custom_fields:
      status: >
        [[[
          const on = entity.state === 'on';
          return `<ha-icon icon="${on ? 'mdi:check-circle' : 'mdi:alert-circle'}"
            style="color:${on ? '#4CAF50' : '#F44336'}; --mdc-icon-size:22px;"></ha-icon>`;
        ]]]
    styles:
      grid:
        - grid-template-areas: '"n status i"'
        - grid-template-columns: 1fr auto auto
        - grid-template-rows: 1fr
      card:
        - padding: 12px 16px
        - height: 56px
      name:
        - font-size: 1.1rem
        - font-weight: bold
        - text-align: left
        - justify-self: start
        - padding-right: 8px
      icon:
        - color: var(--primary-text-color)
        - width: 22px
        - height: 22px
        - margin-left: 6px
      custom_fields:
        status:
          - display: flex
          - align-items: center

  miner_btn:
    show_state: true
    styles:
      card:
        - background: var(--secondary-background-color)
        - border-radius: 12px
        - padding: 20px 6px
        - height: 110px
      icon:
        - width: 44px
        - height: 44px
      name:
        - font-size: 0.9rem
        - font-weight: 600
        - color: var(--primary-text-color)
        - white-space: unset
        - text-overflow: unset
        - overflow: visible
        - margin-top: 6px
      state:
        - font-size: 0.78rem
        - color: var(--secondary-text-color)
        - margin-top: 2px

views:

  # ═══════════════════════════════════════════════════════
  # MINER OVERVIEW  —  Miner 1 + Miner 2 nebeneinander
  # ═══════════════════════════════════════════════════════
  - title: Miner
    path: miner
    icon: mdi:pickaxe
    panel: true
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr
          grid-template-rows: auto
          margin: 8px
          row-gap: 16px
          column-gap: 40px
        cards:

        - type: vertical-stack
          cards:

            # ── Bitsy XAI — Warum passiert das gerade? ─────────────────────────
            - type: custom:button-card
              show_name: false
              show_icon: false
              show_state: false
              tap_action:
                action: none
              custom_fields:
                xai: >
                  [[[
                    const code     = states['sensor.bg_decision_code']?.state     || '—';
                    const priority = states['sensor.bg_decision_priority']?.state || '—';
                    const pv       = parseFloat(states['sensor.pv_power_w']?.state      || 0);
                    const load     = parseFloat(states['sensor.house_load_w']?.state    || 0);
                    const soc      = parseFloat(states['sensor.battery_soc_pct']?.state || 0);
                    const surplus  = parseFloat(states['sensor.surplus_kw']?.state) || 0;
                    const temp     = parseFloat(states['sensor.miner_max_chip_temp_c']?.state || 0);
                    const block    = states['sensor.block_id']?.state || '?';
                    const blockStart = states['sensor.block_window_start']?.state || '';

                    // Tageszeit-Greeting
                    const h = new Date().getHours();
                    const greeting = h < 5  ? 'Gute Nacht'
                                   : h < 11 ? 'Guten Morgen'
                                   : h < 14 ? 'Guten Mittag'
                                   : h < 18 ? 'Guten Nachmittag'
                                   : h < 22 ? 'Guten Abend'
                                   :          'Gute Nacht';

                    // Wetter-Kontext aus PV-Leistung
                    let weather, wColor;
                    if      (pv > 4000) { weather = '☀️ Volle Sonne';       wColor = '#FFC107'; }
                    else if (pv > 2000) { weather = '⛅ Teilweise bewölkt'; wColor = '#90A4AE'; }
                    else if (pv > 500)  { weather = '☁️ Bewölkt';           wColor = '#78909C'; }
                    else                { weather = '🌙 Kein PV';            wColor = '#5C6BC0'; }

                    // Schwellenwerte aus HA-Entities (nicht hardcoded)
                    const surplusMinKw  = parseFloat(states['input_number.r1_surplus_min_kw']?.state  || 1.5);
                    const socSoftMin    = parseFloat(states['input_number.r2_soc_soft_min_pct']?.state || 65);
                    const socHardMin    = parseFloat(states['input_number.r2_soc_hard_min_pct']?.state || 10);
                    const gridLimit     = parseFloat(states['input_number.r2_max_grid_import_w']?.state || 500);
                    const maxTemp       = parseFloat(states['input_number.r3_max_chip_temp_c']?.state  || 85);
                    const grid          = parseFloat(states['sensor.grid_import_w']?.state || 0);

                    // Bitsy erklärt die Entscheidung — Zeile 1: Ursache · Zeile 2: Bedingung
                    let lines;
                    if (code === 'STOP_R3_OVERTEMP') {
                      lines = [
                        `Übertemperatur — ${temp.toFixed(0)}°C überschreitet Limit ${maxTemp.toFixed(0)}°C.`,
                        `Miner startet automatisch wenn Temperatur sinkt.`
                      ];
                    } else if (code === 'STOP_R3_COMM_TIMEOUT') {
                      lines = [
                        `Kommunikationsausfall — kein Heartbeat vom Miner.`,
                        `Mining gestoppt bis MQTT-Verbindung wiederhergestellt.`
                      ];
                    } else if (code === 'STOP_R2_SOC_HARD_MIN') {
                      lines = [
                        `Batterie kritisch — ${soc.toFixed(0)}% unter Sicherheitsminimum ${socHardMin.toFixed(0)}%.`,
                        `Mining startet erst wenn Akku ≥ ${socSoftMin.toFixed(0)}%.`
                      ];
                    } else if (code === 'NOOP_R2_SOC_SOFT_MIN') {
                      lines = [
                        `Batterie bei ${soc.toFixed(0)}% — Mindest-SoC ${socSoftMin.toFixed(0)}% nicht erreicht.`,
                        `Mining startet wenn Akku ≥ ${socSoftMin.toFixed(0)}%.`
                      ];
                    } else if (code === 'STOP_R2_GRID_IMPORT_EXCEEDED') {
                      lines = [
                        `Netzbezug ${grid.toFixed(0)} W — Limit ${gridLimit.toFixed(0)} W überschritten.`,
                        `Mining pausiert bis Netzbezug unter ${gridLimit.toFixed(0)} W sinkt.`
                      ];
                    } else if (priority === 'R5_STABILITY') {
                      lines = [
                        `Deadband aktiv — letzte Entscheidung wird gehalten.`,
                        `Flapping-Schutz: kein Wechsel bis Mindesthaltezeit abläuft.`
                      ];
                    } else if (code.startsWith('START')) {
                      lines = [
                        `${surplus.toFixed(1)} kW Überschuss — alle Regeln erfüllt.`,
                        `Mining läuft. Batterie ${soc.toFixed(0)}%, PV ${(pv / 1000).toFixed(1)} kW.`
                      ];
                    } else if (soc < socSoftMin) {
                      lines = [
                        `Batterie bei ${soc.toFixed(0)}% — Mindest-SoC ${socSoftMin.toFixed(0)}% nicht erreicht.`,
                        `Mining startet wenn Akku ≥ ${socSoftMin.toFixed(0)}%.`
                      ];
                    } else {
                      lines = [
                        `PV-Überschuss ${surplus.toFixed(1)} kW — Minimum ${surplusMinKw.toFixed(1)} kW nicht erreicht.`,
                        `Mining startet bei ≥ ${surplusMinKw.toFixed(1)} kW Überschuss.`
                      ];
                    }

                    const blockKnown = block && block !== '?' && !isNaN(Number(block));
                    const blockTime = blockStart
                      ? (blockStart.includes(' ') ? blockStart.split(' ')[1].slice(0,5) : blockStart)
                      : '';

                    const now = new Date();
                    const hh  = String(now.getHours()).padStart(2, '0');
                    const mm  = String(now.getMinutes()).padStart(2, '0');
                    const time = hh + ':' + mm;
                    const slotMin = Math.floor(now.getMinutes() / 10) * 10;
                    const slotH   = String(now.getHours()).padStart(2, '0');
                    const slotM   = String(slotMin).padStart(2, '0');
                    const slot    = slotH + slotM + '.json';
                    const blockDisplay = states['sensor.bitcoin_block_height']?.state
                      && states['sensor.bitcoin_block_height'].state !== 'unavailable'
                      ? parseInt(states['sensor.bitcoin_block_height'].state).toLocaleString('de-DE')
                      : '—';

                    return `
                      <div style="position:relative;padding-right:100px">
                        <div style="position:absolute;top:0;right:0;
                                    display:flex;flex-direction:column;gap:4px;
                                    padding-left:12px;border-left:1px solid var(--divider-color);
                                    text-align:right;">
                          <div>
                            <div style="font-size:0.65rem;color:var(--secondary-text-color);">Uhrzeit</div>
                            <div style="font-size:1.8rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;">${time}</div>
                          </div>
                          <div>
                            <div style="font-size:0.65rem;color:var(--secondary-text-color);">₿ Block</div>
                            <div style="font-size:0.85rem;font-weight:700;color:#f59e0b;">${blockDisplay}</div>
                          </div>
                          <div>
                            <div style="font-size:0.65rem;color:var(--secondary-text-color);">Log-Slot</div>
                            <div style="font-size:0.78rem;font-weight:700;font-family:monospace;">${slot}</div>
                          </div>
                        </div>
                        <div style="font-size:0.8rem;font-weight:700;
                                    color:var(--primary-text-color);margin-bottom:10px">
                          BitGridAI &nbsp;·&nbsp;
                          <span style="color:var(--secondary-text-color);font-weight:400">${greeting}</span>
                        </div>
                        <div style="display:flex;gap:12px;align-items:flex-start">
                          <img src="/local/bithamster.png"
                               style="width:72px;height:72px;border-radius:50%;
                                      flex-shrink:0;object-fit:cover;
                                      border:2px solid var(--divider-color)">
                          <div style="flex:1">
                            <div style="font-size:0.75rem;font-weight:700;
                                        color:${wColor};margin-bottom:4px">
                              ${weather}
                            </div>
                            <div style="font-size:0.88rem;color:var(--primary-text-color);
                                        line-height:1.55">
                              ${lines.join('<br>')}
                            </div>
                            ${blockKnown ? `
                            <div style="font-size:0.68rem;color:var(--disabled-text-color);
                                        margin-top:8px;font-style:italic">
                              Block&nbsp;${block}${blockTime ? ' &middot; ' + blockTime : ''} &middot; 10-min Fenster
                            </div>` : ''}
                          </div>
                        </div>
                      </div>`;
                  ]]]
              styles:
                card:
                  - background: var(--secondary-background-color)
                  - border-radius: 12px
                  - padding: 14px 16px
                  - border: 1px solid rgba(100,221,23,0.15)
                  - text-align: left
                grid:
                  - grid-template-areas: '"xai"'
                  - grid-template-columns: 1fr
                custom_fields:
                  xai:
                    - width: 100%
                    - text-align: left
                    - justify-self: start

            # ── Energie-Status ──────────────────────────────────────────────────────
            - type: horizontal-stack
              cards:

                - type: custom:button-card
                  entity: sensor.battery_soc_pct
                  name: Akku
                  icon: mdi:battery-charging
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (v <= 50) return '#F44336';
                            if (v <= 64) return '#f59e0b';
                            if (v <= 95) return '#4CAF50';
                            return '#8BC34A';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info

                - type: custom:button-card
                  entity: sensor.pv_power_w
                  name: PV
                  icon: mdi:solar-power
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (!v || v === 0) return 'var(--secondary-text-color)';
                            if (v < 800)  return '#F44336';
                            if (v < 1600) return '#f59e0b';
                            if (v < 3400) return '#4CAF50';
                            return '#8BC34A';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info

                - type: custom:button-card
                  entity: sensor.grid_export_w
                  name: Überschuss
                  icon: mdi:transmission-tower-export
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (!v || v === 0) return 'var(--secondary-text-color)';
                            if (v < 800) return '#f59e0b';
                            return '#4CAF50';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info

                - type: custom:button-card
                  entity: sensor.grid_import_w
                  name: Netzbezug
                  icon: mdi:transmission-tower-import
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (!v || v === 0) return 'var(--secondary-text-color)';
                            if (v <= 500)      return '#f59e0b';
                            return '#F44336';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info

                - type: custom:button-card
                  entity: sensor.house_load_w
                  name: Haus
                  icon: mdi:home-lightning-bolt
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (!v || v === 0) return 'var(--secondary-text-color)';
                            if (v < 500)  return '#4CAF50';
                            if (v < 1500) return '#f59e0b';
                            return '#F44336';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info

                - type: custom:button-card
                  entity: sensor.miner_total_power_w
                  name: Miner
                  icon: mdi:pickaxe
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (!v || v === 0) return 'var(--secondary-text-color)';
                            if (v < 400)  return '#f59e0b';
                            return '#4CAF50';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info

                - type: custom:button-card
                  entity: sensor.ac_elwa_2_192_168_178_58_power1_solar
                  name: Heizstab
                  icon: mdi:water-boiler
                  show_state: true
                  styles:
                    card:
                      - background: var(--secondary-background-color)
                      - border-radius: 12px
                      - padding: 12px 4px
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: >
                          [[[
                            const v = parseFloat(entity.state);
                            if (!v || v === 0) return 'var(--secondary-text-color)';
                            if (v < 1000) return '#f59e0b';
                            return '#2196F3';
                          ]]]
                    name:
                      - font-size: 0.8rem
                      - color: var(--secondary-text-color)
                    state:
                      - font-size: 0.9rem
                      - font-weight: 600
                  tap_action:
                    action: more-info


            # ── Miner links | Heizstab rechts ──────────────────────────────

            - type: custom:button-card
              show_name: false
              show_icon: false
              show_state: false
              styles:
                card:
                  - background: transparent
                  - box-shadow: none
                  - height: 8px
                  - padding: 0

            # ── Miner Spalten ────────────────────────────────────────────────────────
            - type: grid
              columns: 2
              square: false
              cards:

                # ─────────────────────────────────────────────
                # MINER 1
                # ─────────────────────────────────────────────
                - type: vertical-stack
                  cards:

                    - type: custom:button-card
                      template: miner_header
                      entity: binary_sensor.miner1_available
                      name: "Miner Avalon Q 01  ›"
                      icon: mdi:memory

                    - type: horizontal-stack
                      cards:

                        - type: custom:button-card
                          template: miner_btn
                          entity: sensor.miner1_workmode_status
                          name: Power
                          icon: mdi:power
                          state_display: >
                            [[[
                              const on = ['Eco','Standard','Super'].includes(entity.state);
                              return on ? 'Ein' : 'Aus';
                            ]]]
                          styles:
                            icon:
                              - width: 44px
                              - height: 44px
                              - color: >
                                  [[[
                                    const on = ['Eco','Standard','Super'].includes(entity.state);
                                    return on ? '#4CAF50' : 'var(--disabled-color)';
                                  ]]]
                          tap_action:
                            action: call-service
                            service: >
                              [[[
                                const on = ['Eco','Standard','Super'].includes(entity.state);
                                return on
                                  ? 'shell_command.miner1_set_softoff'
                                  : 'shell_command.miner1_set_softon';
                              ]]]

                        - type: custom:button-card
                          template: miner_btn
                          entity: input_boolean.miner1_auto_load_management
                          name: Auto
                          icon: mdi:refresh-auto
                          state_display: >
                            [[[
                              return entity.state === 'on' ? 'Ein' : 'Aus';
                            ]]]
                          styles:
                            icon:
                              - width: 44px
                              - height: 44px
                              - color: >
                                  [[[
                                    return entity.state === 'on'
                                      ? '#4CAF50' : 'var(--disabled-color)';
                                  ]]]
                          tap_action:
                            action: toggle

                        - type: custom:button-card
                          template: miner_btn
                          entity: switch.miner1_lcdonoff_switch
                          name: Display
                          icon: mdi:fit-to-screen
                          state_display: >
                            [[[
                              return entity.state === 'on' ? 'Ein' : 'Aus';
                            ]]]
                          styles:
                            icon:
                              - width: 44px
                              - height: 44px
                              - color: >
                                  [[[
                                    return entity.state === 'on'
                                      ? '#2196F3' : 'var(--disabled-color)';
                                  ]]]
                          tap_action:
                            action: toggle

                        - type: custom:button-card
                          template: miner_btn
                          name: Reboot
                          icon: mdi:restart
                          show_state: false
                          styles:
                            icon:
                              - width: 44px
                              - height: 44px
                              - color: "#f59e0b"
                          tap_action:
                            action: call-service
                            service: shell_command.miner1_reboot

                    - type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          entity: select.miner1_workmode_set
                          name: Standby
                          icon: mdi:power-sleep
                          show_state: false
                          styles:
                            card:
                              - background: >
                                  [[[
                                    return entity.state === 'Standby'
                                      ? '#757575' : 'var(--secondary-background-color)';
                                  ]]]
                              - border-radius: 10px
                              - padding: 10px 4px
                            icon:
                              - width: 26px
                              - height: 26px
                              - color: >
                                  [[[
                                    return entity.state === 'Standby'
                                      ? '#fff' : '#757575';
                                  ]]]
                            name:
                              - font-size: 0.68rem
                              - color: >
                                  [[[
                                    return entity.state === 'Standby'
                                      ? '#fff' : 'var(--secondary-text-color)';
                                  ]]]
                          tap_action:
                            action: call-service
                            service: select.select_option
                            service_data:
                              entity_id: select.miner1_workmode_set
                              option: Standby
                        - type: custom:button-card
                          entity: select.miner1_workmode_set
                          name: Eco
                          icon: mdi:leaf
                          show_state: false
                          styles:
                            card:
                              - background: >
                                  [[[
                                    return entity.state === 'Eco'
                                      ? '#4CAF50' : 'var(--secondary-background-color)';
                                  ]]]
                              - border-radius: 10px
                              - padding: 10px 4px
                            icon:
                              - width: 26px
                              - height: 26px
                              - color: >
                                  [[[
                                    return entity.state === 'Eco'
                                      ? '#fff' : '#4CAF50';
                                  ]]]
                            name:
                              - font-size: 0.68rem
                              - color: >
                                  [[[
                                    return entity.state === 'Eco'
                                      ? '#fff' : 'var(--secondary-text-color)';
                                  ]]]
                          tap_action:
                            action: call-service
                            service: select.select_option
                            service_data:
                              entity_id: select.miner1_workmode_set
                              option: Eco
                        - type: custom:button-card
                          entity: select.miner1_workmode_set
                          name: Standard
                          icon: mdi:gauge
                          show_state: false
                          styles:
                            card:
                              - background: >
                                  [[[
                                    return entity.state === 'Standard'
                                      ? '#f59e0b' : 'var(--secondary-background-color)';
                                  ]]]
                              - border-radius: 10px
                              - padding: 10px 4px
                            icon:
                              - width: 26px
                              - height: 26px
                              - color: >
                                  [[[
                                    return entity.state === 'Standard'
                                      ? '#fff' : '#f59e0b';
                                  ]]]
                            name:
                              - font-size: 0.68rem
                              - color: >
                                  [[[
                                    return entity.state === 'Standard'
                                      ? '#fff' : 'var(--secondary-text-color)';
                                  ]]]
                          tap_action:
                            action: call-service
                            service: select.select_option
                            service_data:
                              entity_id: select.miner1_workmode_set
                              option: Standard
                        - type: custom:button-card
                          entity: select.miner1_workmode_set
                          name: Super
                          icon: mdi:rocket-launch
                          show_state: false
                          styles:
                            card:
                              - background: >
                                  [[[
                                    return entity.state === 'Super'
                                      ? '#F44336' : 'var(--secondary-background-color)';
                                  ]]]
                              - border-radius: 10px
                              - padding: 10px 4px
                            icon:
                              - width: 26px
                              - height: 26px
                              - color: >
                                  [[[
                                    return entity.state === 'Super'
                                      ? '#fff' : '#F44336';
                                  ]]]
                            name:
                              - font-size: 0.68rem
