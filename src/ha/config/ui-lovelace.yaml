title: BitGridAI
views:
  - title: Overview
    path: overview
    icon: mdi:home-analytics
    cards:
      - type: entities
        title: Decision & State
        show_header_toggle: false
        entities:
          - entity: input_select.system_state
          - entity: input_select.autonomy_level
          - entity: input_select.decision_action
          - entity: sensor.bg_decision_action
          - entity: sensor.bg_decision_priority
          - entity: input_text.decision_reason
          - entity: input_text.decision_code
          - entity: input_datetime.decision_timestamp
          - entity: sensor.block_id
          - entity: sensor.block_window_start
          - entity: sensor.block_window_end
          - entity: input_datetime.deadband_valid_until
          - entity: binary_sensor.r5_deadband_active
          - entity: binary_sensor.safety_lockout_active

      - type: entities
        title: Override Control
        show_header_toggle: false
        entities:
          - entity: input_boolean.override_active
          - entity: input_select.override_action
          - entity: input_number.override_duration_min
          - entity: input_datetime.override_valid_until
          - entity: input_text.override_status
          - entity: input_text.decision_explanation
          - entity: sensor.rule_states_json

      - type: vertical-stack
        cards:
          - type: custom:power-flow-card-plus
            title: HEMS Energy Flow
            clickable_entities: true
            w_decimals: 0
            kw_decimals: 2
            watt_threshold: 1000
            entities:
              solar:
                entity: sensor.pv_generation_w
                name: PV
                icon: mdi:solar-power
              battery:
                entity: sensor.battery_power_w
                state_of_charge: sensor.battery_soc_pct
                name: Battery
                icon: mdi:battery
              grid:
                entity: sensor.grid_import_w
                name: Grid
                icon: mdi:transmission-tower
                display_state: one_way
              home:
                entity: sensor.house_load_w
                name: House
                icon: mdi:home-lightning-bolt
              individual:
                - entity: sensor.miner_power_w
                  name: Miner
                  icon: mdi:bitcoin
          - type: history-graph
            title: Energy Flow (2h)
            hours_to_show: 2
            refresh_interval: 60
            entities:
              - entity: sensor.pv_generation_w
                name: PV
              - entity: sensor.battery_power_w
                name: Battery
              - entity: sensor.house_load_w
                name: House
              - entity: sensor.grid_import_w
                name: Grid
              - entity: sensor.miner_power_w
                name: Miner
              - entity: sensor.surplus_kw
                name: Surplus

      - type: horizontal-stack
        cards:
          - type: gauge
            name: Battery SoC
            entity: sensor.battery_soc_pct
            min: 0
            max: 100
          - type: gauge
            name: Miner Temp
            entity: sensor.miner_temp_c
            min: 0
            max: 120
          - type: gauge
            name: Surplus
            entity: sensor.surplus_kw
            min: -10
            max: 20

      - type: entities
        title: Power
        entities:
          - entity: sensor.pv_generation_w
            name: PV Generation
          - entity: sensor.battery_power_w
            name: Battery Power
          - entity: sensor.house_load_w
            name: House Load
          - entity: sensor.grid_import_w
            name: Grid Import
          - entity: sensor.miner_power_w
            name: Miner Power
          - entity: sensor.surplus_kw
            name: Surplus

      - type: history-graph
        title: Power History (8h)
        hours_to_show: 8
        refresh_interval: 60
        entities:
          - entity: sensor.pv_generation_w
          - entity: sensor.battery_power_w
          - entity: sensor.house_load_w
          - entity: sensor.grid_import_w
          - entity: sensor.miner_power_w
          - entity: sensor.surplus_kw

      - type: entities
        title: Miner Control
        show_header_toggle: false
        entities:
          - entity: switch.miner_relay
            name: Miner Relay
          - entity: sensor.miner_status
            name: Miner Status
          - entity: sensor.miner_heartbeat_age_sec
            name: Heartbeat Age

      - type: entities
        title: Safety
        show_header_toggle: false
        entities:
          - entity: binary_sensor.r3_safety_override
            name: R3 Safety Override
          - entity: binary_sensor.safety_lockout_active
            name: Safety Lockout Active
          - entity: binary_sensor.r3_overtemp
            name: Overtemp
          - entity: binary_sensor.r3_comm_timeout
            name: Comm Timeout
          - entity: input_boolean.r3_emergency_stop
            name: E-Stop (Control)
          - entity: binary_sensor.r3_emergency_stop
            name: E-Stop (State)

      - type: glance
        title: Rule Gates
        show_name: true
        entities:
          - entity: binary_sensor.r1_surplus_ok
            name: R1 Surplus OK
          - entity: binary_sensor.r2_soc_soft
            name: R2 SoC Soft
          - entity: binary_sensor.r2_soc_hard
            name: R2 SoC Hard
          - entity: binary_sensor.r2_grid_import_ok
            name: R2 Grid Import OK
          - entity: binary_sensor.r3_overtemp
            name: R3 Overtemp
          - entity: binary_sensor.r3_comm_timeout
            name: R3 Comm Timeout
          - entity: binary_sensor.r3_emergency_stop
            name: R3 E-Stop
          - entity: binary_sensor.r3_safety_override
            name: R3 Safety Override
          - entity: binary_sensor.r5_deadband_active
            name: R5 Deadband Active
          - entity: binary_sensor.r5_min_runtime_active
            name: R5 Min Runtime
          - entity: binary_sensor.r5_min_pause_active
            name: R5 Min Pause

      - type: entities
        title: Tuning (Quick)
        entities:
          - entity: input_number.r1_surplus_min_kw
            name: R1 Min Surplus (kW)
          - entity: input_number.r2_soc_soft_min_pct
            name: R2 Soft Min SoC (%)
          - entity: input_number.r2_soc_hard_min_pct
            name: R2 Hard Min SoC (%)
          - entity: input_number.r2_max_grid_import_w
            name: R2 Max Grid Import (W)
          - entity: input_number.r3_max_chip_temp_c
            name: R3 Max Chip Temp (C)
          - entity: input_number.r3_comm_timeout_sec
            name: R3 Comm Timeout (s)
          - entity: input_number.r5_deadband_hold_blocks
            name: R5 Deadband Hold (blocks)
          - entity: input_number.r5_min_runtime_blocks
            name: R5 Min Runtime (blocks)
          - entity: input_number.r5_min_pause_blocks
            name: R5 Min Pause (blocks)
          - entity: input_number.block_minutes
            name: Block Minutes

      - type: conditional
        conditions:
          - entity: input_boolean.simulation_mode
            state: "on"
        card:
          type: entities
          title: Simulation Inputs
          entities:
            - entity: input_number.pv_power_w
              name: PV Power (W)
            - entity: input_number.house_load_w
              name: House Load (W)
            - entity: input_number.grid_import_w
              name: Grid Import (W)
            - entity: input_number.battery_soc_pct
              name: Battery SoC (%)
            - entity: input_number.battery_power_w
              name: Battery Power (W)
            - entity: input_number.miner_power_w
              name: Miner Power (W)
            - entity: input_number.miner_temp_c
              name: Miner Temp (C)
            - entity: input_number.miner_heartbeat_age_sec
              name: Heartbeat Age (s)

  - title: Tuning
    path: tuning
    icon: mdi:tune-vertical
    cards:
      - type: entities
        title: R1 Surplus
        entities:
          - entity: input_number.r1_surplus_min_kw
            name: Min Surplus (kW)

      - type: entities
        title: R2 Battery + Grid
        entities:
          - entity: input_number.r2_soc_soft_min_pct
            name: Soft Min SoC (%)
          - entity: input_number.r2_soc_hard_min_pct
            name: Hard Min SoC (%)
          - entity: input_number.r2_max_grid_import_w
            name: Max Grid Import (W)

      - type: entities
        title: R3 Safety
        entities:
          - entity: input_number.r3_max_chip_temp_c
            name: Max Chip Temp (C)
          - entity: input_number.r3_comm_timeout_sec
            name: Comm Timeout (s)
          - entity: input_number.r3_safety_lockout_min
            name: Safety Lockout (min)
          - entity: input_boolean.r3_emergency_stop
            name: E-Stop

      - type: entities
        title: R5 Deadband / Runtime
        entities:
          - entity: input_number.r5_deadband_hold_blocks
            name: Deadband Hold (blocks)
          - entity: input_number.r5_min_runtime_blocks
            name: Min Runtime (blocks)
          - entity: input_number.r5_min_pause_blocks
            name: Min Pause (blocks)
          - entity: input_number.block_minutes
            name: Block Minutes

      - type: entities
        title: Deadband Timing
        entities:
          - entity: input_datetime.deadband_valid_until
            name: Deadband Valid Until

  - title: Simulation
    path: simulation
    icon: mdi:flask
    cards:
      - type: entities
        title: Simulation Mode
        show_header_toggle: false
        entities:
          - entity: input_boolean.simulation_mode
            name: Simulation Mode
          - entity: input_boolean.replay_mode
            name: Replay Mode
          - entity: input_boolean.miner_relay_sim
            name: Miner Relay Sim

      - type: entities
        title: Simulation Actions
        show_header_toggle: false
        entities:
          - entity: script.sim_run_sh_suite
            name: Run SH Suite (SH-1..SH-4)
          - entity: script.sim_tests_reset
            name: Reset Test Counters
          - entity: script.bg_decision_cycle
            name: Decision Cycle Now
          - entity: script.bg_force_safety_stop
            name: Force Safety Stop
          - entity: script.sim_reset
            name: SIM Reset
          - entity: script.sim_sh1_stable_surplus
            name: SH-1 Stable Surplus
          - entity: script.sim_sh2_variable_pv
            name: SH-2 Variable PV
          - entity: script.sim_sh3_soc_critical
            name: SH-3 SoC Critical
          - entity: script.sim_sh4_safety_overtemp
            name: SH-4 Safety Overtemp

      - type: entities
        title: Test Protocol
        show_header_toggle: false
        entities:
          - entity: sensor.bg_test_status
            name: Suite Status
          - entity: sensor.bg_test_totals
            name: Totals
          - entity: input_number.test_pass_count
            name: Pass Count
          - entity: input_number.test_fail_count
            name: Fail Count
          - entity: input_text.last_test_case
            name: Last Test Case
          - entity: input_text.last_test_result
            name: Last Test Result
          - entity: input_text.test_summary
            name: Summary

      - type: entities
        title: Simulated PV Generation
        entities:
          - entity: input_number.pv_power_w
            name: PV Output (W)
          - entity: sensor.pv_generation_w
            name: PV Generation (Sensor)

      - type: entities
        title: Simulated Inputs
        entities:
          - entity: input_number.house_load_w
            name: House Load (W)
          - entity: input_number.grid_import_w
            name: Grid Import (W)
          - entity: input_number.battery_soc_pct
            name: Battery SoC (%)
          - entity: input_number.battery_power_w
            name: Battery Power (W)
          - entity: input_number.miner_power_w
            name: Miner Power (W)
          - entity: input_number.miner_temp_c
            name: Miner Temp (C)
          - entity: input_number.miner_heartbeat_age_sec
            name: Heartbeat Age (s)

      - type: history-graph
        title: Simulation History (8h)
        hours_to_show: 8
        refresh_interval: 60
        entities:
          - entity: sensor.pv_generation_w
          - entity: sensor.house_load_w
          - entity: sensor.grid_import_w
          - entity: sensor.battery_soc_pct
          - entity: sensor.battery_power_w
          - entity: sensor.miner_power_w
          - entity: sensor.miner_temp_c
          - entity: sensor.miner_heartbeat_age_sec
