                        return `<div style="width:100%;padding:2px 0;">
                          <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--secondary-text-color);margin-bottom:4px;">Keller</div>
                          ${row('mdi:thermometer','Temperatur',t_keller,'°C')}
                          ${row('mdi:water-percent','Feuchte',h_keller,'%')}
                        </div>`;
                      ]]]

                # ── Miner 1 Klima ───────────────────────────────────────────────────
                - type: custom:button-card
                  show_name: false
                  show_icon: false
                  show_state: false
                  styles:
                    card:
                      - padding: 10px 16px
                    custom_fields:
                      env:
                        - width: 100%
                        - justify-self: stretch
                        - box-sizing: border-box
                  custom_fields:
                    env: >
                      [[[
                        const raw = (id) => states[id];
                        const val = (id) => {
                          const s = raw(id)?.state;
                          return (!s || s === 'unknown' || s === 'unavailable') ? null : s;
                        };
                        const t_m1 = val('sensor.ewelink_snzb_01p_temperatur');
                        const h_m1 = val('sensor.ewelink_snzb_01p_luftfeuchtigkeit');
                        const row = (icon, label, v, unit) => {
                          const display = v !== null
                            ? `<span style="font-size:1rem;font-weight:600;margin-left:8px;">${v} ${unit}</span>`
                            : `<span style="font-size:0.8rem;font-weight:600;margin-left:8px;color:#ef5350;background:rgba(239,83,80,0.12);padding:1px 6px;border-radius:4px;">✕ unknown</span>`;
                          return `<div style="display:flex;align-items:center;padding:3px 0;gap:8px;">
                            <ha-icon icon="${icon}" style="--mdc-icon-size:16px;color:var(--secondary-text-color);"></ha-icon>
                            <span style="color:var(--secondary-text-color);font-size:0.85rem;">${label}:</span>
                            ${display}
