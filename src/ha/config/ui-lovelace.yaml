title: BitGridAI

# ═══════════════════════════════════════════════════════
# Shared Button-Card Templates
# ═══════════════════════════════════════════════════════
button_card_templates:

  miner_header:
    show_state: false
    show_icon: true
    tap_action:
      action: none
    custom_fields:
      status: >
        [[[
          const on = entity.state === 'on';
          return `<ha-icon icon="${on ? 'mdi:check-circle' : 'mdi:alert-circle'}"
            style="color:${on ? '#4CAF50' : '#F44336'}; --mdc-icon-size:22px;"></ha-icon>`;
        ]]]
    styles:
      grid:
        - grid-template-areas: '"n status i"'
        - grid-template-columns: 1fr auto auto
        - grid-template-rows: 1fr
      card:
        - padding: 12px 16px
        - height: 56px
      name:
        - font-size: 1.1rem
        - font-weight: bold
        - text-align: left
        - justify-self: start
        - padding-right: 8px
      icon:
        - color: var(--primary-text-color)
        - width: 22px
        - height: 22px
        - margin-left: 6px
      custom_fields:
        status:
          - display: flex
          - align-items: center

  miner_btn:
    show_state: true
    styles:
      card:
        - background: var(--secondary-background-color)
        - border-radius: 12px
        - padding: 20px 6px
        - height: 110px
      icon:
        - width: 44px
        - height: 44px
      name:
        - font-size: 0.9rem
        - font-weight: 600
        - color: var(--primary-text-color)
        - white-space: unset
        - text-overflow: unset
        - overflow: visible
        - margin-top: 6px
      state:
        - font-size: 0.78rem
        - color: var(--secondary-text-color)
        - margin-top: 2px

views:

  # ═══════════════════════════════════════════════════════
  # MINER OVERVIEW  —  Miner 1 + Miner 2 nebeneinander
  # ═══════════════════════════════════════════════════════
  - title: Miner
    path: miner
    icon: mdi:pickaxe
    cards:
      - type: vertical-stack
        cards:

          # ── Energie-Status ──────────────────────────────────────────────────────
          - type: horizontal-stack
            cards:

              - type: custom:button-card
                entity: sensor.battery_soc_pct
                name: Akku
                icon: mdi:battery-charging
                show_state: true
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 4px
                  icon:
                    - width: 36px
                    - height: 36px
                    - color: >
                        [[[
                          const v = parseFloat(entity.state);
                          if (v <= 50) return '#F44336';
                          if (v <= 64) return '#f59e0b';
                          if (v <= 95) return '#4CAF50';
                          return '#8BC34A';
                        ]]]
                  name:
                    - font-size: 0.8rem
                    - color: var(--secondary-text-color)
                  state:
                    - font-size: 0.9rem
                    - font-weight: 600
                tap_action:
                  action: more-info

              - type: custom:button-card
                entity: sensor.pv_power_w
                name: PV
                icon: mdi:solar-power
                show_state: true
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 4px
                  icon:
                    - width: 36px
                    - height: 36px
                    - color: >
                        [[[
                          const v = parseFloat(entity.state);
                          if (!v || v === 0) return 'var(--secondary-text-color)';
                          if (v < 800)  return '#F44336';
                          if (v < 1600) return '#f59e0b';
                          if (v < 3400) return '#4CAF50';
                          return '#8BC34A';
                        ]]]
                  name:
                    - font-size: 0.8rem
                    - color: var(--secondary-text-color)
                  state:
                    - font-size: 0.9rem
                    - font-weight: 600
                tap_action:
                  action: more-info

              - type: custom:button-card
                entity: sensor.grid_export_w
                name: Überschuss
                icon: mdi:transmission-tower-export
                show_state: true
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 4px
                  icon:
                    - width: 36px
                    - height: 36px
                    - color: >
                        [[[
                          const v = parseFloat(entity.state);
                          if (!v || v === 0) return 'var(--secondary-text-color)';
                          if (v < 800) return '#f59e0b';
                          return '#4CAF50';
                        ]]]
                  name:
                    - font-size: 0.8rem
                    - color: var(--secondary-text-color)
                  state:
                    - font-size: 0.9rem
                    - font-weight: 600
                tap_action:
                  action: more-info

              - type: custom:button-card
                entity: sensor.grid_import_w
                name: Netzbezug
                icon: mdi:transmission-tower-import
                show_state: true
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 4px
                  icon:
                    - width: 36px
                    - height: 36px
                    - color: >
                        [[[
                          const v = parseFloat(entity.state);
                          if (!v || v === 0) return 'var(--secondary-text-color)';
                          if (v <= 500)      return '#f59e0b';
                          return '#F44336';
                        ]]]
                  name:
                    - font-size: 0.8rem
                    - color: var(--secondary-text-color)
                  state:
                    - font-size: 0.9rem
                    - font-weight: 600
                tap_action:
                  action: more-info

              - type: custom:button-card
                entity: weather.forecast_home
                name: Wetter
                show_state: true
                styles:
                  card:
                    - background: var(--secondary-background-color)
                    - border-radius: 12px
                    - padding: 12px 4px
                  icon:
                    - width: 36px
                    - height: 36px
                    - color: var(--primary-color)
                  name:
                    - font-size: 0.8rem
                    - color: var(--secondary-text-color)
                  state:
                    - font-size: 0.9rem
                    - font-weight: 600
                tap_action:
                  action: more-info
    
          # ── Miner Spalten ────────────────────────────────────────────────────────
          - type: grid
            columns: 2
            square: false
            cards:
    
              # ─────────────────────────────────────────────
              # MINER 1
              # ─────────────────────────────────────────────
              - type: vertical-stack
                cards:
    
                  - type: custom:button-card
                    template: miner_header
                    entity: binary_sensor.miner1_available
                    name: "Miner Avalon Q 01  ›"
                    icon: mdi:memory
    
                  - type: horizontal-stack
                    cards:
    
                      - type: custom:button-card
                        template: miner_btn
                        entity: sensor.miner1_workmode_status
                        name: Power
                        icon: mdi:power
                        state_display: >
                          [[[
                            return entity.state === 'Standby' ? 'Aus' : 'Ein';
                          ]]]
                        styles:
                          icon:
                            - width: 44px
                            - height: 44px
                            - color: >
                                [[[
                                  return entity.state === 'Standby'
                                    ? 'var(--disabled-color)' : '#4CAF50';
                                ]]]
                        tap_action:
                          action: call-service
                          service: >
                            [[[
                              return entity.state === 'Standby'
                                ? 'shell_command.miner1_set_softon'
                                : 'shell_command.miner1_set_softoff';
                            ]]]
    
                      - type: custom:button-card
                        template: miner_btn
                        entity: input_boolean.miner1_auto_load_management
                        name: Auto
                        icon: mdi:refresh-auto
                        state_display: >
                          [[[
                            return entity.state === 'on' ? 'Ein' : 'Aus';
                          ]]]
