# Persona-spezifische Few-Shot-Beispiele je decision_code (Gruppe B, LLM-Variante).
#
# Zweck:
#   (a) Few-Shot-Anker im LLM-Prompt — ein ideales Beispiel je Persona, das Tonalität,
#       Länge und Zahlenbezug vorgibt.
#   (b) Qualitative Gold-Referenz: beim späteren Test mit echtem LLM-Output (group_b)
#       wird gegen diese Sätze verglichen (Tonalität, Faithfulness, persona-Treue).
#
# Personas (= Frame-Achse der Studie, vgl. ExplainAgent._PERSONA_INSTRUCTIONS):
#   energie — Eigenverbrauch/Autarkie, einfache Alltagssprache, "du"
#   waerme  — Wärmegewinn des Geräts im Vordergrund, Mining ist Mittel zum Zweck
#   tech    — volle Transparenz: decision_code, Regel (R1–R5), Messwerte mit Einheiten
#
# Regeln pro Satz: genau EIN deutscher Satz, max. ~25 Wörter, mind. eine konkrete Zahl,
# deutsches Dezimalkomma, kein Englisch/Chinesisch. Zahlen entsprechen dem jeweiligen
# Studien-Szenario (S1–S10) für konkrete, replay-stabile Anker.
de:
  START_R1_SURPLUS_OK:           # S1
    energie: "Der Miner läuft — deine Solaranlage erzeugt 3,0 kW mehr, als dein Haus braucht, und nutzt diesen Überschuss selbst statt ihn einzuspeisen."
    waerme: "Dein Gerät heizt jetzt mit 3,0 kW Solarüberschuss — kostenlose Wärme aus der Sonne, statt den Strom ungenutzt einzuspeisen."
    tech: "START_R1_SURPLUS_OK: R1 startet bei 3,0 kW Überschuss (PV 4500 W − Haus 1500 W), über der Schwelle 1,5 kW."

  NOOP_R1_INSUFFICIENT_SURPLUS:  # S2
    energie: "Der Miner wartet — aktuell sind nur 0,4 kW Solarüberschuss da, für den Start braucht es mindestens 1,5 kW."
    waerme: "Noch keine Wärme: Mit 0,4 kW Überschuss reicht die Sonne nicht, dein Gerät startet erst ab 1,5 kW."
    tech: "NOOP_R1_INSUFFICIENT_SURPLUS: R1 hält, Überschuss 0,4 kW < Startschwelle 1,5 kW."

  NOOP_R1_PRICE_TOO_HIGH:        # S3
    energie: "Der Miner wartet trotz Sonne — der Strompreis liegt mit 28,0 ct/kWh über deinem Limit von 25,0 ct."
    waerme: "Keine Wärme jetzt: Trotz 2,5 kW Überschuss ist der Strompreis mit 28,0 ct/kWh über der Grenze von 25,0 ct."
    tech: "NOOP_R1_PRICE_TOO_HIGH: R1-Preisschranke greift, 28,0 ct/kWh > price_max 25,0 ct/kWh, trotz Überschuss 2,5 kW."

  STOP_R3_OVERTEMP:              # S4
    energie: "Sicherheitsstopp — der Miner ist mit 90 °C zu heiß geworden (Grenze 85 °C) und wurde sofort abgeschaltet."
    waerme: "Der Wärmeschutz greift: Mit 90 °C über der Grenze von 85 °C schaltet dein Gerät zur Sicherheit ab."
    tech: "STOP_R3_OVERTEMP: R3-Safety, Chiptemperatur 90 °C > max 85 °C, nicht überstimmbar."

  STOP_R3_COMM_TIMEOUT:          # S5
    energie: "Sicherheitsstopp — der Miner meldet sich seit 75 Sekunden nicht mehr (Grenze 60 s) und wurde abgeschaltet."
    waerme: "Dein Gerät wurde sicherheitshalber gestoppt — seit 75 Sekunden kommt kein Signal mehr (Grenze 60 s)."
    tech: "STOP_R3_COMM_TIMEOUT: R3-Safety, Heartbeat-Alter 75 s > comm_timeout 60 s, nicht überstimmbar."

  NOOP_R2_SOC_SOFT_MIN:          # S6
    energie: "Der Miner wartet — dein Speicher ist erst zu 55 % geladen und startet, sobald 58 % erreicht sind."
    waerme: "Noch keine Wärme: Dein Speicher lädt erst auf 58 % (aktuell 55 %), bevor das Gerät anläuft."
    tech: "NOOP_R2_SOC_SOFT_MIN: R2-Veto, SoC 55 % ≤ soft_min 58 %, kein Neustart."

  STOP_R2_SOC_HARD_MIN:          # S7
    energie: "Der Miner wurde gestoppt, um deinen Hausspeicher zu schützen — er ist auf 45 % gefallen, die Reserve liegt bei 50 %."
    waerme: "Heizen vorerst beendet: Der Speicher ist auf 45 % gesunken, unter die Reserve von 50 % — Schutz geht vor."
    tech: "STOP_R2_SOC_HARD_MIN: R2-Hard-Stop, SoC 45 % ≤ hard_min 50 % (Hausreserve)."

  STOP_R2_GRID_IMPORT_EXCEEDED:  # S8
    energie: "Der Miner wurde gestoppt — er hätte 700 W aus dem Netz gezogen, erlaubt sind nur 500 W; Netzstrom wird nicht vermint."
    waerme: "Wärme aus, Netzschutz an: Es flossen 700 W aus dem Netz (Grenze 500 W) — dein Gerät heizt nur mit Solarstrom."
    tech: "STOP_R2_GRID_IMPORT_EXCEEDED: R2-Veto, Netto-Netzbezug 700 W > max_grid_import 500 W."

  NOOP_R4_FORECAST_PV_INSUFFICIENT:  # S9
    energie: "Der Miner startet nicht — die Vorhersage erwartet nur 1,2 kW Sonne, für einen Start wären 2,0 kW nötig."
    waerme: "Noch kein Heizen: Die Prognose sagt nur 1,2 kW Solarleistung voraus, dein Gerät startet erst ab 2,0 kW."
    tech: "NOOP_R4_FORECAST_PV_INSUFFICIENT: R4-Veto, PV-Prognose 1,2 kW < min_predicted_surplus 2,0 kW."

  NOOP_R5_MIN_RUNTIME_NOT_REACHED:   # S10
    energie: "Der Miner bleibt an — er läuft erst seit einem von drei Pflicht-Intervallen, so vermeiden wir ständiges Ein- und Ausschalten."
    waerme: "Dein Gerät heizt weiter: Erst eines von drei Intervallen ist um — kurzes An-Aus würde nur die Wärme stören."
    tech: "NOOP_R5_MIN_RUNTIME_NOT_REACHED: R5-Stabilität, 1 von 3 min_runtime-Blöcken (je 10 min), kein Stop."

  THROTTLE_R1_SURPLUS_THROTTLE:      # optional (11. Szenario, Eco-Band)
    energie: "Der Miner läuft gedrosselt — 1,0 kW Überschuss reichen für Sparbetrieb, volle Last gibt es erst ab 1,5 kW."
    waerme: "Dein Gerät heizt sparsam: 1,0 kW Solarüberschuss reichen für gedrosselten Betrieb, volle Wärme ab 1,5 kW."
    tech: "THROTTLE_R1_SURPLUS_THROTTLE: R1-Eco-Band, 0,8 kW ≤ Überschuss 1,0 kW < 1,5 kW, gedrosselter Start."
