de:
  START_R1_SURPLUS_OK:
    short: "PV-Überschuss vorhanden — Miner läuft"
    long: "PV-Leistung übersteigt Hausverbrauch um {surplus_kw:.1f} kW. Miner gestartet."
    trigger: "Überschuss {surplus_kw:.1f} kW übersteigt Startschwelle {surplus_min_kw:.1f} kW"
    data_basis: "PV {pv_power_w:.0f} W · Haus {house_load_w:.0f} W · Überschuss {surplus_kw:.1f} kW · Prognose {pv_forecast_kw:.1f} kW"
    effect: "Miner gestartet"
    options: ""

  NOOP_R1_INSUFFICIENT_SURPLUS:
    short: "Zu wenig PV-Überschuss — Miner wartet"
    long: "Aktueller Überschuss {surplus_kw:.1f} kW liegt unter der Startschwelle {surplus_min_kw:.1f} kW."
    trigger: "Überschuss {surplus_kw:.1f} kW reicht nicht für Startschwelle {surplus_min_kw:.1f} kW"
    data_basis: "PV-Überschuss {surplus_kw:.1f} kW · Startschwelle {surplus_min_kw:.1f} kW · Prognose {pv_forecast_kw:.1f} kW"
    effect: "Miner bleibt gestoppt — zu wenig Solarstrom"
    options: "Miner startet ab {surplus_min_kw:.1f} kW Überschuss"

  NOOP_R1_PRICE_TOO_HIGH:
    short: "Strompreis zu hoch — Miner wartet"
    long: "Aktueller Preis {energy_price_ct_kwh:.1f} ct/kWh liegt über dem Limit {price_max_ct_kwh:.1f} ct/kWh."
    trigger: "Strompreis {energy_price_ct_kwh:.1f} ct/kWh überschreitet Limit {price_max_ct_kwh:.1f} ct/kWh"
    data_basis: "Strompreis {energy_price_ct_kwh:.1f} ct/kWh · Preislimit {price_max_ct_kwh:.1f} ct/kWh · Prognose {pv_forecast_kw:.1f} kW"
    effect: "Miner bleibt gestoppt — Preisschutz aktiv"
    options: "Miner startet wenn Preis unter {price_max_ct_kwh:.1f} ct/kWh sinkt"

  STOP_R2_SOC_HARD_MIN:
    short: "Batterie kritisch — Miner gestoppt"
    long: "Batterieladung {battery_soc_pct:.0f} % liegt unter dem Sicherheitsminimum {soc_hard_min_pct:.0f} %."
    trigger: "Batterie {battery_soc_pct:.0f} % unter Sicherheitsminimum {soc_hard_min_pct:.0f} %"
    data_basis: "Batterie {battery_soc_pct:.0f} % · Sicherheitsminimum {soc_hard_min_pct:.0f} %"
    effect: "Miner gestoppt — Batterie schützen"
    options: "Miner startet wieder ab {soc_soft_min_pct:.0f} % · Prognose {pv_forecast_kw:.1f} kW"

  NOOP_R2_SOC_SOFT_MIN:
    short: "Batterie lädt — Miner wartet"
    long: "Batterieladung {battery_soc_pct:.0f} % liegt unter der Mindestschwelle {soc_soft_min_pct:.0f} %."
    trigger: "Batterie {battery_soc_pct:.0f} % unter Mindestschwelle {soc_soft_min_pct:.0f} %"
    data_basis: "Batterie {battery_soc_pct:.0f} % · Mindestschwelle {soc_soft_min_pct:.0f} %"
    effect: "Miner bleibt aus — Batterie lädt zuerst"
    options: "Miner startet ab {soc_soft_min_pct:.0f} % Ladezustand"

  STOP_R2_GRID_IMPORT_EXCEEDED:
    short: "Zu viel Netzbezug — Miner gestoppt"
    long: "Netzbezug {grid_import_w:.0f} W überschreitet das erlaubte Limit {max_grid_import_w:.0f} W."
    trigger: "Netzbezug {grid_import_w:.0f} W über Limit {max_grid_import_w:.0f} W"
    data_basis: "Netzbezug {grid_import_w:.0f} W · Limit {max_grid_import_w:.0f} W"
    effect: "Miner gestoppt — Stromnetz entlasten"
    options: "Miner startet wenn Netzbezug unter {max_grid_import_w:.0f} W sinkt"

  STOP_R3_OVERTEMP:
    short: "Übertemperatur — Miner gestoppt"
    long: "Chip-Temperatur {miner_temp_c:.0f}°C überschreitet die Sicherheitsgrenze {max_chip_temp_c:.0f}°C."
    trigger: "Chip-Temperatur {miner_temp_c:.0f}°C über Sicherheitsgrenze {max_chip_temp_c:.0f}°C"
    data_basis: "Chip-Temperatur {miner_temp_c:.0f}°C · Limit {max_chip_temp_c:.0f}°C"
    effect: "Miner gestoppt — Überhitzungsschutz"
    options: "Miner startet nach Abkühlung unter {max_chip_temp_c:.0f}°C"

  STOP_R3_COMM_TIMEOUT:
    short: "Miner nicht erreichbar — gestoppt"
    long: "Kein Heartbeat vom Miner seit {miner_heartbeat_age_sec:.0f} s (Limit: {comm_timeout_sec:.0f} s)."
    trigger: "Miner antwortet seit {miner_heartbeat_age_sec:.0f} s nicht (Limit {comm_timeout_sec:.0f} s)"
    data_basis: "Kein Signal seit {miner_heartbeat_age_sec:.0f} s · Timeout-Limit {comm_timeout_sec:.0f} s"
    effect: "Miner gestoppt — Verbindung unterbrochen"
    options: "Miner startet nach Wiederverbindung"

  NOOP_R4_FORECAST_PV_INSUFFICIENT:
    short: "PV-Prognose zu schwach — Miner wartet"
    long: "Vorhergesagte PV-Leistung {pv_forecast_kw:.1f} kW reicht nicht für den Mindestüberschuss {min_predicted_surplus_kw:.1f} kW."
    trigger: "PV-Prognose {pv_forecast_kw:.1f} kW unter Mindestüberschuss {min_predicted_surplus_kw:.1f} kW"
    data_basis: "PV-Prognose {pv_forecast_kw:.1f} kW · Mindestüberschuss {min_predicted_surplus_kw:.1f} kW"
    effect: "Miner startet nicht — Prognose zu schwach"
    options: "Miner startet wenn Prognose ≥ {min_predicted_surplus_kw:.1f} kW"

  NOOP_R4_FORECAST_PRICE_SPIKE:
    short: "Strompreis-Anstieg erwartet — Miner wartet"
    long: "Hoher Strompreis in den nächsten Stunden erwartet. Kein Start, um Netzbezug zu vermeiden."
    trigger: "Strompreis-Anstieg prognostiziert"
    data_basis: "Preis-Peak in Prognose erkannt"
    effect: "Miner startet nicht — Preisanstieg erwartet"
    options: "Miner startet wenn kein Preisanstieg erwartet wird"

  NOOP_R5_DEADBAND_ACTIVE:
    short: "Stabilisierungsphase — Entscheidung gehalten"
    long: "Entscheidung bleibt stabil bis {valid_until}. Schnelles Schalten wird vermieden."
    trigger: "Mindesthaltezeit nach letzter Änderung läuft noch"
    data_basis: "Letzte Änderung vor {blocks_since_last_change} Intervallen"
    effect: "Entscheidung unverändert — schnelles Ein-/Ausschalten vermeiden"
    options: "Nächste Entscheidung ab {valid_until}"

  NOOP_R5_MIN_RUNTIME_NOT_REACHED:
    short: "Mindestlaufzeit läuft — Miner bleibt an"
    long: "Miner läuft seit {blocks_since_last_change} Intervallen. Mindestlaufzeit: {min_runtime_blocks} Intervalle."
    trigger: "Mindestlaufzeit von {min_runtime_blocks} Intervallen noch nicht erreicht"
    data_basis: "Läuft seit {blocks_since_last_change} / {min_runtime_blocks} Intervallen (je 10 min)"
    effect: "Miner läuft weiter — Mindestlaufzeit einhalten"
    options: "Stopp frühestens nach {min_runtime_blocks} Intervallen"

  NOOP_R5_MIN_PAUSE_NOT_REACHED:
    short: "Mindestpause läuft — Miner bleibt aus"
    long: "Miner ist seit {blocks_since_last_change} Intervallen gestoppt. Mindestpause: {min_pause_blocks} Intervalle."
    trigger: "Mindestpause von {min_pause_blocks} Intervallen noch nicht abgelaufen"
    data_basis: "Gestoppt seit {blocks_since_last_change} / {min_pause_blocks} Intervallen (je 10 min)"
    effect: "Miner bleibt aus — Mindestpause einhalten"
    options: "Miner startet frühestens nach {min_pause_blocks} Intervallen"

  NOOP_MANUAL_MODE:
    short: "Manueller Modus aktiv"
    long: "Das System ist im manuellen Modus. Automatische Start- und Stopp-Entscheidungen sind deaktiviert."
    trigger: "Betriebsmodus auf Manuell gesetzt"
    data_basis: "Betriebsmodus: Manuell"
    effect: "Keine automatische Aktion — Nutzer entscheidet"
    options: "Automatik aktivieren: Betriebsmodus auf Automatik setzen"

en:
  START_R1_SURPLUS_OK:
    short: "PV surplus available — miner running"
    long: "PV output exceeds house load by {surplus_kw:.1f} kW. Miner started."
    trigger: "Surplus {surplus_kw:.1f} kW exceeds threshold {surplus_min_kw:.1f} kW"
    data_basis: "PV {pv_power_w:.0f} W · house {house_load_w:.0f} W · surplus {surplus_kw:.1f} kW"
    effect: "Miner started"
    options: ""

  STOP_R3_OVERTEMP:
    short: "Safety stop: overtemperature"
    long: "Chip temperature {miner_temp_c:.0f}°C exceeds safety limit {max_chip_temp_c:.0f}°C."
    trigger: "Chip temperature {miner_temp_c:.0f}°C over limit {max_chip_temp_c:.0f}°C"
    data_basis: "Chip temp {miner_temp_c:.0f}°C · limit {max_chip_temp_c:.0f}°C"
    effect: "Miner stopped — overheat protection"
    options: "Miner restarts after cooldown below {max_chip_temp_c:.0f}°C"

  NOOP_R5_DEADBAND_ACTIVE:
    short: "Hold phase active"
    long: "Decision remains stable until {valid_until}. Rapid switching is avoided."
    trigger: "Minimum hold time after last change still running"
    data_basis: "Last change {blocks_since_last_change} intervals ago"
    effect: "Decision unchanged — avoid rapid switching"
    options: "Next decision from {valid_until}"
